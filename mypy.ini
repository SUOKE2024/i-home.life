# mypy 类型检查配置 — v1.1.26
# 当前为渐进式类型标注阶段，逐步收紧配置
# 用法: mypy app/ --ignore-missing-imports

[mypy]

# ── 基础配置 ──
python_version = 3.12
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
warn_no_return = true
warn_unreachable = true

# ── 严格的严格选项（暂不启用，逐步开启）──
# disallow_untyped_defs = true
# disallow_any_generics = true
# no_implicit_optional = true

# ── 排除路径 ──
exclude = (?x)(
    \.venv
    |/migrations/
    |alembic/
    |data/
    |.*\.egg-info
)

# ── 第三方库类型声明缺失时忽略 ──
ignore_missing_imports = true

# ── 可选类型默认 None ──
no_strict_optional = true

# ── 模块级别忽略（尚未适配类型标注的模块）──
[[tool.mypy.overrides]]
module = [
    "app.models.*",
    "app.schemas.*",
    "app.services.*",
    "app.api.*",
    "app.agents.*",
]
ignore_errors = true

# ── 严格检查核心模块 ──
[[tool.mypy.overrides]]
module = [
    "app.config",
    "app.database",
    "app.main",
    "app.metrics",
    "app.ws",
    "app.rbac",
    "app.middleware.*",
    "app.auth.*",
    "app.mcp.*",
]
ignore_errors = false
