<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- no-cache headers for admin security -->
<meta name="description" content="索克家居管理后台 - 项目管理、预算、采购、施工、结算一体化平台">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<meta name="robots" content="noindex,nofollow">
<title>索克家居 · 管理后台</title>
<link rel="icon" type="image/png" href="assets/images/icons/desktop/suoke-favicon-32.png">
<link rel="apple-touch-icon" href="assets/images/icons/desktop/suoke-logo-128.png">
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg-deep: #08080f;
  --bg-panel: #12121d;
  --bg-card: #1a1a2a;
  --border: #1e1e32;
  --border-active: #2a2a45;
  --text: #e8e6e1;
  --text-secondary: #8a8894;
  --text-muted: #5a5866;
  --accent: #c9973b;
  --accent-bright: #e0aa4a;
  --accent-glow: rgba(201,151,59,0.15);
  --danger: #e05555;
  --success: #4a9e6e;
  --warning: #d4a040;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg-deep);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased}
a{color:var(--accent-bright);text-decoration:none}

/* ===== Layout ===== */
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:30}
.sb-hd{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-hd h2{font-size:0.95rem;color:var(--accent);white-space:nowrap}
.sb-hd .sub{font-size:0.6rem;color:var(--text-muted);margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-nav a{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:0.8rem;color:var(--text-secondary);transition:all 0.15s;border-left:3px solid transparent}
.sb-nav a:hover,.sb-nav a.active{color:var(--text);background:rgba(201,151,59,0.08);border-left-color:var(--accent)}
.sb-nav a .ico{font-size:0.95rem;width:22px;text-align:center}
.sb-ft{padding:12px 16px;border-top:1px solid var(--border);font-size:0.65rem;color:var(--text-muted)}

#main{flex:1;margin-left:220px;display:flex;flex-direction:column;min-height:100vh}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg-panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;gap:12px}
#topbar h1{font-size:1rem;font-weight:600}
#topbar .user{display:flex;align-items:center;gap:8px;font-size:0.75rem;color:var(--text-secondary)}
#topbar .user button{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:0;color:var(--text-secondary);cursor:pointer;font-family:inherit;font-size:0.7rem;transition:all 0.15s}
#topbar .user button:hover{border-color:var(--accent);color:var(--accent)}
#topbar .to-home{font-size:0.7rem;padding:6px 12px;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;background:0;font-family:inherit;transition:all 0.15s}
#topbar .to-home:hover{border-color:var(--accent);color:var(--accent)}
#content{padding:20px;flex:1;overflow-y:auto}

/* ===== Cards & Tables ===== */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card h3{font-size:0.9rem;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px}
.card h3 .badge{font-size:0.6rem;padding:2px 8px;border-radius:10px;background:var(--accent-glow);color:var(--accent-bright);font-weight:500}

table{width:100%;border-collapse:collapse;font-size:0.78rem}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text-muted);font-weight:500;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em}
tr:hover{background:rgba(255,255,255,0.015)}
td .tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:0.65rem;font-weight:500}
.tag-green{background:rgba(74,158,110,0.15);color:var(--success)}
.tag-yellow{background:rgba(212,160,64,0.15);color:var(--warning)}
.tag-red{background:rgba(224,85,85,0.15);color:var(--danger)}
.tag-muted{background:rgba(255,255,255,0.06);color:var(--text-muted)}

/* ===== Stats Grid ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow)}
.stat-card .num{font-size:1.6rem;font-weight:800;color:var(--accent-bright);line-height:1}
.stat-card .label{font-size:0.68rem;color:var(--text-muted);margin-top:4px}

/* ===== Forms ===== */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:0.72rem;color:var(--text-secondary);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:var(--bg-deep);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.78rem;transition:border-color 0.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-group input.error,.form-group select.error{border-color:var(--danger)}
.form-error{font-size:0.65rem;color:var(--danger);margin-top:3px;display:none}
.form-group input.error+.form-error{display:block}

.btn{padding:9px 18px;border:none;border-radius:var(--radius);font-size:0.75rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#0a0a0f}
.btn-primary:hover{background:var(--accent-bright)}
.btn-ghost{background:0;border:1px solid var(--border);color:var(--text-secondary)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-danger{background:0;border:1px solid var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{padding:5px 10px;font-size:0.68rem}

.actions{display:flex;gap:8px;margin-top:14px}

/* ===== Login Page ===== */
#login-overlay{position:fixed;inset:0;background:var(--bg-deep);display:flex;align-items:center;justify-content:center;z-index:100}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 28px;width:360px;max-width:90%;box-shadow:0 12px 48px rgba(0,0,0,0.5)}
.login-card h2{text-align:center;margin-bottom:6px;color:var(--accent)}
.login-card .sub{text-align:center;font-size:0.7rem;color:var(--text-muted);margin-bottom:24px}
.login-card .hint{font-size:0.65rem;color:var(--text-muted);text-align:center;margin-top:16px}
#login-error{font-size:0.7rem;color:var(--danger);text-align:center;margin-top:10px;display:none}

/* ===== Toast ===== */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--accent);border-radius:var(--radius);padding:10px 20px;font-size:0.75rem;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.5);opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}

/* ===== Loading ===== */
.spinner{width:20px;height:20px;border:2px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{text-align:center;padding:40px;color:var(--text-muted);font-size:0.8rem}

/* ===== Tabs inside content ===== */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab-btn{padding:8px 16px;border:none;background:0;color:var(--text-muted);cursor:pointer;font-family:inherit;font-size:0.75rem;transition:all 0.15s;border-bottom:2px solid transparent}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* inline form row */
.form-row{display:flex;gap:10px;flex-wrap:wrap}
.form-row .form-group{flex:1;min-width:120px}

/* ===== Responsive ===== */
@media (max-width:1023px){
  #sidebar{width:180px}
  #main{margin-left:180px}
}
@media (max-width:767px){
  #app{flex-direction:column}
  #sidebar{position:relative;width:100%;flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid var(--border);padding:8px}
  .sb-hd{border-bottom:none;padding:8px}
  .sb-nav{display:flex;flex-direction:row;overflow-x:auto;padding:0}
  .sb-nav a{padding:8px 10px;border-left:none;border-bottom:2px solid transparent;white-space:nowrap;font-size:0.7rem}
  .sb-nav a.active{border-left:none;border-bottom-color:var(--accent)}
  .sb-ft{display:none}
  #main{margin-left:0}
  #content{padding:12px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  table{font-size:0.68rem}
  th,td{padding:8px 6px}
}
@media (max-width:480px){
  #topbar h1{font-size:0.85rem}
  .stats-grid{grid-template-columns:1fr}
  .form-row{flex-direction:column}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation-duration:0.01ms!important}}
:focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px;border-radius:4px}
/* screen-reader-only utility */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>

<a href="#content" class="skip-link">跳到主内容</a>
<div id="login-overlay">
  <div class="login-card">
    <h2>索克家居</h2>
    <div class="sub">管理后台 · PASETO 认证</div>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="phone">手机号</label>
        <input type="tel" id="phone" placeholder="13800138000" maxlength="11" required>
        <div class="form-error" id="phone-error">请输入11位手机号</div>
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="输入密码" required minlength="6">
        <div class="form-error" id="pass-error">密码至少6位</div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">登录</button>
    </form>
    <div class="hint">演示账号: 13800138000 / 123456</div>
    <div id="login-error" role="alert" style="display:none"></div>
  </div>
</div>

<div id="app" style="display:none">
  <nav id="sidebar" role="navigation" aria-label="管理后台导航">
    <div class="sb-hd"><h2>管理后台</h2></div>
    <div class="sb-nav" id="sb-nav">
      <a href="#dashboard" class="active" data-tab="dashboard" tabindex="0" aria-current="page" aria-label="仪表盘"><span class="ico" aria-hidden="true">📊</span> 仪表盘</a>
      <a href="#projects" data-tab="projects" tabindex="0" aria-label="项目管理"><span class="ico" aria-hidden="true">🏠</span> 项目管理</a>
      <a href="#budgets" data-tab="budgets" tabindex="0" aria-label="预算管理"><span class="ico" aria-hidden="true">💰</span> 预算管理</a>
      <a href="#procurement" data-tab="procurement" tabindex="0" aria-label="采购管理"><span class="ico" aria-hidden="true">📦</span> 采购管理</a>
      <a href="#construction" data-tab="construction" tabindex="0" aria-label="施工管理"><span class="ico" aria-hidden="true">🔨</span> 施工管理</a>
      <a href="#settlements" data-tab="settlements" tabindex="0" aria-label="结算管理"><span class="ico" aria-hidden="true">📋</span> 结算管理</a>
      <a href="#materials" data-tab="materials" tabindex="0" aria-label="物料库"><span class="ico" aria-hidden="true">🧱</span> 物料库</a>
      <a href="#users" data-tab="users" tabindex="0" aria-label="用户管理"><span class="ico" aria-hidden="true">👥</span> 用户管理</a>
      <a href="#quality" data-tab="quality" tabindex="0" aria-label="质检管理"><span class="ico" aria-hidden="true">✅</span> 质检管理</a>
    </div>
    <div class="sb-ft">V5.60 · PASETO</div>
  </nav>
  <div id="main">
    <div id="topbar">
      <h1 id="page-title">📊 仪表盘</h1>
      <div class="user">
        <span id="user-phone">---</span>
        <a href="index.html" class="to-home">← 返回首页</a>
        <button onclick="logout()">退出</button>
      </div>
    </div>
    <div id="content" role="main" aria-live="polite" aria-label="管理后台内容区"></div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

const API = '';  // 部署后同源，API 不跨域
let AUTH_TOKEN = '';
let USER = null;

// ========== Utilities ==========
function toast(msg, dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function fmtMoney(n){return n!=null?'¥'+Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}):'-';}
function fmtDate(s){if(!s)return'-';try{return new Date(s).toLocaleDateString('zh-CN');}catch(e){return s;}}
function fmtArea(n){return n!=null?Number(n).toFixed(1)+'㎡':'-';}

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(AUTH_TOKEN)opts.headers['Authorization']='Bearer '+AUTH_TOKEN;
  if(body)opts.body=JSON.stringify(body);
  const resp=await fetch(API+path,opts);
  if(resp.status===401){logout();throw new Error('认证已过期');}
  if(resp.status===204)return null;
  const data=await resp.json();
  if(!resp.ok)throw new Error(data.detail||resp.statusText);
  return data;
}

// ========== Auth ==========
function validatePhone(phone){
  return /^1[3-9]\d{9}$/.test(phone);
}

document.getElementById('login-form').addEventListener('submit',async function(e){
  e.preventDefault();
  const phone=document.getElementById('phone').value.trim();
  const password=document.getElementById('password').value;
  const phoneInput=document.getElementById('phone');
  const passInput=document.getElementById('password');
  const phoneErr=document.getElementById('phone-error');
  const passErr=document.getElementById('pass-error');
  const loginErr=document.getElementById('login-error');

  let valid=true;
  phoneInput.classList.remove('error');
  passInput.classList.remove('error');
  loginErr.style.display='none';

  if(!validatePhone(phone)){
    phoneInput.classList.add('error');valid=false;
  }
  if(password.length<6){
    passInput.classList.add('error');valid=false;
  }
  if(!valid)return;

  try{
    const resp=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone,password})});
    const data=await resp.json();
    if(!resp.ok)throw new Error(data.detail||'登录失败');

    AUTH_TOKEN=data.access_token;
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('app').style.display='flex';
    await loadProfile();
    const validTabs=['dashboard','projects','budgets','procurement','construction','settlements','materials','users','quality'];
    const initialTab=validTabs.includes(location.hash.slice(1))?location.hash.slice(1):'dashboard';
    showTab(initialTab);
    toast('登录成功');
  }catch(err){
    loginErr.textContent=err.message;loginErr.style.display='block';
  }
});

async function loadProfile(){
  try{
    const resp=await fetch(API+'/api/auth/me',{headers:{'Authorization':'Bearer '+AUTH_TOKEN}});
    if(resp.ok){USER=await resp.json();document.getElementById('user-phone').textContent=USER.phone||USER.username||'---';}
  }catch(e){}
}

function logout(){
  AUTH_TOKEN='';USER=null;
  document.getElementById('login-overlay').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-error').style.display='none';
  document.getElementById('phone').value='';document.getElementById('password').value='';
}

// ========== Navigation ==========
document.querySelectorAll('#sb-nav a').forEach(a=>{
  a.addEventListener('click',function(e){e.preventDefault();showTab(this.dataset.tab);});
});

async function showTab(tab){
  document.querySelectorAll('#sb-nav a').forEach(a=>{a.classList.remove('active');a.removeAttribute('aria-current');});
  const link=document.querySelector('#sb-nav a[data-tab="'+tab+'"]');
  if(link){link.classList.add('active');link.setAttribute('aria-current','page');}
  const titles={dashboard:'📊 仪表盘',projects:'🏠 项目管理',budgets:'💰 预算管理',procurement:'📦 采购管理',
    construction:'🔨 施工管理',settlements:'📋 结算管理',materials:'🧱 物料库',users:'👥 用户管理',quality:'✅ 质检管理'};
  document.getElementById('page-title').textContent=titles[tab]||tab;
  document.getElementById('content').innerHTML='<div class="loading-wrap"><span class="spinner"></span><br>加载中...</div>';
  try{await renderTab(tab);}catch(e){document.getElementById('content').innerHTML='<div class="card"><p style="color:var(--danger)">加载失败: '+e.message+'</p></div>';}
}

// ========== Tab Renderers ==========
async function renderTab(tab){
  const c=document.getElementById('content');
  switch(tab){
    case 'dashboard':await renderDashboard(c);break;
    case 'projects':await renderProjects(c);break;
    case 'budgets':await renderBudgets(c);break;
    case 'procurement':await renderProcurement(c);break;
    case 'construction':await renderConstruction(c);break;
    case 'settlements':await renderSettlements(c);break;
    case 'materials':await renderMaterials(c);break;
    case 'users':await renderUsers(c);break;
    case 'quality':await renderQuality(c);break;
  }
}

async function renderDashboard(c){
  try{
    const [projects,materials,users,changeOrders] = await Promise.allSettled([
      api('GET','/api/projects'),api('GET','/api/materials?limit=500'),
      api('GET','/api/auth/users?limit=100'),api('GET','/api/change-orders?status=pending')
    ]);
    const projList=projects.status==='fulfilled'?projects.value||[]:[];
    const matData=materials.status==='fulfilled'?materials.value:null;
    const matCount=matData&&Array.isArray(matData)?matData.length:(matData&&typeof matData==='object'?(matData.total||Object.keys(matData).length||'-'):'-');
    const userList=users.status==='fulfilled'?users.value||[]:[];
    const userCount=Array.isArray(userList)?userList.length||1:'-';  // 至少有 demo 用户
    const changeOrderList=changeOrders.status==='fulfilled'?changeOrders.value||[]:[];
    const pendingCount=Array.isArray(changeOrderList)?changeOrderList.length:'-';

    // 本周新增
    const now=new Date();
    const sevenDaysAgo=new Date(now.getTime()-7*24*60*60*1000);
    const newThisWeek=projList.filter(p=>p.created_at&&new Date(p.created_at)>=sevenDaysAgo).length;

    // 项目状态分布
    const statusMap={};
    projList.forEach(p=>{const s=p.status||'unknown';statusMap[s]=(statusMap[s]||0)+1;});
    const statusKeys=Object.keys(statusMap);
    const statusTags={active:'tag-green',completed:'tag-green',pending:'tag-yellow',cancelled:'tag-red',on_hold:'tag-yellow',draft:'tag-muted',unknown:'tag-muted'};

    c.innerHTML=`
      <div class="stats-grid">
        <div class="stat-card"><div class="num">${projList.length||0}</div><div class="label">项目总数</div></div>
        <div class="stat-card"><div class="num">${matCount}</div><div class="label">物料 SKU</div></div>
        <div class="stat-card"><div class="num">${userCount}</div><div class="label">活跃用户</div></div>
        <div class="stat-card"><div class="num">${newThisWeek}</div><div class="label">本周新增</div></div>
        <div class="stat-card"><div class="num">${pendingCount}</div><div class="label">待处理审批</div></div>
        <div class="stat-card"><div class="num">8</div><div class="label">AI 智能体</div></div>
        <div class="stat-card"><div class="num">321</div><div class="label">API 端点</div></div>
      </div>
      ${statusKeys.length?`
      <div class="card">
        <h3>项目状态分布</h3>
        <div class="stats-grid" style="margin-bottom:0">
          ${statusKeys.map(k=>`<div class="stat-card"><div class="num"><span class="tag ${statusTags[k]||'tag-muted'}">${statusMap[k]}</span></div><div class="label">${k}</div></div>`).join('')}
        </div>
      </div>
      `:''}
      <div class="card">
        <h3>最近项目</h3>
        ${projList.length?`<table role="table" aria-label="最近项目列表"><thead><tr><th scope="col">项目名称</th><th scope="col">面积</th><th scope="col">房间数</th><th scope="col">创建时间</th></tr></thead><tbody>

      </div>

          <button class="btn btn-ghost" onclick="showTab('materials')">📦 物料库</button>
          <button class="btn btn-ghost" onclick="window.open('studio.html')">🎨 AI 设计台</button>
          <button class="btn btn-ghost" id="export-btn">📥 导出项目报表</button>
        </div>
      </div>`;

    // 导出按钮事件
    document.getElementById('export-btn').addEventListener('click',async function(){
      try{
        let allProjects=projList;
        try{const resp=await api('GET','/api/projects');if(Array.isArray(resp)&&resp.length)allProjects=resp;}catch(e){}
        const csvLines=['名称,面积,房间数,状态,创建时间'];
        allProjects.forEach(p=>{
          const name=(p.name||'').replace(/"/g,'""');
          const area=p.total_area!=null?p.total_area:'';
          const rooms=p.room_count||p.floors?.reduce((s,f)=>s+(f.rooms?.length||0),0)||'';
          const status=p.status||'';
          const date=p.created_at?new Date(p.created_at).toISOString().slice(0,10):'';
          csvLines.push(`"${name}",${area},${rooms},"${status}",${date}`);
        });
        const csvContent='\uFEFF'+csvLines.join('\n');
        const blob=new Blob([csvContent],{type:'text/csv;charset=utf-8'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;
        const today=new Date();
        const ds=today.getFullYear()+String(today.getMonth()+1).padStart(2,'0')+String(today.getDate()).padStart(2,'0');
        a.download='索克家居_项目报表_'+ds+'.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        toast('报表已导出');
      }catch(e){toast('导出失败: '+e.message);}
    });
  }catch(e){throw e;}
}

    const data=await api('GET','/api/materials?limit=50');
    const mats=Array.isArray(data)?data:(data.items||data.materials||[]);
    const ml=document.getElementById('mat-list');
    if(mats.length){
      ml.innerHTML=`<table role="table" aria-label="物料库列表"><thead><tr><th scope="col">名称</th><th scope="col">分类</th><th scope="col">品牌</th><th scope="col">规格</th><th scope="col">单价</th></tr></thead><tbody>
        ${mats.slice(0,30).map(m=>`<tr><td>${m.name||'-'}</td><td>${m.category||m.category_name||'-'}</td><td>${m.brand||'-'}</td><td>${m.spec||m.specification||'-'}</td><td>${fmtMoney(m.unit_price)}</td></tr>`).join('')}
      </tbody></table>`;
      if(mats.length>30)ml.innerHTML+='<p style="font-size:0.7rem;color:var(--text-muted);text-align:center;margin-top:8px">显示前30条</p>';
    }else{ml.innerHTML='<p style="color:var(--text-muted);font-size:0.78rem">暂无物料数据</p>';}
  }catch(e){document.getElementById('mat-list').innerHTML='<p style="color:var(--text-muted)">加载失败</p>';}
}

async function renderQuality(c){
  c.innerHTML=`
    <div class="card">
      <h3>质检记录</h3>
      <div id="quality-list"><div class="loading-wrap"><span class="spinner"></span></div></div>
    </div>`;
  try{
    const inspections=await api('GET','/api/construction/inspections');
    const ql=document.getElementById('quality-list');
    if(inspections&&inspections.length){
      ql.innerHTML=`<table role="table" aria-label="质检记录列表"><thead><tr><th scope="col">检验结果</th><th scope="col">阶段</th><th scope="col">检验日期</th><th scope="col">备注</th></tr></thead><tbody>
        ${inspections.slice(0,10).map(i=>`<tr><td><span class="tag ${i.result==='pass'?'tag-green':i.result==='fail'?'tag-red':'tag-yellow'}">${i.result||'-'}</span></td><td>${i.phase||'-'}</td><td>${fmtDate(i.inspection_date||i.created_at)}</td><td>${i.notes||'-'}</td></tr>`).join('')}
      </tbody></table>`;
    }else{ql.innerHTML='<p style="color:var(--text-muted);font-size:0.78rem">暂无质检记录</p>';}
  }catch(e){document.getElementById('quality-list').innerHTML='<p style="color:var(--text-muted)">加载失败</p>';}
}

async function renderUsers(c){
  c.innerHTML=`
    <div class="card">
      <h3>用户管理</h3>
      <div class="form-group" style="max-width:320px">
        <input type="text" id="user-search" placeholder="搜索手机号或姓名..." style="width:100%">
      </div>
      <div id="user-list"><div class="loading-wrap"><span class="spinner"></span></div></div>
    </div>`;

  let allUsers=[];
  try{allUsers=await api('GET','/api/auth/users?limit=100')||[];}catch(e){}
  if(!Array.isArray(allUsers))allUsers=[];

  function renderUserTable(users){
    const ul=document.getElementById('user-list');
    if(!users.length){ul.innerHTML='<p style="color:var(--text-muted);font-size:0.78rem">暂无用户数据</p>';return;}
    ul.innerHTML=`<table role="table" aria-label="用户列表"><thead><tr><th scope="col">头像</th><th scope="col">手机号</th><th scope="col">姓名</th><th scope="col">角色</th><th scope="col">注册时间</th><th scope="col">状态</th><th scope="col">操作</th></tr></thead><tbody>
      ${users.map(u=>`<tr>
        <td>${u.avatar_url?`<img src="${u.avatar_url}" style="width:28px;height:28px;border-radius:50%" alt="">`:'👤'}</td>
        <td>${u.phone||'-'}</td>
        <td>${u.name||u.username||'-'}</td>
        <td>${u.role||'user'}</td>
        <td>${fmtDate(u.created_at)}</td>
        <td><span class="tag ${u.is_active!==false?'tag-green':'tag-muted'}">${u.is_active!==false?'正常':'已禁用'}</span></td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="viewUserDetail('${u.id}')">详情</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleUserStatus('${u.id}',${u.is_active!==false})">${u.is_active!==false?'禁用':'启用'}</button>
        </td>
      </tr>`).join('')}
    </tbody></table>`;
  }

  renderUserTable(allUsers);

  document.getElementById('user-search').addEventListener('input',function(){
    const q=this.value.trim().toLowerCase();
    if(!q){renderUserTable(allUsers);return;}
    const filtered=allUsers.filter(u=>(u.phone||'').includes(q)||(u.name||u.username||'').toLowerCase().includes(q));
    renderUserTable(filtered);
  });
}

async function viewUserDetail(uid){
  try{
    const u=await api('GET','/api/auth/users/'+uid);
    alert('用户详情:\n手机号: '+(u.phone||'-')+'\n姓名: '+(u.name||u.username||'-')+'\n角色: '+(u.role||'user')+'\n注册时间: '+fmtDate(u.created_at)+'\n状态: '+(u.is_active!==false?'正常':'已禁用'));
  }catch(e){toast('获取用户详情失败: '+e.message);}
}

async function toggleUserStatus(uid,currentlyActive){
  const action=currentlyActive?'禁用':'启用';
  if(!confirm('确定要'+action+'该用户吗？'))return;
  try{
    await api('PATCH','/api/auth/users/'+uid,{is_active:!currentlyActive});
    toast('用户已'+action);
    showTab('users');
  }catch(e){toast(action+'失败: '+e.message);}
}

// Global error handling (AC-UI-5)
window.addEventListener('error', function(e){
  const msg = e.error?.message || e.message || '未知脚本错误';
  if (e.target === window) {
    console.error('[Admin] 全局错误:', msg);
    const content = document.getElementById('content');
    if (content && !content.querySelector('.error-banner')) {
      const banner = document.createElement('div');
      banner.className = 'card error-banner';
      banner.style.cssText = 'border-color:var(--danger);background:rgba(224,85,85,0.08);';
      banner.innerHTML = '<p style="color:var(--danger);font-size:0.75rem">⚠️ 页面发生错误，请刷新重试: ' + msg.slice(0, 80) + '</p>';
      content.prepend(banner);
    }
  }
}, true);

window.addEventListener('unhandledrejection', function(e){
  console.error('[Admin] 未处理的 Promise 拒绝:', e.reason);
  toast('操作失败: ' + ((e.reason?.message) || '网络错误'), 4000);
});
</script>
