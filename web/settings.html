<script src="assets/js/api-client.js?v=20260716a"></script>
<script>
(function() {
  // ============ 头像选择器 ============
  const avatarBasePath = 'assets/images/avatars/hand-drawn-profiles/';
  const TOTAL_AVATARS = 6;
  const avatarGrid = document.getElementById('avatar-grid');
  const avatarImg = document.getElementById('settings-avatar-img');
  const avatarWrap = document.getElementById('settings-avatar-wrap');
  const avatarPopover = document.getElementById('settings-avatar-popover');
  let currentAvatar = localStorage.getItem('avatar') || (Math.floor(Math.random() * TOTAL_AVATARS) + 1) + '.png';

  // 初始化头像
  avatarImg.src = avatarBasePath + currentAvatar;

  // 生成头像网格
  for (let i = 1; i <= TOTAL_AVATARS; i++) {
    const filename = i + '.png';
    const thumb = document.createElement('div');
    thumb.className = 'avatar-thumb';
    thumb.style.backgroundImage = `url('${avatarBasePath}${filename}')`;
    thumb.dataset.avatar = filename;
    thumb.setAttribute('role', 'radio');
    thumb.setAttribute('aria-checked', currentAvatar === filename ? 'true' : 'false');
    thumb.setAttribute('aria-label', '头像 ' + i);
    thumb.tabIndex = 0;
    if (currentAvatar === filename) thumb.classList.add('selected');
    avatarGrid.appendChild(thumb);
  }

  function selectAvatar(filename) {
    currentAvatar = filename;
    localStorage.setItem('avatar', currentAvatar);
    avatarImg.src = avatarBasePath + currentAvatar;

    avatarGrid.querySelectorAll('.avatar-thumb').forEach(function(t) {
      t.classList.remove('selected');
      t.setAttribute('aria-checked', 'false');
    });
    var selected = avatarGrid.querySelector('[data-avatar="' + currentAvatar + '"]');
    if (selected) {
      selected.classList.add('selected');
      selected.setAttribute('aria-checked', 'true');
    }
  }

  // 点击/键盘触发头像区域 → 切换弹窗
  function togglePopover() {
    avatarPopover.style.display = avatarPopover.style.display === 'none' ? 'block' : 'none';
  }
  avatarWrap.addEventListener('click', togglePopover);
  avatarWrap.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePopover(); }
  });

  // 点击弹窗外部关闭
  document.addEventListener('click', function(e) {
    if (!avatarWrap.contains(e.target) && !avatarPopover.contains(e.target)) {
      avatarPopover.style.display = 'none';
    }
  });

  // 点击选择头像
  avatarGrid.addEventListener('click', function(e) {
    var thumb = e.target.closest('.avatar-thumb');
    if (!thumb) return;
    selectAvatar(thumb.dataset.avatar);
    avatarPopover.style.display = 'none';
  });

  // 键盘选择
  avatarGrid.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      var thumb = e.target.closest('.avatar-thumb');
      if (thumb) {
        e.preventDefault();
        selectAvatar(thumb.dataset.avatar);
        avatarPopover.style.display = 'none';
      }
    }
  });

  // 随机按钮
  document.getElementById('avatar-random-btn').addEventListener('click', function() {
    var randomIndex = Math.floor(Math.random() * TOTAL_AVATARS) + 1;
    selectAvatar(randomIndex + '.png');
  });

  // ============ 昵称编辑 ============
  const userNameSpan = document.getElementById('user-name');
  const userNameInput = document.getElementById('user-name-input');
  const editNameBtn = document.getElementById('edit-name-btn');
  const saveNameBtn = document.getElementById('save-name-btn');
  const cancelNameBtn = document.getElementById('cancel-name-btn');

  editNameBtn.addEventListener('click', function() {
    userNameInput.value = userNameSpan.textContent;
    userNameSpan.style.display = 'none';
    editNameBtn.style.display = 'none';
    userNameInput.style.display = 'inline-block';
    saveNameBtn.style.display = 'inline-block';
    cancelNameBtn.style.display = 'inline-block';
    userNameInput.focus();
    userNameInput.select();
  });

  saveNameBtn.addEventListener('click', function() {
    var newName = userNameInput.value.trim();
    if (!newName) { newName = '用户'; }
    localStorage.setItem('nickname', newName);
    userNameSpan.textContent = newName;
    userNameInput.style.display = 'none';
    saveNameBtn.style.display = 'none';
    cancelNameBtn.style.display = 'none';
    userNameSpan.style.display = 'inline';
    editNameBtn.style.display = 'inline';
  });

  cancelNameBtn.addEventListener('click', function() {
    userNameInput.style.display = 'none';
    saveNameBtn.style.display = 'none';
    cancelNameBtn.style.display = 'none';
    userNameSpan.style.display = 'inline';
    editNameBtn.style.display = 'inline';
  });

  userNameInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') saveNameBtn.click();
    if (e.key === 'Escape') cancelNameBtn.click();
  });

  // ============ 开关 ============
  document.querySelectorAll('.toggle').forEach(toggle => {
    const key = toggle.dataset.key;
    // 从 localStorage 恢复
    const saved = localStorage.getItem(`setting_${key}`);
    if (saved === 'off') {
      toggle.classList.remove('on');
    }
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('on');
      localStorage.setItem(`setting_${key}`, toggle.classList.contains('on') ? 'on' : 'off');
    });
  });

  // ============ 用户信息 ============
  async function loadUser() {
    // 优先从 localStorage 读取自定义昵称
    var savedNick = localStorage.getItem('nickname');
    if (savedNick) {
      document.getElementById('user-name').textContent = savedNick;
    }
    try {
      const user = await ApiClient.getCurrentUser();
      if (!savedNick) {
        document.getElementById('user-name').textContent = user.name || user.nickname || '用户';
      }
      const roleMap = {
          owner: '业主', homeowner: '业主', designer: '设计师',
          supplier: '供应商', foreman: '工长', contractor: '工长',
        };
      document.getElementById('user-role').textContent = roleMap[user.role] || user.role || '—';
      document.getElementById('user-phone').textContent = user.phone ? user.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2') : '—';
    } catch (e) {
      if (!savedNick) {
        document.getElementById('user-name').textContent = '演示用户';
      }
      document.getElementById('user-role').textContent = '业主';
      document.getElementById('user-phone').textContent = '138****8888';
    }
  }

  // ============ 退出登录 ============
  document.getElementById('logout-btn').addEventListener('click', () => {
    if (!confirm('确定退出登录？')) return;
    ApiClient.clearToken();
    if (typeof IMClient !== 'undefined' && IMClient.close) IMClient.close();
    window.location.href = 'index.html';
  });

  loadUser();
})();
</script>
