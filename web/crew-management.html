<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="索克家居 · 班组与工人管理">
<meta name="theme-color" content="#08080f">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; img-src 'self' data: https:;">
<link rel="stylesheet" href="assets/css/workbench.css?v=20260724b">
<title>班组管理 · 索克家居</title>
<style>
.cm-page { min-height:100vh; background:var(--bg-deep); color:var(--text-primary); }
.cm-header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:var(--bg-card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
.cm-header h1 { font-size:18px; font-weight:700; color:var(--accent); margin:0; }
.cm-tabs { display:flex; gap:0; padding:0 16px; background:var(--bg-card); border-bottom:1px solid var(--border); overflow-x:auto; }
.cm-tab { padding:10px 18px; font-size:13px; color:var(--text-secondary); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; font-family:inherit; }
.cm-tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
.cm-content { padding:16px; max-width:900px; margin:0 auto; }
.card { background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:16px; margin-bottom:12px; }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.card-title { font-size:15px; font-weight:700; color:var(--accent); }
.btn { padding:8px 16px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:none; font-family:inherit; }
.btn-primary { background:var(--accent); color:#000; }
.btn-outline { background:transparent; color:var(--accent); border:1px solid var(--accent); }
.btn-danger { background:transparent; color:#E57373; border:1px solid #E57373; }
.btn-sm { padding:4px 10px; font-size:11px; }
/* Crew/Worker cards */
.cw-card { display:flex; gap:14px; padding:14px; border:1px solid var(--border); border-radius:10px; margin-bottom:8px; align-items:center; }
.cw-avatar { width:44px; height:44px; border-radius:50%; background:var(--bg-deep); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.cw-info { flex:1; min-width:0; }
.cw-name { font-size:14px; font-weight:600; color:var(--text-primary); }
.cw-detail { font-size:11px; color:var(--text-secondary); margin-top:2px; display:flex; gap:8px; flex-wrap:wrap; }
.cw-status { font-size:11px; padding:2px 8px; border-radius:6px; font-weight:600; white-space:nowrap; }
.cw-status.active { background:rgba(76,175,80,.15); color:#4CAF50; }
.cw-status.inactive { background:rgba(239,83,80,.15); color:#E57373; }
.cw-actions { display:flex; gap:6px; flex-shrink:0; }
/* Match result */
.match-card { padding:12px; border:1px solid var(--border); border-radius:10px; margin-bottom:8px; }
.match-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.match-project { font-size:13px; font-weight:600; color:var(--text-primary); }
.match-score { font-size:12px; color:var(--accent); }
.match-detail { font-size:11px; color:var(--text-secondary); }
/* Form */
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:4px; }
.form-group input, .form-group select { width:100%; padding:8px 12px; background:var(--bg-deep); border:1px solid var(--border); border-radius:8px; color:var(--text-primary); font-size:13px; box-sizing:border-box; }
.form-actions { display:flex; gap:8px; }
.hidden { display:none !important; }
.empty { text-align:center; padding:40px 16px; color:var(--text-secondary); font-size:14px; }
/* Modal */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:100; }
.modal-box { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:24px; width:90%; max-width:440px; max-height:80vh; overflow-y:auto; }
.modal-box h3 { color:var(--accent); margin:0 0 16px; }
</style>
</head>
<body class="cm-page">
<div class="cm-header">
  <h1>班组与工人管理</h1>
  <a href="/" style="color:var(--text-secondary);font-size:13px;text-decoration:none;">← 返回</a>
</div>

<div class="cm-tabs" id="tabs">
  <button class="cm-tab active" data-tab="crews">工程班组</button>
  <button class="cm-tab" data-tab="workers">工人列表</button>
  <button class="cm-tab" data-tab="matches">匹配记录</button>
</div>

<div class="cm-content">
  <!-- Crews -->
  <div id="tab-crews">
    <div class="card-header">
      <span class="card-title">工程班组</span>
      <button class="btn btn-primary btn-sm" onclick="showCrewForm()">+ 新建班组</button>
    </div>
    <div id="crew-list"></div>
    <div id="crew-empty" class="empty hidden">暂无班组数据</div>
  </div>

  <!-- Workers -->
  <div id="tab-workers" class="hidden">
    <div class="card-header">
      <span class="card-title">工人列表</span>
      <button class="btn btn-primary btn-sm" onclick="showWorkerForm()">+ 添加工人</button>
    </div>
    <div id="worker-list"></div>
    <div id="worker-empty" class="empty hidden">暂无工人数据</div>
  </div>

  <!-- Matches -->
  <div id="tab-matches" class="hidden">
    <div class="card-header">
      <span class="card-title">匹配记录</span>
      <button class="btn btn-outline btn-sm" onclick="loadMatches()">刷新</button>
    </div>
    <div id="match-list"></div>
    <div id="match-empty" class="empty hidden">暂无匹配记录</div>
  </div>
</div>

<script src="assets/js/api-client.js?v=20260724b"></script>
<script defer src="assets/js/perf-optimizer.js?v=20260724b"></script>
<script>
(async function() {
  const token = ApiClient.getToken();
  if (!token) { window.location.href = '/login.html'; return; }

  let crews = [], workers = [];

  // Tab switching
  document.getElementById('tabs').addEventListener('click', (e) => {
    if (!e.target.classList.contains('cm-tab')) return;
    document.querySelectorAll('.cm-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    const tab = e.target.dataset.tab;
    document.querySelectorAll('[id^="tab-"]').forEach(d => d.classList.add('hidden'));
    document.getElementById('tab-' + tab).classList.remove('hidden');
    if (tab === 'matches') loadMatches();
  });

  // Load crews
  async function loadCrews() {
    const list = document.getElementById('crew-list');
    const empty = document.getElementById('crew-empty');
    list.innerHTML = '';
    try {
      const data = await ApiClient.getCrews();
      crews = Array.isArray(data) ? data : (data.items || []);
      if (!crews.length) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      crews.forEach(c => {
        const div = document.createElement('div'); div.className = 'cw-card';
        div.innerHTML = `<div class="cw-avatar">👷</div>
          <div class="cw-info">
            <div class="cw-name">${esc(c.name || c.crew_name || '班组')}</div>
            <div class="cw-detail">
              <span>${esc(c.specialty || c.type || '—')}</span>
              <span>${c.member_count || 0}人</span>
              <span>${esc(c.leader_name || '')}</span>
            </div>
          </div>
          <span class="cw-status active">活跃</span>`;
        list.appendChild(div);
      });
    } catch(e) { empty.classList.remove('hidden'); empty.textContent = '加载失败'; }
  }

  // Load workers
  async function loadWorkers() {
    const list = document.getElementById('worker-list');
    const empty = document.getElementById('worker-empty');
    list.innerHTML = '';
    try {
      const data = await ApiClient.getWorkers();
      workers = Array.isArray(data) ? data : (data.items || []);
      if (!workers.length) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      workers.forEach(w => {
        const div = document.createElement('div'); div.className = 'cw-card';
        div.innerHTML = `<div class="cw-avatar">🔨</div>
          <div class="cw-info">
            <div class="cw-name">${esc(w.name || w.worker_name || '工人')}</div>
            <div class="cw-detail">
              <span>${esc(w.skill || w.trade || '—')}</span>
              <span>${w.years || 0}年经验</span>
              <span>${esc(w.phone || '')}</span>
            </div>
          </div>
          <span class="cw-status active">可接单</span>`;
        list.appendChild(div);
      });
    } catch(e) { empty.classList.remove('hidden'); empty.textContent = '加载失败'; }
  }

  // Load matches
  async function loadMatches() {
    const list = document.getElementById('match-list');
    const empty = document.getElementById('match-empty');
    list.innerHTML = '';
    try {
      const [cmData, wmData] = await Promise.all([
        ApiClient.getCrewMatches('').catch(() => []),
        ApiClient.getWorkerMatches('').catch(() => []),
      ]);
      const crewMatches = (cmData.items || cmData || []);
      const workerMatches = (wmData.items || wmData || []);
      const all = [...crewMatches, ...workerMatches];
      if (!all.length) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      all.forEach(m => {
        const div = document.createElement('div'); div.className = 'match-card';
        div.innerHTML = `<div class="match-header">
          <span class="match-project">${esc(m.project_name || m.project_id || '项目')}</span>
          <span class="match-score">匹配度 ${Math.round((m.score || m.match_score || 0) * 100)}%</span>
        </div>
        <div class="match-detail">${esc(m.crew_name || m.worker_name || m.name || '')} · ${esc(m.status || 'pending')}</div>`;
        list.appendChild(div);
      });
    } catch(e) { empty.classList.remove('hidden'); empty.textContent = '加载失败'; }
  }

  // Form modals
  window.showCrewForm = function() {
    const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal-box">
      <h3>新建工程班组</h3>
      <div class="form-group"><label>班组名称</label><input id="cf-name" placeholder="如：木工一组"></div>
      <div class="form-group"><label>专长</label><input id="cf-specialty" placeholder="如：木工、水电"></div>
      <div class="form-group"><label>负责人</label><input id="cf-leader" placeholder="负责人姓名"></div>
      <div class="form-actions">
        <button class="btn btn-primary" id="cf-submit">创建</button>
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">取消</button>
      </div></div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    document.getElementById('cf-submit').addEventListener('click', async () => {
      const name = document.getElementById('cf-name').value.trim();
      if (!name) return alert('请输入名称');
      try {
        await ApiClient.createCrew({ name, specialty: document.getElementById('cf-specialty').value, leader_name: document.getElementById('cf-leader').value });
        overlay.remove(); loadCrews();
      } catch(e) { alert('创建失败：' + (e.message || '')); }
    });
  };

  window.showWorkerForm = function() {
    const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal-box">
      <h3>添加工人</h3>
      <div class="form-group"><label>姓名</label><input id="wf-name" placeholder="工人姓名"></div>
      <div class="form-group"><label>技能</label><input id="wf-skill" placeholder="如：电工、瓦工"></div>
      <div class="form-group"><label>经验年数</label><input id="wf-years" type="number" placeholder="0"></div>
      <div class="form-group"><label>手机号</label><input id="wf-phone" placeholder="手机号"></div>
      <div class="form-actions">
        <button class="btn btn-primary" id="wf-submit">添加</button>
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">取消</button>
      </div></div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    document.getElementById('wf-submit').addEventListener('click', async () => {
      const name = document.getElementById('wf-name').value.trim();
      if (!name) return alert('请输入姓名');
      try {
        await ApiClient.createWorker({
          name, skill: document.getElementById('wf-skill').value,
          years: parseInt(document.getElementById('wf-years').value) || 0,
          phone: document.getElementById('wf-phone').value,
        });
        overlay.remove(); loadWorkers();
      } catch(e) { alert('添加失败：' + (e.message || '')); }
    });
  };

  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  loadCrews();
  loadWorkers();
})();
</script>
</body>
</html>
