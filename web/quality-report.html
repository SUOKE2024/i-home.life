    content: '';

  const contentEl = document.getElementById('qr-content');
  const projectSelect = document.getElementById('qr-project-select');
  const subtitleEl = document.getElementById('qr-subtitle');

  let allProjects = [];
  let currentProjectId = null;

  // ============ 状态展示 ============
  function showLoading(msg) {
    contentEl.hidden = true;
    stateEl.hidden = false;
    stateEl.innerHTML = `
      <div class="qr-spinner" aria-hidden="true"></div>
      <div class="state-msg">${msg || '正在加载质检数据…'}</div>
    `;
  }

  function showError(msg, detail) {
    contentEl.hidden = true;
    stateEl.hidden = false;
    stateEl.innerHTML = `
      <span class="state-icon" aria-hidden="true">⚠️</span>
      <div class="state-msg">${msg || '加载失败'}</div>
      ${detail ? `<div class="state-err">${detail}</div>` : ''}
    `;
  }

  function showEmpty(msg) {
    contentEl.hidden = true;
    stateEl.hidden = false;
    stateEl.innerHTML = `
      <span class="state-icon" aria-hidden="true">📋</span>
      <div class="state-msg">${msg || '暂无数据'}</div>
    `;
  }

  function showContent() {
    stateEl.hidden = true;
    contentEl.hidden = false;
  }

  // ============ 工具函数 ============
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function formatDate(s) {
    if (!s) return '—';
    try {
      const d = new Date(s);
      if (isNaN(d.getTime())) return escapeHtml(s);
      return d.toLocaleString('zh-CN', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    } catch (_) { return escapeHtml(s); }
  }

  // 标准化验收状态 → passed / failed / pending
  function normalizeStatus(raw) {
    if (!raw) return 'pending';
    const s = String(raw).toLowerCase();
    if (['passed', 'pass', 'approved', '合格', '通过', 'done', 'completed', 'ok'].includes(s)) return 'passed';
    if (['failed', 'fail', 'rejected', '不合格', '不通过', 'reject'].includes(s)) return 'failed';
    return 'pending';
  }

  const STATUS_LABEL = { passed: '通过', failed: '不合格', pending: '待检' };
  const SEVERITY_LABEL = { critical: '严重', warning: '警告', info: '提示' };

  function normalizeSeverity(raw) {
    if (!raw) return 'info';
    const s = String(raw).toLowerCase();
    if (['critical', 'high', '严重', '高'].includes(s)) return 'critical';
    if (['warning', 'medium', '警告', '中'].includes(s)) return 'warning';
    return 'info';
  }

  function normalizeAlertLevel(raw) {
    return normalizeSeverity(raw);
  }

  // ============ 项目选择器 ============
  function renderProjectPicker() {
    if (!allProjects.length) {
      projectSelect.innerHTML = '<option value="">暂无项目</option>';
      projectSelect.disabled = true;
      return;
    }
    projectSelect.innerHTML = allProjects.map(p =>
      `<option value="${escapeHtml(p.id)}" ${p.id === currentProjectId ? 'selected' : ''}>${escapeHtml(p.name || '未命名项目')}</option>`
    ).join('');
    projectSelect.disabled = false;
  }

  projectSelect.addEventListener('change', () => {
    const pid = projectSelect.value;
    if (!pid || pid === currentProjectId) return;
    currentProjectId = pid;
    // 同步 URL，便于分享
    const url = new URL(window.location.href);
    url.searchParams.set('project_id', pid);
    window.history.replaceState({}, '', url.toString());
    loadReport(pid);
  });

  // ============ 数据加载 ============
  async function loadReport(projectId) {
    if (!projectId) {
      showEmpty('未选择项目');
      return;
    }
    showLoading('正在加载质检数据…');

    // 1. 获取施工任务（用于派生 task_id 列表）
    let taskIds = [];
    let tasksData = null;
    try {
      tasksData = await ApiClient.getConstructionTasks(projectId);
      // 兼容多种返回结构
      const taskList = Array.isArray(tasksData) ? tasksData
        : (tasksData && Array.isArray(tasksData.items) ? tasksData.items
        : (tasksData ? [tasksData] : []));
      taskIds = taskList
        .map(t => t.id || t.task_id)
        .filter(Boolean);
      // 若顶层有 tasks/checklist 嵌套，也尝试取 id
      if (taskIds.length === 0 && taskList.length > 0) {
        const nested = (taskList[0].tasks || taskList[0].checklist || []);
        taskIds = nested.map(n => n.id || n.task_id).filter(Boolean);
      }
    } catch (e) {
      // 任务接口失败时，仍可继续尝试质量问题/预警
    }

    // 2. 并行加载：每个 task 的验收记录 + 每个 task 的施工日志 + 项目质量问题 + 项目进度预警
    const inspectionPromises = taskIds.map(tid =>
      ApiClient.getInspections(tid).then(data => ({ taskId: tid, data, ok: true }))
        .catch(err => ({ taskId: tid, err, ok: false }))
    );
    const logPromises = taskIds.map(tid =>
      ApiClient.getConstructionLogs(tid).then(data => ({ taskId: tid, data, ok: true }))
        .catch(err => ({ taskId: tid, err, ok: false }))
    );

    const [inspectionResults, logResults, issuesResult, alertsResult] = await Promise.allSettled([
      Promise.all(inspectionPromises),
      Promise.all(logPromises),
      ApiClient.getQualityIssues(projectId),
      ApiClient.getProgressAlerts(projectId),
    ]);

    // 3. 聚合验收记录
    let inspections = [];
    if (inspectionResults.status === 'fulfilled') {
      inspectionResults.value.forEach(r => {
        if (!r.ok) return;
        const arr = Array.isArray(r.data) ? r.data
          : (r.data && Array.isArray(r.data.items) ? r.data.items
          : (r.data ? [r.data] : []));
        inspections = inspections.concat(arr.map(it => ({ ...it, _taskId: r.taskId })));
      });
    }

    // 4. 聚合施工日志（作为补充材料，暂不在 UI 展示明细，保留供扩展）
    let logs = [];
    if (logResults.status === 'fulfilled') {
      logResults.value.forEach(r => {
        if (!r.ok) return;
        const arr = Array.isArray(r.data) ? r.data
          : (r.data && Array.isArray(r.data.items) ? r.data.items
          : (r.data ? [r.data] : []));
        logs = logs.concat(arr);
      });
    }

    // 5. 质量问题
    let issues = [];
    if (issuesResult.status === 'fulfilled' && issuesResult.value) {
      const v = issuesResult.value;
      issues = Array.isArray(v) ? v : (Array.isArray(v.items) ? v.items : [v]);
      issues = issues.filter(Boolean);
    }

    // 6. 进度预警
    let alerts = [];
    if (alertsResult.status === 'fulfilled' && alertsResult.value) {
      const v = alertsResult.value;
      alerts = Array.isArray(v) ? v : (Array.isArray(v.items) ? v.items : [v]);
      alerts = alerts.filter(Boolean);
    }

    // 7. 渲染
    renderReport({ inspections, issues, alerts, logs, tasksData, projectId });
  }

  // ============ 渲染 ============
  function renderReport({ inspections, issues, alerts, logs, tasksData, projectId }) {
    // 派生统计
    const counts = { passed: 0, failed: 0, pending: 0 };
    inspections.forEach(i => {
      counts[normalizeStatus(i.status)]++;
    });
    const total = inspections.length;
    const score = computeScore(counts, total);

    // 副标题
    const projectName = (allProjects.find(p => p.id === projectId) || {}).name || '当前项目';
    subtitleEl.textContent = `${projectName} · 共 ${total} 项验收`;

    // 汇总卡片
    document.getElementById('qr-total').textContent = total;
    document.getElementById('qr-passed').textContent = counts.passed;
    document.getElementById('qr-failed').textContent = counts.failed;
    document.getElementById('qr-pending').textContent = counts.pending;
    document.getElementById('qr-score').textContent = total > 0 ? `${score}` : '—';
    document.getElementById('qr-score-bar').style.width = `${score}%`;
    const badge = document.getElementById('qr-summary-badge');
    if (total === 0) {
      badge.textContent = '无数据';
    } else if (counts.failed > 0) {
      badge.textContent = '需整改';
      badge.style.color = 'var(--danger)';
      badge.style.background = 'rgba(201,74,74,0.18)';
    } else if (counts.pending > 0) {
      badge.textContent = '进行中';
    } else {
      badge.textContent = '全部通过';
      badge.style.color = 'var(--success)';
      badge.style.background = 'rgba(74,158,110,0.18)';
    }

    // 验收清单
    document.getElementById('qr-inspections-count').textContent = inspections.length;
    const inspectionsEl = document.getElementById('qr-inspections');
    if (inspections.length === 0) {
      inspectionsEl.innerHTML = '<div class="qr-empty-section">暂无验收记录</div>';
    } else {
      inspectionsEl.innerHTML = inspections.map(renderInspection).join('');
    }

    // 质量问题
    document.getElementById('qr-issues-count').textContent = issues.length;
    const issuesEl = document.getElementById('qr-issues');
    if (issues.length === 0) {
      issuesEl.innerHTML = '<div class="qr-empty-section">暂无质量问题</div>';
    } else {
      issuesEl.innerHTML = issues.map(renderIssue).join('');
    }

    // 进度预警
    document.getElementById('qr-alerts-count').textContent = alerts.length;
    const alertsEl = document.getElementById('qr-alerts');
    if (alerts.length === 0) {
      alertsEl.innerHTML = '<div class="qr-empty-section">暂无进度预警</div>';
    } else {
      alertsEl.innerHTML = `<div class="qr-timeline">${alerts.map(renderAlert).join('')}</div>`;
    }

    showContent();
    renderReportCharts({ inspections, issues });
  }

  // ============ 图表渲染 ============
  let chartInspectionGauge = null;
  let chartIssueTypes = null;

  function renderReportCharts({ inspections, issues }) {
    renderInspectionGauge(inspections);
    renderIssueTypesChart(issues);
  }

  function renderInspectionGauge(inspections) {
    const dom = document.getElementById('chart-inspection-gauge');
    if (!dom) return;

    const counts = { passed: 0, failed: 0, pending: 0 };
    inspections.forEach(i => { counts[normalizeStatus(i.status)]++; });
    const total = inspections.length;
    const passRate = total > 0 ? Math.round((counts.passed / total) * 100) : 0;

    let gaugeColor = '#c94a4a';
    if (passRate >= 90) gaugeColor = '#4a9e6e';
    else if (passRate >= 70) gaugeColor = '#c97a3b';

    const existing = echarts.getInstanceByDom(dom);
    if (existing) existing.dispose();

    if (total === 0) {
      chartInspectionGauge = echarts.init(dom);
      chartInspectionGauge.setOption({
        title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#8a8894', fontSize: 14, fontWeight: 'normal' } }
      });
      return;
    }

    chartInspectionGauge = echarts.init(dom);
    chartInspectionGauge.setOption({
      series: [{
        type: 'gauge',
        startAngle: 210,
        endAngle: -30,
        center: ['50%', '55%'],
        radius: '85%',
        min: 0,
        max: 100,
        splitNumber: 10,
        axisLine: {
          show: true,
          lineStyle: {
            width: 16,
            color: [
              [0.7, '#c94a4a'],
              [0.9, '#c97a3b'],
              [1, '#4a9e6e']
            ]
          }
        },
        pointer: { icon: 'path://M12.8,0.7l12,40.1H0.7L12.8,0.7z', length: '60%', width: 8, offsetCenter: [0, '-10%'], itemStyle: { color: 'auto' } },
        axisTick: { distance: -18, length: 6, lineStyle: { width: 2, color: '#5a5866' } },
        splitLine: { distance: -22, length: 14, lineStyle: { width: 3, color: '#5a5866' } },
        axisLabel: { color: '#8a8894', distance: 30, fontSize: 10 },
        anchor: { show: true, showAbove: true, size: 16, itemStyle: { borderWidth: 2, borderColor: '#5a5866' } },
        title: { show: false },
        detail: {
          valueAnimation: true,
          fontSize: 28,
          fontWeight: 'bold',
          offsetCenter: [0, '50%'],
          formatter: '{value}%',
          color: gaugeColor
        },
        data: [{ value: passRate }]
      }]
    });
  }

  function renderIssueTypesChart(issues) {
    const dom = document.getElementById('chart-issue-types');
    if (!dom) return;

    const severityMap = { critical: 0, major: 0, minor: 0 };
    issues.forEach(issue => {
      const sev = normalizeSeverity(issue.severity || issue.level);
      // normalizeSeverity returns 'critical', 'warning', 'info'
      if (sev === 'critical') severityMap.critical++;
      else if (sev === 'warning') severityMap.major++;
      else severityMap.minor++;
    });

    const existing = echarts.getInstanceByDom(dom);
    if (existing) existing.dispose();

    if (issues.length === 0) {
      chartIssueTypes = echarts.init(dom);
      chartIssueTypes.setOption({
        title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#8a8894', fontSize: 14, fontWeight: 'normal' } }
      });
      return;
    }

    chartIssueTypes = echarts.init(dom);
    chartIssueTypes.setOption({
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      grid: { left: '3%', right: '8%', bottom: '8%', top: '8%', containLabel: true },
      xAxis: {
        type: 'category',
        data: ['严重', '警告', '提示'],
        axisLabel: { color: '#8a8894', fontSize: 11 },
        axisLine: { lineStyle: { color: '#2a2a45' } }
      },
      yAxis: {
        type: 'value',
        minInterval: 1,
        axisLabel: { color: '#8a8894', fontSize: 10 },
        splitLine: { lineStyle: { color: '#1e1e32' } }
      },
      series: [{
        type: 'bar',
        barWidth: '50%',
        data: [
          { value: severityMap.critical, itemStyle: { color: '#c94a4a', borderRadius: [4, 4, 0, 0] } },
          { value: severityMap.major, itemStyle: { color: '#c97a3b', borderRadius: [4, 4, 0, 0] } },
          { value: severityMap.minor, itemStyle: { color: '#5a7ec9', borderRadius: [4, 4, 0, 0] } }
        ]
      }]
    });
  }

  function computeScore(counts, total) {
    if (total === 0) return 0;
    // 通过 +90, 待检 +60, 不合格 +30
    const s = (counts.passed * 90 + counts.pending * 60 + counts.failed * 30) / total;
    return Math.round(s);
  }

  function renderInspection(ins) {
    const status = normalizeStatus(ins.status);
    const name = escapeHtml(ins.inspection_name || ins.name || ins.title || ins.type || '验收项');
    const type = escapeHtml(ins.inspection_type || ins.type || ins.category || '');
    const inspector = escapeHtml(ins.inspector || ins.inspector_name || ins.auditor || (ins.is_ai ? 'AI 质检 Agent' : '') || '—');
    const date = formatDate(ins.inspection_date || ins.inspected_at || ins.created_at || ins.date);
    const findings = escapeHtml(ins.findings || ins.result || ins.description || ins.notes || ins.summary || '');
    const standards = Array.isArray(ins.standards || ins.standard_references)
      ? (ins.standards || ins.standard_references)
      : (ins.standard ? [ins.standard] : []);
    const photos = Array.isArray(ins.photos || ins.images)
      ? (ins.photos || ins.images)
      : (ins.photo_url ? [ins.photo_url] : []);

    const standardsHtml = standards.length
      ? `<div class="qr-inspection-standards" aria-label="参考标准">
           ${standards.map(s => `<span class="qr-standard-tag">${escapeHtml(s)}</span>`).join('')}
         </div>`
      : '';

    const photosHtml = photos.length
      ? `<div class="qr-inspection-photos">
           ${photos.map(p => {
             const url = typeof p === 'string' ? p : (p.url || p.thumbnail || p.path || '');
             const cap = typeof p === 'string' ? '' : (p.caption || p.description || '');
             return url ? `<img class="qr-inspection-photo" src="${escapeHtml(url)}" alt="${escapeHtml(cap || '验收照片')}" loading="lazy">` : '';
           }).join('')}
         </div>`
      : '';

    return `
      <article class="qr-inspection ${status}" role="listitem">
        <div class="qr-inspection-head">
          <div>
            <div class="qr-inspection-name">${name}</div>
            ${type ? `<div class="qr-inspection-type">${type}</div>` : ''}
          </div>
          <span class="qr-status-badge ${status}" aria-label="状态：${STATUS_LABEL[status]}">${STATUS_LABEL[status]}</span>
        </div>
        <div class="qr-inspection-meta">
          <span>👤 ${inspector}</span>
          <span>🕐 ${date}</span>
        </div>
        ${findings ? `<div class="qr-inspection-findings">${findings}</div>` : ''}
        ${photosHtml}
        ${standardsHtml}
      </article>
    `;
  }

  function renderIssue(issue) {
    const severity = normalizeSeverity(issue.severity || issue.level);
    const title = escapeHtml(issue.title || issue.name || issue.issue || '质量问题');
    const desc = escapeHtml(issue.description || issue.detail || issue.notes || issue.findings || '');
    const location = escapeHtml(issue.location || issue.area || '');
    const status = escapeHtml(issue.status || '');
    const date = formatDate(issue.created_at || issue.reported_at || issue.date);

    return `
      <div class="qr-issue" role="listitem">
        <div class="qr-issue-severity ${severity}" aria-hidden="true"></div>
        <div class="qr-issue-body">
          <div class="qr-issue-head">
            <div class="qr-issue-title">${title}</div>
            <span class="qr-severity-tag ${severity}" aria-label="严重程度：${SEVERITY_LABEL[severity]}">${SEVERITY_LABEL[severity]}</span>
          </div>
          ${desc ? `<div class="qr-issue-desc">${desc}</div>` : ''}
          <div class="qr-issue-meta">
            ${location ? `<span>📍 ${location}</span> · ` : ''}${date}${status ? ` · ${status}` : ''}
          </div>
        </div>
      </div>
    `;
  }

  function renderAlert(alert) {
    const level = normalizeAlertLevel(alert.severity || alert.level || alert.priority);
    const title = escapeHtml(alert.title || alert.message || alert.alert || alert.description || '进度预警');
    const meta = formatDate(alert.created_at || alert.alerted_at || alert.date || alert.timestamp);
    const detail = escapeHtml(alert.detail || alert.action || alert.recommendation || '');

    return `
      <div class="qr-timeline-item ${level}" role="listitem">
        <div class="qr-timeline-title">${title}</div>
        <div class="qr-timeline-meta">${meta}${detail ? ` · ${detail}` : ''}</div>
      </div>
    `;
  }

  // ============ AI 智能分析 ============

  // BOM 物料匹配
  document.getElementById('btn-bom-match').addEventListener('click', async function () {
    const btn = this;
    const resultEl = document.getElementById('bom-match-result');
    const spinner = document.getElementById('bom-spinner');
    btn.disabled = true;
    spinner.style.display = 'inline-block';
    try {
      const token = ApiClient.getToken();
      const baseURL = ApiClient.BASE_URL || '';
      const resp = await fetch(baseURL + '/api/materials/bom/auto-match?project_id=' + currentProjectId, {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      if (!resp.ok) throw new Error('API error');
      const data = await resp.json();
      let html =
        '<div style="font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 4px;">' +
        data.matchRate +
        '%</div>';
      html +=
        '<div style="font-size: 12px; color: var(--text-secondary);">' +
        data.matched +
        '/' +
        data.total +
        ' 项匹配</div>';
      if (data.results && data.results.length > 0) {
        html +=
          '<div style="margin-top: 12px; max-height: 200px; overflow-y: auto; text-align: left;">';
        data.results.slice(0, 10).forEach(function (r) {
          var badgeColor =
            r.matchLevel === 'exact'
              ? 'var(--success)'
              : r.matchLevel === 'fuzzy'
                ? 'var(--info)'
                : r.matchLevel === 'category'
                  ? 'var(--warning)'
                  : 'var(--danger)';
          html +=
            '<div style="font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--border);">';
          html += '<span style="color: ' + badgeColor + ';">[' + r.matchLevel + ']</span> ';
          html += r.materialName || '--';
          if (r.matchedMaterial) html += ' → ' + r.matchedMaterial.name;
          html += '</div>';
        });
        html += '</div>';
      }
      resultEl.innerHTML = html;
    } catch (e) {
      resultEl.innerHTML =
        '<div style="color: var(--danger);">匹配失败: ' + e.message + '</div>';
    } finally {
      btn.style.display = 'none';
      spinner.style.display = 'none';
    }
  });

  // 施工日志缺陷检测
  document.getElementById('btn-defect-detect').addEventListener('click', async function () {
    const btn = this;
    const resultEl = document.getElementById('defect-result');
    const spinner = document.getElementById('defect-spinner');
    btn.disabled = true;
    spinner.style.display = 'inline-block';
    try {
      const token = ApiClient.getToken();
      const baseURL = ApiClient.BASE_URL || '';
      const resp = await fetch(baseURL + '/api/construction/logs/analyze-defects?project_id=' + currentProjectId, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({}),
      });
      if (!resp.ok) throw new Error('API error');
      const data = await resp.json();
      let html =
        '<div style="font-size: 13px; color: var(--text-primary); margin-bottom: 8px;">' +
        data.reply +
        '</div>';
      html +=
        '<div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 8px;">';
      html += '<span style="color: var(--danger);">⚠ 严重: ' + (data.criticalCount || 0) + '</span>';
      html += '<span style="color: var(--warning);">⚡ 高危: ' + (data.highCount || 0) + '</span>';
      html +=
        '<span style="color: var(--text-muted);">共: ' + (data.issueCount || 0) + ' 个问题</span>';
      html += '</div>';
      if (data.issues && data.issues.length > 0) {
        html += '<div style="max-height: 180px; overflow-y: auto; text-align: left;">';
        data.issues.slice(0, 8).forEach(function (issue) {
          var sevColor =
            issue.severity === 'critical'
              ? 'var(--danger)'
              : issue.severity === 'high'
                ? 'var(--warning)'
                : 'var(--text-muted)';
          html +=
            '<div style="font-size: 11px; padding: 6px 0; border-bottom: 1px solid var(--border);">';
          html += '<span style="color: ' + sevColor + ';">[' + issue.category + ']</span> ';
          html += (issue.taskName || '') + ' → ' + (issue.logExcerpt || '');
          html += '</div>';
        });
        html += '</div>';
      }
      resultEl.innerHTML = html;
    } catch (e) {
      resultEl.innerHTML =
        '<div style="color: var(--danger);">分析失败: ' + e.message + '</div>';
    } finally {
      btn.style.display = 'none';
      spinner.style.display = 'none';
    }
  });

  // ============ 初始化 ============
  async function init() {
    const token = ApiClient.getToken();
    if (!token) {
      window.location.href = `login.html?next=${encodeURIComponent('quality-report.html' + window.location.search)}`;
      return;
    }

    showLoading('正在加载项目列表…');

    try {
      const projects = await ApiClient.getProjects();
      allProjects = Array.isArray(projects) ? projects : (projects.items || []);

      if (!allProjects.length) {
        showEmpty('你还没有项目，请先在工作台创建项目');
        projectSelect.innerHTML = '<option value="">暂无项目</option>';
        return;
      }

      // 解析 URL 参数指定项目，否则取第一个
      const requestedId = params.get('project_id');
      const selected = (requestedId && allProjects.find(p => p.id === requestedId)) || allProjects[0];
      currentProjectId = selected.id;
      renderProjectPicker();

      await loadReport(currentProjectId);
    } catch (err) {
      const detail = err && (err.message || (err.body && (err.body.detail || JSON.stringify(err.body))));
      if (err && err.status === 401) return; // request 已跳转登录
      showError('后端服务不可达', detail);
    }
  }

  // ============ 图表清理与响应式 ============
  let qrResizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(qrResizeTimer);
    qrResizeTimer = setTimeout(() => {
      chartInspectionGauge?.resize();
      chartIssueTypes?.resize();
    }, 150);
  });

  window.addEventListener('beforeunload', () => {
    chartInspectionGauge?.dispose();
    chartIssueTypes?.dispose();
  });

  init();
})();
</script>
