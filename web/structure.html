/* ═══ CSS Variables ═══ */

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════
const params = new URLSearchParams(window.location.search);
const projectId = params.get('project_id') || '';
let currentTab = 'walls';
let editingId = null;
let confirmCallback = null;

const elements = {
  walls: [],
  beams: [],
  columns: [],
  slabs: [],
  foundations: [],
};

// ═══════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════
function checkAuth() {
  const token = ApiClient.getToken();
  if (!token) {
    const go = confirm('此功能需要先登录。\n\n点击「确定」跳转到登录页。');
    if (go) window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
    return false;
  }
  return true;
}

async function loadElements() {
  if (!projectId) return;
  try {
    const types = ['walls', 'beams', 'columns', 'slabs', 'foundations'];
    const results = await Promise.all(
      types.map(t => ApiClient.request(`/api/structural/projects/${projectId}/${t}`))
    );
    elements.walls = results[0];
    elements.beams = results[1];
    elements.columns = results[2];
    elements.slabs = results[3];
    elements.foundations = results[4];
    renderElementList();
    draw2D();
    syncTo3D();
  } catch (e) {
    console.warn('结构数据加载失败，使用本地数据:', e.message);
  }
}

async function saveElement(type, data) {
  if (!projectId || !data || data.length === 0) return;
  try {
    await ApiClient.request(`/api/structural/${type}`, {
      method: 'POST',
      body: JSON.stringify({
        project_id: projectId,
        ...data[0],
      }),
    });
  } catch (e) {
    console.warn(`保存${type}失败:`, e.message);
  }
}

async function saveElements() {
  if (!projectId) return;
  try {
    const saves = [];
    for (const el of elements.walls) saves.push(saveElement('walls', [el]));
    for (const el of elements.beams) saves.push(saveElement('beams', [el]));
    for (const el of elements.columns) saves.push(saveElement('columns', [el]));
    for (const el of elements.slabs) saves.push(saveElement('slabs', [el]));
    for (const el of elements.foundations) saves.push(saveElement('foundations', [el]));
    await Promise.all(saves);
    document.getElementById('status-right').textContent = '已保存';
    setTimeout(() => { document.getElementById('status-right').textContent = '就绪'; }, 2000);
  } catch (e) {
    console.warn('结构数据保存失败:', e.message);
    document.getElementById('status-right').textContent = '保存失败';
  }
}

// ═══════════════════════════════════════════
// DIALOG MANAGEMENT
// ═══════════════════════════════════════════
function openDialog(formTitle, fieldsHtml, submitLabel) {
  document.getElementById('form-title').textContent = formTitle;
  document.getElementById('form-fields').innerHTML = fieldsHtml;
  document.getElementById('form-submit').textContent = submitLabel || '保存';
  document.getElementById('form-error').hidden = true;
  document.getElementById('form-dialog').classList.add('open');
  // Focus first input
  setTimeout(() => {
    const first = document.querySelector('#form-fields input, #form-fields select');
    if (first) first.focus();
  }, 50);
}

function openConfirm(message, onConfirm) {
  document.getElementById('confirm-message').textContent = message;
  document.getElementById('confirm-dialog').classList.add('open');
  confirmCallback = onConfirm;
}

function closeConfirm() {
  document.getElementById('confirm-dialog').classList.remove('open');

}

function doConfirm() {
  if (confirmCallback) confirmCallback();
  closeConfirm();
}

function renderElementList() {
  const container = document.getElementById('sidebar-content');
  const list = elements[currentTab] || [];
  const tabLabels = {
    walls: { title: '承重墙', empty: '暂无承重墙' },
    beams: { title: '梁', empty: '暂无梁' },
    columns: { title: '柱', empty: '暂无柱' },
    slabs: { title: '楼板', empty: '暂无楼板' },
    foundations: { title: '基础', empty: '暂无基础' },
    takeoff: { title: '工程量统计', empty: '暂无数据' },
  };
  const label = tabLabels[currentTab];

  if (currentTab === 'takeoff') {
    container.innerHTML = renderTakeoff();
    return;
  }

  const itemsHtml = list.length === 0
    ? `<div class="element-empty">${label.empty}</div>`
    : list.map((el, i) => `
      <div class="element-item" role="listitem" tabindex="0" aria-label="${el.name}">
        <div class="el-info" onclick="editElement(${i})">
          <div class="el-name">${escapeHtml(el.name)}</div>
          <div class="el-meta">${formatElementMeta(el, currentTab)}</div>
        </div>
        <div class="el-actions">
          <button class="el-edit" aria-label="编辑 ${escapeHtml(el.name)}" onclick="editElement(${i})">✎</button>
          <button aria-label="删除 ${escapeHtml(el.name)}" onclick="deleteElement(${i})">✕</button>
        </div>
      </div>
    `).join('');

  container.innerHTML = `
    <h3>${label.title} <button onclick="addElement()" aria-label="添加${label.title}">+ 添加</button></h3>
    <div class="element-list" role="list" aria-label="${label.title}列表">${itemsHtml}</div>
  `;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatElementMeta(el, tab) {
  switch (tab) {
    case 'walls': return `${el.thickness || '-'}mm · ${el.length || '-'}m · ${el.material || '-'}`;
    case 'beams': return `${el.type || '-'} · ${el.width || '-'}×${el.height || '-'}mm · ${el.length || '-'}m`;
    case 'columns': return `${el.type || '-'} · ${el.width || '-'}×${el.depth || '-'}mm · ${el.height || '-'}m`;
    case 'slabs': return `${el.type || '-'} · ${el.thickness || '-'}mm · ${el.area || '-'}㎡`;
    case 'foundations': return `${el.type || '-'} · ${el.bearing_capacity || '-'}kPa · 埋深${el.depth || '-'}m`;
    default: return '';
  }
}

function renderTakeoff() {
  const stats = calculateTakeoff();
  return `
    <h3>📊 工程量统计</h3>
    <table class="qty-table">
      <thead><tr><th>项目</th><th>数量</th><th>单位</th></tr></thead>
      <tbody>
        <tr><td>砖砌体</td><td class="qty-value">${stats.masonry.toFixed(2)}</td><td>m³</td></tr>
        <tr><td>混凝土</td><td class="qty-value">${stats.concrete.toFixed(2)}</td><td>m³</td></tr>
        <tr><td>模板</td><td class="qty-value">${stats.formwork.toFixed(2)}</td><td>㎡</td></tr>
        <tr><td>钢筋</td><td class="qty-value">${stats.rebar.toFixed(2)}</td><td>kg</td></tr>
        <tr><td>承重墙</td><td class="qty-value">${elements.walls.length}</td><td>个</td></tr>
        <tr><td>梁</td><td class="qty-value">${elements.beams.length}</td><td>个</td></tr>
        <tr><td>柱</td><td class="qty-value">${elements.columns.length}</td><td>个</td></tr>
        <tr><td>楼板</td><td class="qty-value">${elements.slabs.length}</td><td>个</td></tr>
        <tr><td>基础</td><td class="qty-value">${elements.foundations.length}</td><td>个</td></tr>
      </tbody>
    </table>
    <p style="font-size:0.6rem;color:var(--text-muted);margin-top:8px;text-align:center">自动计算 · 仅供参考</p>
  `;
}

function calculateTakeoff() {
  let masonry = 0, concrete = 0, formwork = 0, rebar = 0;

  elements.walls.forEach(w => {
    const vol = (w.thickness || 240) / 1000 * (w.length || 3) * (w.height || 2.8);
    if (w.material === '砖砌体' || w.material === '加气混凝土砌块') masonry += vol;
    else concrete += vol;
    formwork += (w.length || 3) * (w.height || 2.8) * 2;
  });

  elements.beams.forEach(b => {
    const vol = (b.width || 250) / 1000 * (b.height || 500) / 1000 * (b.length || 4);
    concrete += vol;
    formwork += (b.length || 4) * ((b.height || 500) / 1000) * 2;
  });

  elements.columns.forEach(c => {
    const vol = (c.width || 400) / 1000 * (c.depth || 400) / 1000 * (c.height || 3);
    concrete += vol;
    formwork += ((c.width || 400) / 1000 + (c.depth || 400) / 1000) * 2 * (c.height || 3);
  });

  elements.slabs.forEach(s => {
    const vol = (s.thickness || 150) / 1000 * (s.area || 20);
    concrete += vol;
    formwork += (s.area || 20);
    // 钢筋估算：面积 / 间距 × 直径² × π / 4 × 2方向 × 7850kg/m³
    const spacing = (s.rebar_spacing || 150) / 1000;
    const dia = (s.rebar_dia || 12) / 1000;
    const area_m = s.area || 20;
    const barCount = Math.ceil(Math.sqrt(area_m) / spacing) * 2;
    const barLen = Math.sqrt(area_m) * barCount;
    rebar += barLen * (Math.PI * dia * dia / 4) * 7850;
  });

  elements.foundations.forEach(f => {
    formwork += 10; // 基础模板估算
    concrete += 3;  // 基础混凝土估算
  });

  return { masonry, concrete, formwork, rebar: Math.round(rebar) };
}

function addElement() {
  editingId = null;
  const forms = {
    walls: () => openDialog('添加承重墙', wallForm(null), '添加'),
    beams: () => openDialog('添加梁', beamForm(null), '添加'),
    columns: () => openDialog('添加柱', columnForm(null), '添加'),
    slabs: () => openDialog('添加楼板', slabForm(null), '添加'),
    foundations: () => openDialog('添加基础', foundationForm(null), '添加'),
  };
  (forms[currentTab] || (() => {}))();
}

function editElement(index) {
  const list = elements[currentTab];
  if (!list || !list[index]) return;
  editingId = index;
  const el = list[index];
  const forms = {
    walls: () => openDialog('编辑承重墙', wallForm(el), '保存'),
    beams: () => openDialog('编辑梁', beamForm(el), '保存'),
    columns: () => openDialog('编辑柱', columnForm(el), '保存'),
    slabs: () => openDialog('编辑楼板', slabForm(el), '保存'),
    foundations: () => openDialog('编辑基础', foundationForm(el), '保存'),
  };
  (forms[currentTab] || (() => {}))();
}

function deleteElement(index) {
  const list = elements[currentTab];
  if (!list || !list[index]) return;
  const el = list[index];
  openConfirm(`确定要删除「${el.name}」吗？此操作不可撤销。`, () => {
    list.splice(index, 1);
    renderElementList();
    draw2D();
    syncTo3D();
    saveElements();
  });
}

document.getElementById('form-body').addEventListener('submit', function(e) {
  e.preventDefault();
  const errEl = document.getElementById('form-error');
  errEl.hidden = true;

  const name = document.getElementById('f-name')?.value?.trim();
  if (!name) {
    errEl.textContent = '请输入元素名称';
    errEl.hidden = false;
    return;
  }

  let data = { name };

  switch (currentTab) {
    case 'walls':
      data.thickness = parseInt(document.getElementById('f-thickness')?.value) || 240;
      data.length = parseFloat(document.getElementById('f-length')?.value) || 3;
      data.height = parseFloat(document.getElementById('f-height')?.value) || 2.8;
      data.material = document.getElementById('f-material')?.value || '砖砌体';
      data.loadbearing = document.getElementById('f-loadbearing')?.checked !== false;
      break;
    case 'beams':
      data.type = document.getElementById('f-type')?.value || '主梁';
      data.width = parseInt(document.getElementById('f-width')?.value) || 250;
      data.height = parseInt(document.getElementById('f-height')?.value) || 500;
      data.length = parseFloat(document.getElementById('f-length')?.value) || 4;
      data.material = document.getElementById('f-material')?.value || '钢筋混凝土';
      data.concrete = document.getElementById('f-concrete')?.value || 'C30';
      break;
    case 'columns':
      data.type = document.getElementById('f-type')?.value || '矩形';
      data.width = parseInt(document.getElementById('f-width')?.value) || 400;
      data.depth = parseInt(document.getElementById('f-depth')?.value) || 400;
      data.height = parseFloat(document.getElementById('f-height')?.value) || 3;
      data.material = document.getElementById('f-material')?.value || '钢筋混凝土';
      data.concrete = document.getElementById('f-concrete')?.value || 'C30';
      break;
    case 'slabs':
      data.type = document.getElementById('f-type')?.value || '实心板';
      data.thickness = parseInt(document.getElementById('f-thickness')?.value) || 150;
      data.area = parseFloat(document.getElementById('f-area')?.value) || 20;
      data.concrete = document.getElementById('f-concrete')?.value || 'C30';
      data.rebar_dia = parseInt(document.getElementById('f-rebar')?.value) || 12;
      data.rebar_spacing = parseInt(document.getElementById('f-spacing')?.value) || 150;
      break;
    case 'foundations':
      data.type = document.getElementById('f-type')?.value || '条形基础';
      data.bearing_capacity = parseInt(document.getElementById('f-bearing')?.value) || 200;
      data.depth = parseFloat(document.getElementById('f-depth')?.value) || 1.5;
      data.soil_type = document.getElementById('f-soil')?.value || '黏土';
      break;
  }

  const list = elements[currentTab];
  if (editingId !== null && list[editingId]) {
    list[editingId] = { ...list[editingId], ...data };
  } else {
    list.push({ id: 'el-' + Date.now(), ...data });
  }

  closeDialog();
  renderElementList();
  draw2D();
  syncTo3D();
  saveElements();
});

// ═══════════════════════════════════════════
// 2D CANVAS
// ═══════════════════════════════════════════
const PX_PER_M = 30;
const c2d = document.getElementById('c2d');
const ctx = c2d.getContext('2d');
let scale2d = 1, offset2d = { x: 30, y: 30 };
let panStart = null, panOrig = null;

function resize2D() {
  const w = document.getElementById('canvas-2d-wrap').clientWidth;
  const h = document.getElementById('canvas-2d-wrap').clientHeight;
  c2d.width = w; c2d.height = h;
  draw2D();
}

function draw2D() {
  ctx.clearRect(0, 0, c2d.width, c2d.height);
  ctx.save();
  ctx.translate(offset2d.x * scale2d, offset2d.y * scale2d);

  const gs = PX_PER_M * scale2d;
  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.5;
  for (let x = -20 * gs; x < c2d.width * 2; x += gs) { ctx.beginPath(); ctx.moveTo(x, -2000); ctx.lineTo(x, 10000); ctx.stroke(); }
  for (let y = -20 * gs; y < c2d.height * 2; y += gs) { ctx.beginPath(); ctx.moveTo(-2000, y); ctx.lineTo(10000, y); ctx.stroke(); }
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  for (let x = -20 * gs; x < c2d.width * 2; x += gs * 5) { ctx.beginPath(); ctx.moveTo(x, -2000); ctx.lineTo(x, 10000); ctx.stroke(); }
  for (let y = -20 * gs; y < c2d.height * 2; y += gs * 5) { ctx.beginPath(); ctx.moveTo(-2000, y); ctx.lineTo(10000, y); ctx.stroke(); }

  // Draw walls
  elements.walls.forEach((w, i) => {
    const x = (i % 4) * 6 * PX_PER_M, y = Math.floor(i / 4) * 6 * PX_PER_M;
    const l = (w.length || 3) * PX_PER_M, thk = ((w.thickness || 240) / 1000) * PX_PER_M;
    ctx.fillStyle = w.loadbearing !== false ? 'rgba(201,151,59,0.3)' : 'rgba(150,150,180,0.3)';
    ctx.strokeStyle = w.loadbearing !== false ? '#c9973b' : '#888';
    ctx.lineWidth = 1.5 * scale2d;
    ctx.fillRect(x, y, l, thk);
    ctx.strokeRect(x, y, l, thk);
    ctx.fillStyle = '#ccc'; ctx.font = `${9 * scale2d}px sans-serif`; ctx.textAlign = 'left';
    ctx.fillText(w.name, x + 4 * scale2d, y + thk / 2 + 3 * scale2d);
  });

  // Draw columns
  elements.columns.forEach((c, i) => {
    const x = 3 + (i % 5) * 6, y = 3 + Math.floor(i / 5) * 6;
    const cx = x * PX_PER_M, cy = y * PX_PER_M;
    const ww = ((c.width || 400) / 1000) * PX_PER_M, dd = ((c.depth || 400) / 1000) * PX_PER_M;
    ctx.fillStyle = 'rgba(90,126,201,0.4)';
    ctx.strokeStyle = '#5a7ec9'; ctx.lineWidth = 1.5 * scale2d;
    if (c.type === '圆形') {
      ctx.beginPath(); ctx.arc(cx + ww / 2, cy + dd / 2, ww / 2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    } else {
      ctx.fillRect(cx, cy, ww, dd);
      ctx.strokeRect(cx, cy, ww, dd);
    }
    ctx.fillStyle = '#ccc'; ctx.font = `${9 * scale2d}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(c.name, cx + ww / 2, cy + dd + 12 * scale2d);
  });

  // Draw beams (lines between columns)
  elements.beams.forEach((b, i) => {
    const x1 = 3 * PX_PER_M, y1 = (3 + i * 1.5) * PX_PER_M;
    const x2 = (3 + (b.length || 4)) * PX_PER_M, y2 = y1;
    ctx.strokeStyle = 'rgba(74,158,110,0.7)'; ctx.lineWidth = 3 * scale2d;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.fillStyle = '#4a9e6e'; ctx.font = `${9 * scale2d}px sans-serif`;
    ctx.fillText(b.name, (x1 + x2) / 2, y1 - 6 * scale2d);
  });

  // Draw slabs (transparent rectangles)
  elements.slabs.forEach((s, i) => {
    const x = (i % 3) * 8 * PX_PER_M, y = 8 + Math.floor(i / 3) * 6 * PX_PER_M;
    const side = Math.sqrt(s.area || 20) * PX_PER_M;
    ctx.fillStyle = 'rgba(201,122,59,0.2)';
    ctx.strokeStyle = '#c97a3b'; ctx.lineWidth = 1 * scale2d;
    ctx.setLineDash([4 * scale2d, 2 * scale2d]);
    ctx.fillRect(x, y, side, side);
    ctx.strokeRect(x, y, side, side);
    ctx.setLineDash([]);
    ctx.fillStyle = '#c97a3b'; ctx.font = `${9 * scale2d}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(s.name, x + side / 2, y + side / 2);
  });

  ctx.restore();

  const totalCount = elements.walls.length + elements.beams.length + elements.columns.length + elements.slabs.length + elements.foundations.length;
  document.getElementById('status-left').textContent = `${totalCount} 个结构元素`;
}

// 2D zoom/pan
c2d.addEventListener('wheel', function(e) {
  e.preventDefault();
  scale2d = Math.max(0.15, Math.min(4, scale2d + e.deltaY * -0.001));
  draw2D();
});
c2d.addEventListener('mousedown', function(e) {
  if (e.button === 2) {
    panStart = { x: e.clientX, y: e.clientY };
    panOrig = { x: offset2d.x, y: offset2d.y };
  }
});
window.addEventListener('mousemove', function(e) {
  if (panStart) {
    offset2d.x = panOrig.x + (e.clientX - panStart.x) / scale2d;
    offset2d.y = panOrig.y + (e.clientY - panStart.y) / scale2d;
    draw2D();
  }
});
window.addEventListener('mouseup', function() { panStart = null; });
c2d.addEventListener('contextmenu', function(e) { e.preventDefault(); });

// ═══════════════════════════════════════════
// 3D THREE.JS VIEWER
// ═══════════════════════════════════════════
let scene, camera, renderer3d, controls3d;

function init3D() {
  const wrap = document.getElementById('canvas-3d-wrap');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  camera = new THREE.PerspectiveCamera(55, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
  camera.position.set(15, 10, 15);
  camera.lookAt(8, 1.5, 8);

  const canvas = document.getElementById('c3d');
  renderer3d = new THREE.WebGLRenderer({ antialias: true, canvas });
  renderer3d.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer3d.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer3d.shadowMap.enabled = true;

  controls3d = new OrbitControls(camera, renderer3d.domElement);
  controls3d.enableDamping = true;
  controls3d.dampingFactor = 0.1;
  controls3d.target.set(8, 1.5, 8);
  controls3d.update();

  // Lights
  const amb = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(amb);
  const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
  sun.position.set(15, 20, 5);
  sun.castShadow = true;
  sun.shadow.mapSize.set(512, 512);
  scene.add(sun);
  const hem = new THREE.HemisphereLight(0x87ceeb, 0x444422, 0.4);
  scene.add(hem);

  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(30, 30);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.set(10, -0.01, 10);
  ground.receiveShadow = true;
  scene.add(ground);

  window.addEventListener('resize', function() {
    resize2D();
    const ww = wrap.clientWidth, wh = wrap.clientHeight;
    camera.aspect = ww / wh;
    camera.updateProjectionMatrix();
    renderer3d.setSize(ww, wh);
  });

  animate3D();
}

function animate3D() {
  requestAnimationFrame(animate3D);
  controls3d.update();
  renderer3d.render(scene, camera);
}

let meshGroup = null;

function syncTo3D() {
  if (!scene) return;
  if (meshGroup) scene.remove(meshGroup);
  meshGroup = new THREE.Group();

  // Walls
  elements.walls.forEach((w, i) => {
    const x = (i % 4) * 6, z = Math.floor(i / 4) * 6;
    const l = w.length || 3, h = w.height || 2.8, thk = (w.thickness || 240) / 1000;
    const geo = new THREE.BoxGeometry(l, h, thk);
    const color = w.loadbearing !== false ? 0xc9973b : 0x888888;
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7, transparent: true, opacity: 0.8 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x + l / 2, h / 2, z + thk / 2);
    mesh.castShadow = true; mesh.receiveShadow = true;
    meshGroup.add(mesh);
  });

  // Columns
  elements.columns.forEach((c, i) => {
    const x = 3 + (i % 5) * 6, z = 3 + Math.floor(i / 5) * 6;
    const ww = (c.width || 400) / 1000, dd = (c.depth || 400) / 1000, h = c.height || 3;
    let geo;
    if (c.type === '圆形') {
      geo = new THREE.CylinderGeometry(ww / 2, ww / 2, h, 16);
    } else {
      geo = new THREE.BoxGeometry(ww, h, dd);
    }
    const mat = new THREE.MeshStandardMaterial({ color: 0x5a7ec9, roughness: 0.5 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x + ww / 2, h / 2, z + dd / 2);
    mesh.castShadow = true; mesh.receiveShadow = true;
    meshGroup.add(mesh);
  });

  // Beams
  elements.beams.forEach((b, i) => {
    const l = b.length || 4, bw = (b.width || 250) / 1000, bh = (b.height || 500) / 1000;
    const x = 3, z = 3 + i * 1.5;
    const geo = new THREE.BoxGeometry(l, bh, bw);
    const mat = new THREE.MeshStandardMaterial({ color: 0x4a9e6e, roughness: 0.5 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x + l / 2, 3, z);
    mesh.castShadow = true; mesh.receiveShadow = true;
    meshGroup.add(mesh);
  });

  // Slabs
  elements.slabs.forEach((s, i) => {
    const x = (i % 3) * 8, z = 8 + Math.floor(i / 3) * 6;
    const side = Math.sqrt(s.area || 20), thk = (s.thickness || 150) / 1000;
    const geo = new THREE.BoxGeometry(side, thk, side);
    const mat = new THREE.MeshStandardMaterial({ color: 0xc97a3b, roughness: 0.6, transparent: true, opacity: 0.7 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x + side / 2, 3.2, z + side / 2);
    mesh.castShadow = true; mesh.receiveShadow = true;
    meshGroup.add(mesh);
  });

  scene.add(meshGroup);
  document.getElementById('status-right').textContent = '3D 已同步';
  setTimeout(() => { document.getElementById('status-right').textContent = '就绪'; }, 2000);
}

// ═══════════════════════════════════════════
// IFC EXPORT
// ═══════════════════════════════════════════
async function exportIFC() {
  if (!projectId) {
    alert('请先通过 URL 参数指定 project_id，如 ?project_id=xxx');
    return;
  }
  if (!checkAuth()) return;

  const progress = document.getElementById('ifc-progress');
  progress.style.display = 'block';
  progress.textContent = '⏳ IFC 导出中...';

  try {
    const blob = await ApiClient.exportStructuralIFC(projectId);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `structural-${projectId.slice(0, 8)}.ifc`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    progress.textContent = '✅ IFC 导出完成';
  } catch (e) {
    progress.textContent = '❌ IFC 导出失败: ' + e.message;
    console.error('IFC export error:', e);
  }
  setTimeout(() => { progress.style.display = 'none'; }, 3000);
}
