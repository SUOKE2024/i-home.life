<script>
(function() {
  // ============ 初始化 ============
  const params = new URLSearchParams(window.location.search);
  const role = params.get('role') || 'owner';

  // 角色 → 显示名称映射 (D-5 修复: role 参数应影响欢迎消息的角色标识)
  const ROLE_DISPLAY = {
    owner: '业主',
    designer: '设计师',
    supplier: '供应商',
    foreman: '工长',
  };
  const roleLabel = ROLE_DISPLAY[role] || '业主';

  let currentUser = null;
  let projectId = null;
  let projectInfo = null;
  let allProjects = [];

  const titleEl = document.getElementById('chat-title');
  const subtitleEl = document.getElementById('chat-subtitle');
  const titleBlockEl = document.querySelector('.chat-title-block');
  const listEl = document.getElementById('message-list');
  const inputEl = document.getElementById('chat-input');
  const attachBtn = document.getElementById('attach-btn');
  const attachMenu = document.getElementById('attach-menu');
  const projectPicker = document.getElementById('project-picker');
  const projectPickerList = document.getElementById('project-picker-list');
  const projectPickerClose = document.getElementById('project-picker-close');
  const newProjectBtn = document.getElementById('new-project-btn');
  const projectPickerCreateBtn = document.getElementById('project-picker-create-btn');
  const createDialog = document.getElementById('create-project-dialog');
  const createDialogClose = document.getElementById('create-project-close');
  const createProjectForm = document.getElementById('create-project-form');
  const avatarImg = document.getElementById('chat-avatar-img');
  const searchBtn = document.getElementById('chat-search-btn');
  const searchBar = document.getElementById('search-bar');
  const searchInput = document.getElementById('search-input');
  const searchCount = document.getElementById('search-count');
  const searchClose = document.getElementById('search-close');

  const AVATAR_BASE = 'assets/images/avatars/hand-drawn-profiles/';
  const AVATAR_COUNT = 6;

  // ============ 壁纸 ============
  function loadWallpaper() {
    const wallpaperPath = 'assets/images/wallpaper/';
    const totalImages = 18;
    const stored = localStorage.getItem('wallpaper');
    let selected;
    if (stored) {
      selected = stored;
    } else {
      const session = sessionStorage.getItem('wallpaper_random');
      if (session) {
        selected = session;
      } else {
        const idx = Math.floor(Math.random() * totalImages) + 2640;
        selected = `IMG_${idx}.webp`;
        sessionStorage.setItem('wallpaper_random', selected);
      }
    }
    document.getElementById('wallpaper-layer').style.backgroundImage = `url('${wallpaperPath}${selected}')`;
  }

  // ============ 头像 ============
  function randomAvatar() {
    const idx = Math.floor(Math.random() * AVATAR_COUNT) + 1;
    return `${idx}.png`;
  }

  function loadAvatar() {
    const stored = localStorage.getItem('avatar');
    const filename = stored || randomAvatar();
    avatarImg.src = AVATAR_BASE + filename;
  }

  // ============ 消息渲染 ============
  let _lastRenderedDate = null;
  let _lastSenderKey = null;

  function _getSenderKey(msg) {
    if (msg.type === 'system') return 'system';
    if (msg.is_self) return 'user';
    return msg.agent || 'unknown';
  }

  function _getDateKey(ts) {
    if (!ts) return null;
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  function _fmtDateLabel(dateKey) {
    if (!dateKey) return '';
    const today = new Date();
    const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    const yestKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth() + 1).padStart(2, '0')}-${String(yesterday.getDate()).padStart(2, '0')}`;
    if (dateKey === todayKey) return '今天';
    if (dateKey === yestKey) return '昨天';
    const parts = dateKey.split('-');
    return `${parseInt(parts[1])}月${parseInt(parts[2])}日`;
  }

  function renderMessage(msg) {
    // 自动插入日期分隔线
    const dateKey = _getDateKey(msg.timestamp);
    if (dateKey && dateKey !== _lastRenderedDate) {
      _lastRenderedDate = dateKey;
      _lastSenderKey = null; // 日期变化时重置发送者
      renderDateSeparator('── ' + _fmtDateLabel(dateKey) + ' ──');
    }

    const senderKey = _getSenderKey(msg);
    const isConsecutive = senderKey === _lastSenderKey && senderKey !== 'system';
    _lastSenderKey = senderKey;

    let html = MessageRenderers.render(msg, role);
    // 连续消息：隐藏 meta 并减小间距
    if (isConsecutive) {
      html = html.replace(/<div class="msg-meta">.*?<\/div>/s, '');
      html = html.replace('class="msg ', 'class="msg consecutive ');
    }
    listEl.insertAdjacentHTML('beforeend', html);
    listEl.scrollTop = listEl.scrollHeight;
  }

  function renderDateSeparator(dateStr) {
    const sep = document.createElement('div');
    sep.className = 'date-separator';
    sep.innerHTML = `<span>${dateStr}</span>`;
    listEl.appendChild(sep);
  }

  // ============ 下拉刷新 ============
  let _pullStartY = 0;
  let _pullDistance = 0;
  let _isPulling = false;
  const refreshIndicator = document.getElementById('refresh-indicator');
  const refreshText = refreshIndicator.querySelector('.refresh-text');
  const PULL_THRESHOLD = 60;

  listEl.addEventListener('touchstart', (e) => {
    if (listEl.scrollTop <= 0) {
      _pullStartY = e.touches[0].clientY;
      _isPulling = true;
    }
  }, { passive: true });

  listEl.addEventListener('touchmove', (e) => {
    if (!_isPulling) return;
    _pullDistance = e.touches[0].clientY - _pullStartY;
    if (_pullDistance > 0 && listEl.scrollTop <= 0) {
      refreshIndicator.classList.add('visible');
      refreshIndicator.style.height = Math.min(_pullDistance, 80) + 'px';
      if (_pullDistance >= PULL_THRESHOLD) {
        refreshText.textContent = '松开刷新';
        refreshIndicator.classList.add('ready');
      } else {
        refreshText.textContent = '下拉刷新';
        refreshIndicator.classList.remove('ready');
      }
    }
  }, { passive: true });

  listEl.addEventListener('touchend', async () => {
    if (!_isPulling) return;
    _isPulling = false;
    if (_pullDistance >= PULL_THRESHOLD && listEl.scrollTop <= 0) {
      refreshText.textContent = '刷新中…';
      refreshIndicator.classList.add('refreshing');
      // 重新加载项目消息
      try {
        _lastRenderedDate = null;
        listEl.innerHTML = '';
        listEl.appendChild(refreshIndicator);
        await loadProjectMessages();
      } catch (_) {}
      refreshIndicator.classList.remove('visible', 'ready', 'refreshing');
      refreshIndicator.style.height = '0';
      refreshText.textContent = '下拉刷新';
    } else {
      refreshIndicator.classList.remove('visible', 'ready');
      refreshIndicator.style.height = '0';
    }
    _pullDistance = 0;
  });

  // ============ 从业务数据聚合消息流 ============
  async function loadProjectMessages() {
    // 系统通知
    renderMessage({ type: 'system', content: `── ${new Date().toLocaleDateString('zh-CN')} · 项目启动 ──` });

    // 加载施工任务
    try {
      const tasks = await ApiClient.getConstructionTasks(projectId);
      const taskList = Array.isArray(tasks) ? tasks : (tasks.items || []);
      if (taskList.length > 0) {
        const t = taskList[0];
        const taskItems = (t.tasks || t.checklist || []).map(item => ({
          name: item.name || item.title || item.description || '',
          status: item.status === 'done' || item.status === 'completed' ? 'done' :
                  item.status === 'in_progress' || item.status === 'doing' ? 'in_progress' : 'pending',
        }));
        renderMessage({
          type: 'task_card', agent: 'construction', timestamp: t.created_at || new Date().toISOString(),
          payload: {
            title: t.title || t.name || '施工任务',
            tasks: taskItems.length > 0 ? taskItems : [{ name: '等待任务分配', status: 'pending' }],
          },
        });
      }
    } catch (e) {
      // 施工任务不可达时跳过
    }

    // 加载预算
    try {
      const budget = await ApiClient.getBudget(projectId);
      const total = budget.total_estimated || 0;
      const spent = budget.total_actual || 0;
      if (budget && total) {
        renderMessage({
          type: 'budget', agent: 'budget', timestamp: new Date().toISOString(),
          payload: {
            total: total,
            spent: spent,
            remaining: total - spent,
            note: budget.status ? `预算状态：${budget.status}` : '预算概况',
          },
        });
      }
    } catch (e) {
      // 预算不可达时跳过
    }

    // 加载变更单（审批卡片）
    try {
      const changeOrders = await ApiClient.getChangeOrders(projectId);
      const orders = Array.isArray(changeOrders) ? changeOrders : (changeOrders.items || []);

    try {

          type: 'bom', agent: 'procurement', timestamp: new Date().toISOString(),

            title: 'BOM 物料清单',
            project_id: projectId,
            items: items,
            total_price: totalPrice,
          },

      }

      // BOM 不可达时跳过
    }

    // F15 加载支付进度卡片
    try {
      const schedule = await ApiClient.getPaymentSchedule(projectId);
      const stages = Array.isArray(schedule) ? schedule : [];
      if (stages.length > 0) {
        const totalPaid = stages.reduce((s, st) => s + (st.paid_amount || 0), 0);

    try {

        ApiClient.getComparison(cmp.id).then(detail => {

          renderMessage({

              product: `比价报告 ${cmp.report_no || ''}（${cmp.item_count || 0} 项）`,

    try {

      const orderList = Array.isArray(orders) ? orders : (orders.items || []);
      for (const order of orderList.slice(0, 5)) {

    // 加载样品索要卡片（F34）

    // 加载历史 IM 消息（F40 三方协作，支持无限滚动）
    let _historyHasMore = true;
    let _historyLoadedCount = 0;
    const HISTORY_PAGE_SIZE = 100;

    async function loadHistoryMessages() {
      if (!_historyHasMore || !projectId) return;
      try {
        const history = await ApiClient.getChatMessages(projectId, HISTORY_PAGE_SIZE);
        const msgs = Array.isArray(history) ? history : (history.items || []);
        _historyHasMore = msgs.length >= HISTORY_PAGE_SIZE;
        _historyLoadedCount += msgs.length;

        const roleToAgent = {
          homeowner: 'master', owner: 'master', admin: 'master',
          designer: 'design',
          contractor: 'construction', foreman: 'construction',
          supplier: 'procurement',
        };

        if (msgs.length === 0) return;

        // 记录插入前的滚动高度
        const prevScrollHeight = listEl.scrollHeight;

        if (_historyLoadedCount === msgs.length) {
          // 首次加载：显示日期分隔线
          renderDateSeparator('── 协作消息 ──');
        }

        msgs.forEach(m => {
          const isSelf = currentUser && m.sender_id === currentUser.id;
          const agentKey = roleToAgent[m.sender_role] || 'master';
          renderMessage({
            type: 'text',
            is_self: !!isSelf,
            agent: isSelf ? null : agentKey,
            display_name: isSelf ? null : m.sender_name,
            timestamp: m.created_at || new Date().toISOString(),
            content: m.content,
          });
          IMClient.markRendered(m.id);
        });

        // 保持滚动位置（仅在非首次加载时）
        if (_historyLoadedCount > msgs.length) {
          listEl.scrollTop = listEl.scrollHeight - prevScrollHeight;
        }
      } catch (e) {
        // 历史消息不可达时跳过
        _historyHasMore = false;
      }
    }

    await loadHistoryMessages();

    // 总控 Agent 欢迎消息

      content: `欢迎，${currentUser?.name || roleLabel}。我是总控 Agent，已协调 9 个 AI 智能体为你的项目服务。你可以直接在群里提问，例如"现在预算还剩多少"或"施工进度怎么样"。`,
    });

    // 建立 WebSocket 实时连接（在历史消息加载后，避免顺序错乱）
    _connectIM();

    // 无限滚动：滚动到顶部时加载更多历史
    let _isLoadingHistory = false;
    listEl.addEventListener('scroll', () => {
      if (listEl.scrollTop < 80 && !_isLoadingHistory && _historyHasMore) {
        _isLoadingHistory = true;
        loadHistoryMessages().finally(() => {
          _isLoadingHistory = false;
        });
      }
    }, { passive: true });
  }

  // ============ WebSocket 实时消息 ============
  function _connectIM() {
    const token = ApiClient.getToken();
    if (!token || !projectId) return;
    // 已连接且项目相同则跳过
    if (IMClient.ws && IMClient.ws.readyState === WebSocket.OPEN && IMClient.projectId === projectId) return;
    // 项目切换时先关闭旧连接
    if (IMClient.ws && IMClient.projectId !== projectId) {
      IMClient.close();
      IMClient.maxReconnect = 5; // 重置重连上限
    }

    IMClient.on('chat.message', (data) => {
      _handleIncomingIM(data);
    });

    IMClient.connect(token, projectId, currentUser?.id || '').catch(() => {
      // 连接失败不阻塞，后续会自动重连
    });
  }

  function _handleIncomingIM(data) {
    // data: ChatMessageResponse { id, sender_id, sender_name, sender_role, content, ... }
    const msgId = data.id;
    // 防重复（自己发送的消息会被服务端广播回来）
    if (IMClient.hasRendered(msgId)) return;
    IMClient.markRendered(msgId);

    const isSelf = currentUser && data.sender_id === currentUser.id;
    const roleToAgent = {
      homeowner: 'master', owner: 'master', admin: 'master',
      designer: 'design',
      contractor: 'construction', foreman: 'construction',
      supplier: 'procurement',
    };
    const agentKey = roleToAgent[data.sender_role] || 'master';

    // 页面非激活时显示通知 toast
    if (document.hidden && !isSelf) {
      _showNotificationToast(data.sender_name || agentKey, data.content);
    }

    renderMessage({
      type: 'text',
      is_self: !!isSelf,
      agent: isSelf ? null : agentKey,
      display_name: isSelf ? null : data.sender_name,
      timestamp: data.created_at || new Date().toISOString(),
      content: data.content,
    });
  }

  // 页面卸载时关闭 WS
  window.addEventListener('beforeunload', () => {
    if (IMClient.ws) IMClient.close();
  });

  // 新消息通知 toast
  let _toastTimer = null;
  function _showNotificationToast(sender, content) {
    const toast = document.getElementById('notification-toast');
    const senderEl = document.getElementById('nt-sender');
    const contentEl = document.getElementById('nt-content');
    senderEl.textContent = sender;
    contentEl.textContent = (content || '').slice(0, 60);
    toast.hidden = false;
    toast.classList.add('show');
    // 点击 toast 聚焦页面
    toast.onclick = () => window.focus();
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => { toast.hidden = true; }, 300);
    }, 3500);
  }

  // ============ 右键菜单 ============
  const contextMenu = document.getElementById('context-menu');
  let _ctxTarget = null;

  listEl.addEventListener('contextmenu', (e) => {
    const bubble = e.target.closest('.msg-bubble');
    if (!bubble) {
      // 在非 bubble 区域右键，保持默认行为
      hideContextMenu();
      return;
    }
    e.preventDefault();
    _ctxTarget = bubble;
    // 定位菜单
    const x = Math.min(e.clientX, window.innerWidth - 160);
    const y = Math.min(e.clientY, window.innerHeight - 60);
    contextMenu.style.left = x + 'px';
    contextMenu.style.top = y + 'px';
    contextMenu.removeAttribute('hidden');
  });

  contextMenu.addEventListener('click', async (e) => {
    const item = e.target.closest('.context-item');
    if (!item) return;
    const action = item.dataset.action;
    if (action === 'copy' && _ctxTarget) {
      try {
        await navigator.clipboard.writeText(_ctxTarget.textContent.trim());
        item.textContent = '✓ 已复制';
        setTimeout(() => { item.textContent = '📋 复制文本'; }, 1500);
      } catch (_) {
        item.textContent = '✗ 复制失败';
        setTimeout(() => { item.textContent = '📋 复制文本'; }, 1500);
      }
    } else if (action === 'quote' && _ctxTarget) {
      // 获取消息文本和发送者
      const msgEl = _ctxTarget.closest('.msg');
      const metaEl = msgEl?.querySelector('.msg-meta strong');
      const sender = metaEl ? metaEl.textContent.trim() : '消息';
      const text = _ctxTarget.textContent.trim();
      const quoteText = text.length > 80 ? text.substring(0, 80) + '…' : text;
      // 构建引用格式插入输入框
      const currentVal = inputEl.value;
      const quote = `> ${sender}: ${quoteText}\n`;
      inputEl.value = currentVal + (currentVal && !currentVal.endsWith('\n') ? '\n' : '') + quote;
      inputEl.focus();
      inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length);
      // 触发 input 事件以保存草稿
      inputEl.dispatchEvent(new Event('input', { bubbles: true }));
      item.textContent = '✓ 已插入引用';
      setTimeout(() => { item.textContent = '💬 引用回复'; }, 1500);
    }
    hideContextMenu();
  });

  function hideContextMenu() {
    contextMenu.setAttribute('hidden', '');
    _ctxTarget = null;
  }

  });

  // ============ 发送消息 ============
  async function sendMessage(text) {
    if (!text.trim()) return;
    const content = text.trim();
    // 渲染用户消息（乐观渲染）
    renderMessage({
      type: 'text', is_self: true, timestamp: new Date().toISOString(), content,
    });
    inputEl.value = '';
    clearDraft();

    // 持久化到 IM（F40 三方协作）—— 让其他端实时可见
    if (projectId) {
      const mentions = extractMentions(content);
      ApiClient.sendChatMessage({
        project_id: projectId,
        content,
        message_type: 'text',
        ...(mentions.length > 0 ? { mentions } : {}),
      }).then(resp => {
        // 标记已渲染，防止 WebSocket 回推重复
        if (resp && resp.id) IMClient.markRendered(resp.id);
      }).catch(() => {
        // IM 持久化失败不阻塞 Agent 回复
      });
    }

    // 自然语言路由
    const route = AgentRouter.route(text);
    // 映射 agent key 到后端 agent_type
    const agentTypeMap = {
      master: 'orchestrator',
      design: 'designer',
      budget: 'budget',
      procurement: 'procurement',
      construction: 'construction',
      quality: 'qa_inspector',
      settlement: 'settlement',
      support: 'concierge',
      admin: 'admin',
    };
    const agentType = agentTypeMap[route.agent] || 'orchestrator';

    // 后端 agent_type → 前端 agent key（单一定义，全局复用）
    const reverseMap = {
      orchestrator: 'master', designer: 'design', budget: 'budget',
      procurement: 'procurement', construction: 'construction',
      qa_inspector: 'quality', settlement: 'settlement', concierge: 'support',
      admin: 'admin', content_publisher: 'procurement',
    };

    // 从消息流提取最近 10 轮对话（最多 20 条消息）作为上下文
    const history = [];
    const historyMsgs = listEl.querySelectorAll('.msg');
    const recentMsgs = Array.from(historyMsgs).slice(-20);
    recentMsgs.forEach(el => {
      const isSelf = el.classList.contains('user');
      const bubble = el.querySelector('.msg-bubble');
      if (!bubble) return;
      let agentT = '';
      if (!isSelf) {
        const m = el.className.match(/agent-(\S+)/);
        if (m) agentT = m[1];
      }
      history.push({
        role: isSelf ? 'user' : 'assistant',
        content: bubble.textContent.trim().slice(0, 500),
        agent_type: agentT,
      });
    });

    // 流式响应（有项目时使用 SSE 流式）
    if (projectId) {
      // 创建打字指示器占位
      const agentInfo = AgentRouter.getAgentInfo('master');
      const typingHTML = `<div class="msg agent agent-master" id="streaming-placeholder">
        <div class="msg-meta"><strong style="color:${agentInfo.color}">${agentInfo.emoji} ${agentInfo.name} Agent</strong> · ${MessageRenderers._fmtTime(new Date().toISOString())}</div>
        <div class="msg-bubble typing-indicator">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      </div>`;
      listEl.insertAdjacentHTML('beforeend', typingHTML);
      listEl.scrollTop = listEl.scrollHeight;

      async function streamChat() {
        try {
          const token = ApiClient.getToken();
          const resp = await fetch(ApiClient.BASE_URL + '/api/agents/chat/stream', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + token,
            },
            body: JSON.stringify({
              message: text,
              agent_type: agentType,
              project_id: projectId,
              history: history,
            }),
          });
          if (!resp.ok) throw new Error('Stream request failed: ' + resp.status);

          // 找到占位消息元素并更新
          const placeholder = document.getElementById('streaming-placeholder');
          if (!placeholder) return;
          const bubble = placeholder.querySelector('.msg-bubble');
          if (!bubble) return;

          // 将打字指示器替换为文本内容
          bubble.classList.remove('typing-indicator');
          bubble.innerHTML = '';
          bubble.textContent = '';
          let fullContent = '';

          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = JSON.parse(line.slice(6));
                if (data.event === 'meta') {
                  // 更新 agent 类型和 meta 信息
                  const agentKey = data.agent_type || 'master';
                  const frontendKey = reverseMap[agentKey] || 'master';
                  placeholder.className = placeholder.className.replace(/agent-\S+/, 'agent-' + frontendKey);
                  const ai = AgentRouter.getAgentInfo(frontendKey);
                  const metaEl = placeholder.querySelector('.msg-meta strong');
                  if (metaEl) {
                    metaEl.textContent = ai.emoji + ' ' + ai.name + ' Agent';
                    metaEl.style.color = ai.color;
                  }
                } else if (data.event === 'token') {
                  fullContent += data.content;
                  bubble.textContent = fullContent;
                  listEl.scrollTop = listEl.scrollHeight;
                }
                // done 事件无需处理
              }
            }
          }
          // 移除 ID 属性，变为普通消息
          placeholder.removeAttribute('id');
        } catch (e) {
          console.error('Stream chat error:', e);
          // 移除占位
          const placeholder = document.getElementById('streaming-placeholder');
          if (placeholder) {
            const bubble = placeholder.querySelector('.msg-bubble');
            if (bubble && (bubble.classList.contains('typing-indicator') || bubble.textContent === '')) {
              placeholder.remove();
            }
          }
          // 流式失败，降级到非流式 API
          try {
            const resp = await ApiClient.chatWithAgent(text, agentType, projectId, history);
            if (resp.reply) {
              const agentKey = reverseMap[resp.agent_type] || route.agent;
              renderMessage({
                type: 'text', agent: agentKey, timestamp: new Date().toISOString(),
                content: resp.reply,
              });
              if (resp.suggestions && resp.suggestions.length > 0) {
                renderMessage({
                  type: 'text', agent: agentKey, timestamp: new Date().toISOString(),
                  content: '💡 ' + resp.suggestions.join(' / '),
                });
              }
            }
          } catch (err2) {
            renderMessage({
              type: 'text', agent: 'master', timestamp: new Date().toISOString(),
              content: '抱歉，AI 服务暂时不可用，请稍后重试。'
            });
          }
        }
      }

      streamChat();
      return;
    }

    // 调用后端 Agent Chat API
    try {
      const resp = await ApiClient.chatWithAgent(text, agentType, projectId, history);
      if (resp.reply) {
        // 映射 agent_type 回前端 agent key
        const agentKey = reverseMap[resp.agent_type] || route.agent;
        renderMessage({
          type: 'text', agent: agentKey, timestamp: new Date().toISOString(),
          content: resp.reply,
        });
        // 渲染建议
        if (resp.suggestions && resp.suggestions.length > 0) {
          renderMessage({
            type: 'text', agent: agentKey, timestamp: new Date().toISOString(),
            content: '💡 ' + resp.suggestions.join(' / '),
          });
        }
      }
    } catch (err) {
      // 后端不可达，本地路由回复
      if (route.payload && route.payload.clarify) {
        renderMessage({
          type: 'text', agent: 'master', timestamp: new Date().toISOString(),

          content: `（${agentInfo.emoji} ${agentInfo.name} Agent 暂时离线）请稍后重试。`,
        });
      }
    }
  }

  // 位置共享
  async function shareLocation() {
    if (!projectId) {
      renderMessage({
        type: 'text', agent: 'master', timestamp: new Date().toISOString(),
        content: '请先选择或创建项目。',
      });
      return;
    }
    renderMessage({
      type: 'text', is_self: true, timestamp: new Date().toISOString(),
      content: '📍 正在获取位置…',
    });
    try {
      // 使用浏览器 Geolocation API
      const pos = await new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error('浏览器不支持定位'));
          return;
        }
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true, timeout: 10000, maximumAge: 60000,
        });
      });
      const { latitude, longitude } = pos.coords;
      // 逆地理编码获取地址
      let address = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
      try {
        const geo = await ApiClient.geocodeLocation(`${longitude},${latitude}`);
        if (geo.result && geo.result.formatted_address) {
          address = geo.result.formatted_address;
        }
      } catch (_) {}
      renderMessage({
        type: 'text', is_self: true, timestamp: new Date().toISOString(),
        content: `📍 ${address}\n🗺 https://uri.amap.com/marker?position=${longitude},${latitude}`,
      });
    } catch (err) {
      // 定位失败，提供手动输入搜索
      const query = prompt('无法自动定位。请输入地址搜索：', '');
      if (!query || !query.trim()) return;
      try {
        const result = await ApiClient.autocompleteLocation(query.trim());
        const pois = result.pois || [];
        if (pois.length > 0) {
          const p = pois[0];
          renderMessage({
            type: 'text', is_self: true, timestamp: new Date().toISOString(),
            content: `📍 ${p.name} · ${p.address}\n🗺 https://uri.amap.com/marker?position=${p.location}`,
          });
        } else {
          renderMessage({
            type: 'text', agent: 'master', timestamp: new Date().toISOString(),
            content: `未找到"${query}"的相关位置。`,
          });
        }
      } catch (_) {
        renderMessage({
          type: 'text', agent: 'master', timestamp: new Date().toISOString(),
          content: '位置服务暂时不可用。',
        });
      }
    }
  }

  function renderMentionPopup(filter) {
    const filtered = filter
      ? AGENTS.filter(a => a.key.includes(filter) || a.name.includes(filter) || a.emoji.includes(filter))
      : AGENTS;
    // 非管理员不显示管理 Agent

    mentionPopup.innerHTML = visible.map((a, i) =>
      `<div class="mention-item${i === mentionIdx ? ' active' : ''}" data-key="${a.key}" data-idx="${i}" role="option" aria-selected="${i === mentionIdx}">

        <span class="mention-item-name" style="color:${a.color}">${a.name}</span>

  }

  function closeMentionPopup() {
    mentionPopup.classList.remove('open');
    mentionActive = false;
    mentionIdx = -1;

  function insertMention(agentKey) {
    const val = inputEl.value;
    const pos = mentionCursorPos;
    // 找到 @ 开始的位置
    const beforeAt = val.lastIndexOf('@', pos - 1);
    if (beforeAt === -1) {
      closeMentionPopup();
      return;
    }
    const before = val.slice(0, beforeAt);
    const after = val.slice(pos);
    const mentionText = `@${agentKey} `;
    inputEl.value = before + mentionText + after;
    // 光标定位到插入文本之后
    const newPos = before.length + mentionText.length;
    inputEl.setSelectionRange(newPos, newPos);
    inputEl.focus();
    closeMentionPopup();
  }

  inputEl.addEventListener('input', (e) => {
    const val = inputEl.value;
    const pos = inputEl.selectionStart;
    // 从光标位置往前找 @
    const beforeCursor = val.slice(0, pos);
    const atIdx = beforeCursor.lastIndexOf('@');
    if (atIdx === -1) {
      closeMentionPopup();
      return;
    }
    // 检查 @ 之后到光标之间有没有空格（空格表示 mention 已结束）
    const afterAt = beforeCursor.slice(atIdx + 1);
    if (afterAt.includes(' ')) {
      closeMentionPopup();
      return;
    }
    // 激活 mention
    mentionActive = true;
    mentionCursorPos = pos;
    mentionFilter = afterAt.toLowerCase();
    mentionIdx = -1;
    renderMentionPopup(mentionFilter);
  });

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      mentionIdx = Math.min(mentionIdx + 1, items.length - 1);
      renderMentionPopup(mentionFilter);
      items[mentionIdx]?.scrollIntoView({ block: 'nearest' });
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      mentionIdx = Math.max(mentionIdx - 1, 0);
      renderMentionPopup(mentionFilter);
      items[mentionIdx]?.scrollIntoView({ block: 'nearest' });
      return;
    }
    if (e.key === 'Enter' && !e.shiftKey && mentionIdx >= 0) {
      e.preventDefault();
      const activeItem = items[mentionIdx];
      if (activeItem) {
        insertMention(activeItem.dataset.key);
      }
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      closeMentionPopup();
      return;
    }
  });

  // 提取消息中的 mentions
  function extractMentions(text) {
    const re = /@(\w+)/g;
    const keys = [];
    let m;
    while ((m = re.exec(text)) !== null) {
      if (AGENTS.some(a => a.key === m[1]) && !keys.includes(m[1])) {
        keys.push(m[1]);
      }
    }
    return keys;
  }

  async function pollAIJobStatus(batchId) {
    const token = ApiClient.getToken();
    let pollCount = 0;
    const maxPolls = 60; // 最多轮询 5 分钟

    const check = async () => {
      if (pollCount >= maxPolls) {
        batchResultAi.textContent = '🤖 AI 文案生成超时，请稍后检查产品状态';
        return;
      }
      pollCount++;
      try {
        const resp = await fetch(ApiClient.BASE_URL + `/api/products/batch/ai-jobs/${batchId}`, {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (!resp.ok) return;
        const job = await resp.json();
        if (job.in_progress) {
          batchResultAi.textContent = `🤖 AI 文案生成中... ${job.completed}/${job.total} 完成`;
          setTimeout(check, 5000);
        } else {
          batchResultAi.textContent = `✅ AI 文案生成完成: ${job.completed} 成功${job.failed > 0 ? ` / ${job.failed} 失败` : ''}`;
        }
      } catch (_) {
        batchResultAi.textContent = '🤖 AI 文案生成中...';
      }
    };
    setTimeout(check, 3000);

  function _buildRecognitionResultCard(result) {

    return `
      <div class="msg-card" style="border-color:var(--accent);margin-top:0">
        <div class="msg-card-title">📦 ${_escape(result.name || '未识别')}</div>

        ${result.suggested_price ? `<div class="msg-card-row"><span>建议价格</span><strong style="color:var(--warning)">¥${result.suggested_price}/${result.suggested_unit || '个'}</strong></div>` : ''}
        ${tags ? `<div class="product-tags">${tags}</div>` : ''}
        ${fallbackNote}
        <div class="product-actions" style="margin-top:8px">
          <button class="approval-btn approve" onclick="confirmCameraProduct('${_escape((result.name || '').replace(/'/g, '\\\''))}', '${_escape(result.category_code || 'other')}', '${_escape(result.category_cn || '')}', '${_escape(result.material || '')}', '${_escape(result.color || '')}', '${_escape(result.style || '')}', '${result.suggested_price || 0}', '${_escape(result.suggested_unit || '个')}', '${(result.tags || []).join(',')}')">确认创建</button>

  let _searchTerm = '';

  function openSearch() {
    searchBar.hidden = false;

  function closeSearch() {
    searchBar.hidden = true;
    searchInput.value = '';
    _searchTerm = '';

  function _clearSearchHighlights() {
    listEl.querySelectorAll('.msg.dimmed').forEach(el => el.classList.remove('dimmed'));
    listEl.querySelectorAll('.search-highlight').forEach(el => {
      const parent = el.parentNode;
      parent.replaceChild(document.createTextNode(el.textContent), el);
      parent.normalize();
    });
  }

  function _highlightText(textNode, term) {
    // Only apply to text nodes inside .msg-bubble
    const text = textNode.textContent;
    const lower = text.toLowerCase();
    const idx = lower.indexOf(term);
    if (idx === -1) return;
    const fragment = document.createDocumentFragment();
    fragment.appendChild(document.createTextNode(text.slice(0, idx)));
    const mark = document.createElement('span');
    mark.className = 'search-highlight';
    mark.textContent = text.slice(idx, idx + term.length);
    fragment.appendChild(mark);
    fragment.appendChild(document.createTextNode(text.slice(idx + term.length)));
    textNode.parentNode.replaceChild(fragment, textNode);
  }

  function _findTextNodes(el) {
    const nodes = [];
    const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
    let node;
    while ((node = walker.nextNode())) {
      if (node.textContent.trim()) nodes.push(node);
    }
    return nodes;
  }

  function performSearch() {
    const term = searchInput.value.trim().toLowerCase();
    if (term === _searchTerm) return;
    _searchTerm = term;

    // Clear previous highlights and dims
    _clearSearchHighlights();

    if (!term) {
      searchCount.textContent = '';
      return;
    }

    let matchCount = 0;
    let firstMatchEl = null;

    const msgEls = listEl.querySelectorAll('.msg');
    msgEls.forEach(el => {
      // Skip system messages, date-separator children, card messages (not .msg-bubble text)
      if (el.classList.contains('system')) {
        el.classList.add('dimmed');
        return;
      }

      const bubble = el.querySelector('.msg-bubble');
      if (!bubble) {
        el.classList.add('dimmed');
        return;
      }

      // Skip card-type messages (msg-card wrapper)
      const cardWrapper = el.querySelector('.msg-card');
      if (cardWrapper) {
        el.classList.add('dimmed');
        return;
      }

      // Check for text content matching
      const text = bubble.textContent.toLowerCase();
      if (text.includes(term)) {
        el.classList.remove('dimmed');
        matchCount++;

        // Apply highlights to matching text nodes
        const textNodes = _findTextNodes(bubble);
        textNodes.forEach(node => {
          _highlightText(node, term);
        });

        if (!firstMatchEl) firstMatchEl = el;
      } else {
        el.classList.add('dimmed');
      }
    });

    // Update match count
    if (matchCount > 0) {
      searchCount.textContent = `找到 ${matchCount} 条匹配`;
    } else if (term) {
      searchCount.textContent = '无匹配';
    }

    // Scroll to first match
    if (firstMatchEl) {
      firstMatchEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  // Debounce helper
  let _searchTimer = null;
  function debouncedSearch() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(performSearch, 150);
  }

  searchBtn.addEventListener('click', () => {

  searchInput.addEventListener('input', debouncedSearch);

  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeSearch();
    }
  });

  searchClose.addEventListener('click', closeSearch);

  // ============ 全局键盘快捷键 ============
  document.addEventListener('keydown', (e) => {
    // Ctrl/Cmd+K → 搜索
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      openSearch();
      return;
    }

    // Ctrl/Cmd+N → 新建项目
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
      e.preventDefault();
      openCreateDialog();
      return;
    }

    // Escape → 按优先级依次关闭弹窗
    if (e.key === 'Escape') {
      // 1. 关闭搜索栏
      if (!searchBar.hidden) {
        closeSearch();
        return;
      }
      // 2. 关闭附件菜单
      if (attachMenu.classList.contains('open')) {
        attachMenu.classList.remove('open');
        attachBtn.setAttribute('aria-expanded', 'false');
        return;
      }
      // 3. 关闭 emoji 面板
      if (!emojiPanel.hidden) {
        closeEmojiPanel();
        return;
      }
      // 4. 关闭创建项目弹窗
      if (createDialog.classList.contains('open')) {
        closeCreateDialog();
        return;
      }
      // 4b. 关闭批量导入弹窗
      if (batchUploadDialog.classList.contains('open')) {
        closeBatchUploadDialog();
        return;
      }
      // 4c. 关闭拍照上架弹窗
      if (cameraScanDialog.classList.contains('open')) {
        closeCameraScanDialog();
        return;
      }
      // 5. 关闭项目选择器
      if (projectPicker.classList.contains('open')) {
        closeProjectPicker();
        return;
      }
      // 5. 关闭右键菜单
      if (!contextMenu.hasAttribute('hidden')) {
        hideContextMenu();
        return;
      }
      // 6. 关闭 mention 弹窗
      if (mentionPopup.classList.contains('open')) {
        mentionPopup.classList.remove('open');
        return;
      }
      // 7. 取消输入框焦点
      if (document.activeElement === inputEl) {
        inputEl.blur();
        return;
      }
    }
  });

  // ============ PWA 离线草稿保存 ============
  // 按项目 ID 隔离，输入时保存到 localStorage，发送后清除，页面加载时恢复
  function _draftKey() {
    return projectId ? `draft:${projectId}` : 'draft:default';
  }

  function saveDraft() {
    try {
      const val = inputEl.value;
      if (val.trim()) {
        localStorage.setItem(_draftKey(), val);
      } else {
        localStorage.removeItem(_draftKey());
      }
    } catch (_) {
      // localStorage 不可用时忽略
    }
  }

  function restoreDraft() {
    try {
      const saved = localStorage.getItem(_draftKey());
      if (saved) {
        inputEl.value = saved;
        // 触发 input 事件以激活 mention 检测和样式更新
        inputEl.dispatchEvent(new Event('input', { bubbles: true }));
        // 聚焦并定位光标到末尾
        const len = saved.length;
        inputEl.focus();
        inputEl.setSelectionRange(len, len);
        // 显示草稿恢复提示
        _showDraftRestoredToast();
      }
    } catch (_) {}
  }

  function clearDraft() {
    try { localStorage.removeItem(_draftKey()); } catch (_) {}
  }

  let _draftToastTimer = null;
  function _showDraftRestoredToast() {
    let toast = document.getElementById('draft-restored-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'draft-restored-toast';
      toast.className = 'draft-restored-toast';
      toast.setAttribute('role', 'status');
      toast.textContent = '✓ 已恢复未发送的草稿';
      document.querySelector('.workbench').appendChild(toast);
    }
    toast.classList.add('visible');
    clearTimeout(_draftToastTimer);
    _draftToastTimer = setTimeout(() => toast.classList.remove('visible'), 2500);
  }

  // 输入时保存草稿（防抖 500ms）
  let _draftSaveTimer = null;
  inputEl.addEventListener('input', () => {
    clearTimeout(_draftSaveTimer);
    _draftSaveTimer = setTimeout(saveDraft, 500);
  });
  // 页面隐藏前强制保存（移动端切后台、刷新、关闭）
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') saveDraft();
  });
  window.addEventListener('beforeunload', saveDraft);

  // ============ 初始化 ============
  async function init() {
    loadWallpaper();
    loadAvatar();
    const token = ApiClient.getToken();

    if (!token) {
      window.location.href = `login.html?role=${encodeURIComponent(role)}`;
      return;
    }

    try {
      currentUser = await ApiClient.getCurrentUser();
      // 读取自定义昵称
      const savedNick = localStorage.getItem('nickname');
      if (savedNick) currentUser.name = savedNick;
      // 获取项目列表
      const projects = await ApiClient.getProjects();
      allProjects = projects;
      if (projects.length > 0) {
        // 支持通过 URL 参数 project_id 指定项目，否则取第一个
        const requestedId = params.get('project_id');
        const selected = (requestedId && projects.find(p => p.id === requestedId)) || projects[0];
        applyProjectInfo(selected);
        if (projects.length > 0) {
          titleBlockEl.classList.add('has-switcher');
        }
        // 加载项目相关消息
        await loadProjectMessages();
        // 恢复该项目未发送的草稿（PWA 离线草稿）
        restoreDraft();
      } else {
        titleEl.textContent = '暂无项目';
        subtitleEl.textContent = '点击 + 创建项目';
        renderMessage({
          type: 'text', agent: 'master', timestamp: new Date().toISOString(),
          content: `欢迎，${currentUser?.name || roleLabel}。你还没有项目，点击下方按钮创建第一个家居项目。`,
        });
        // 插入创建项目按钮
        const ctaWrap = document.createElement('div');
        ctaWrap.className = 'msg agent';
        ctaWrap.innerHTML = `<div class="msg-bubble" style="text-align:center;padding:16px 20px;">
          <button class="btn btn-primary cp-cta-btn" style="width:auto;padding:10px 24px;font-size:14px;">+ 创建新项目</button>
        </div>`;
        listEl.appendChild(ctaWrap);
        ctaWrap.querySelector('.cp-cta-btn').addEventListener('click', openCreateDialog);
      }
    } catch (err) {
      // 认证失败或后端不可达
      titleEl.textContent = '连接失败';
      subtitleEl.textContent = '后端服务不可达';
      renderMessage({
        type: 'system', content: '── 后端服务不可达 ──',
      });
      renderMessage({
        type: 'text', agent: 'master', timestamp: new Date().toISOString(),
        content: '无法连接到后端服务。请检查网络或稍后重试。',
      });
      // 重试按钮
      const retryWrap = document.createElement('div');
      retryWrap.className = 'msg agent';
      retryWrap.innerHTML = `<div class="msg-bubble" style="text-align:center;padding:12px 20px;">
        <button class="btn btn-primary" id="retry-init-btn" style="width:auto;padding:8px 24px;font-size:13px;">重试连接</button>
      </div>`;
      listEl.appendChild(retryWrap);
      retryWrap.querySelector('#retry-init-btn').addEventListener('click', () => {
        listEl.innerHTML = '';
        titleEl.textContent = '加载中…';
        subtitleEl.textContent = '8 AI 群策群力';
        init();
      });
    }
  }

  // ── 全局错误处理 ──
  window.addEventListener('api:server-error', function(e) {
    const { status, path } = e.detail;
    // 避免在已有错误状态时重复显示
    const existing = listEl.querySelector('.server-error-banner');
    if (existing) return;
    const banner = document.createElement('div');
    banner.className = 'msg system server-error-banner';
    banner.style.cssText = 'background:rgba(201,74,74,0.08);border:1px solid var(--danger);margin:8px 12px';
    banner.innerHTML = '<div class="msg-bubble" style="color:var(--danger);font-size:12px">⚠️ 服务器异常 (HTTP ' + status + ')，请稍后重试</div>';
    listEl.appendChild(banner);
    listEl.scrollTop = listEl.scrollHeight;
    // 5 秒后自动移除
    setTimeout(() => { if (banner.parentNode) banner.remove(); }, 5000);
  });

  window.addEventListener('api:network-error', function(e) {
    const existing = listEl.querySelector('.network-error-banner');
    if (existing) return;
    const banner = document.createElement('div');
    banner.className = 'msg system network-error-banner';
    banner.style.cssText = 'background:rgba(201,151,59,0.08);border:1px solid var(--warning);margin:8px 12px';
    banner.innerHTML = '<div class="msg-bubble" style="color:var(--warning);font-size:12px">📡 ' + e.detail.message + '</div>';
    listEl.appendChild(banner);
    listEl.scrollTop = listEl.scrollHeight;
    setTimeout(() => { if (banner.parentNode) banner.remove(); }, 5000);
  });

  // 全局未捕获错误
  window.addEventListener('unhandledrejection', function(e) {
    console.error('[Workbench] 未处理的 Promise 拒绝:', e.reason);
  });

  window.addEventListener('error', function(e) {
    if (e.target === window) {
      console.error('[Workbench] 全局错误:', e.error?.message || e.message);
    }
  });

  init();
})();
</script>
