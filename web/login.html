<main class="auth-container" role="main">
  <section class="auth-card" role="form" aria-labelledby="login-title">
    <div class="auth-brand">
      <img src="assets/images/icons/desktop/suoke-logo-128.png" alt="索克家居 LOGO" style="width:56px;height:56px;margin-bottom:8px">
      <h1 id="login-title">索克家居</h1>
      <p>AI 自治运营工作台</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="phone">手机号</label>
        <input
          class="form-input"
          id="phone"
          name="phone"
          type="tel"
          inputmode="numeric"

          placeholder="请输入手机号"
          autocomplete="tel"

      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input
          class="form-input"
          id="password"
          name="password"
          type="password"
          placeholder="请输入密码"
          autocomplete="current-password"
          value="123456"
          required
          aria-required="true"
        >
      </div>

      <button type="submit" class="btn btn-primary" id="login-btn">登录</button>

      <p class="form-error" id="login-error" role="alert" hidden></p>
    </form>

<script src="assets/js/api-client.js?v=20260718b"></script>
<script>
(function() {
  // ── 登录 ──
  const form = document.getElementById('login-form');
  const phoneInput = document.getElementById('phone');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('login-btn');
  const errorEl = document.getElementById('login-error');

  // 获取 URL 参数 role
  const params = new URLSearchParams(window.location.search);
  const role = params.get('role') || 'owner';

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.hidden = false;
  }
  function clearError() {
    errorEl.hidden = true;
  }

  // 登录提交
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const phone = phoneInput.value.trim();
    const password = passwordInput.value;
    if (!/^1\d{10}$/.test(phone)) {
      showError('请输入正确的手机号');
      return;
    }
    if (!password) {
      showError('请输入密码');
      return;
    }
    clearError();
    loginBtn.disabled = true;
    loginBtn.textContent = '登录中…';
    try {
      await ApiClient.login(phone, password);
      window.location.href = `workbench.html?role=${encodeURIComponent(role)}`;
    } catch (e) {
      const msg = (e.body && (e.body.detail || (Array.isArray(e.body.detail) ? e.body.detail[0]?.msg : e.body.detail))) || '登录失败，请检查手机号和密码';
      showError(typeof msg === 'string' ? msg : JSON.stringify(msg));
      loginBtn.disabled = false;
      loginBtn.textContent = '登录';
    }
  });

  // ── 注册表单切换 ──
  const loginCard = document.querySelector('.auth-card');
  const registerCard = document.getElementById('register-card');
  const showRegister = document.getElementById('show-register');
  const showLogin = document.getElementById('show-login');
  const backToLogin = document.getElementById('back-to-login');

  showRegister.addEventListener('click', (e) => {
    e.preventDefault();
    loginCard.hidden = true;
    registerCard.hidden = false;
    showRegister.hidden = true;
    showLogin.hidden = false;
  });
  function showLoginForm() {
    loginCard.hidden = false;
    registerCard.hidden = true;
    showRegister.hidden = false;
    showLogin.hidden = true;
  }
  showLogin.addEventListener('click', (e) => { e.preventDefault(); showLoginForm(); });
  backToLogin.addEventListener('click', (e) => { e.preventDefault(); showLoginForm(); });

  // ── 工种子角色联动 ──
  const SUB_ROLES = {
    contractor: [
      { value: '', label: '-- 工长（总包） --' },
      { value: 'electrician', label: '电工' },
      { value: 'plumber', label: '水电安装工' },
      { value: 'mason', label: '泥瓦工' },
      { value: 'carpenter', label: '木工' },
      { value: 'painter', label: '油漆工' },
      { value: 'installer', label: '安装工' },
      { value: 'curtain_installer', label: '窗帘安装工' },
      { value: 'supervisor', label: '监理' },
    ],
    designer: [
      { value: '', label: '-- 通用设计师 --' },
      { value: 'curtain_designer', label: '窗帘设计师' },
    ],
  };

  const regRole = document.getElementById('reg-role');
  const regSubRole = document.getElementById('reg-sub-role');
  const regSubRoleGroup = document.getElementById('reg-sub-role-group');

  regRole.addEventListener('change', () => {
    const role = regRole.value;
    const options = SUB_ROLES[role] || [];
    if (options.length > 0) {
      regSubRole.innerHTML = options.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
      regSubRoleGroup.hidden = false;
    } else {
      regSubRoleGroup.hidden = true;
    }
  });

  // ── 注册提交 ──
  const regForm = document.getElementById('register-form');
  const regBtn = document.getElementById('register-btn');
  const regError = document.getElementById('register-error');

  function showRegError(msg) {
    regError.textContent = msg;
    regError.hidden = false;
  }
  function clearRegError() {
    regError.hidden = true;
  }

  regForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('reg-name').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const password = document.getElementById('reg-password').value;
    const roleVal = regRole.value;
    const subRole = regSubRole.value || null;

    if (!name) { showRegError('请输入姓名'); return; }
    if (!/^1\d{10}$/.test(phone)) { showRegError('请输入正确的手机号'); return; }
    if (password.length < 6) { showRegError('密码至少6位'); return; }

    clearRegError();
    regBtn.disabled = true;
    regBtn.textContent = '注册中…';

    try {
      await ApiClient.register(phone, password, name, roleVal, subRole);
      // 注册成功，跳转工作台
      window.location.href = `workbench.html?role=${encodeURIComponent(roleVal)}`;
    } catch (err) {
      const msg = (err.body && err.body.detail) || '注册失败';
      showRegError(typeof msg === 'string' ? msg : JSON.stringify(msg));
      regBtn.disabled = false;
      regBtn.textContent = '注册';
    }
  });
})();
</script>
<script>
// ═══════════════════════════════════════════
//  WebAuthn / Passkey 登录（纯原生实现，无外部库）
// ═══════════════════════════════════════════
(function() {
  const passkeyBtn = document.getElementById('passkey-login-btn');
  const passkeyIcon = document.getElementById('passkey-icon');
  const passkeyError = document.getElementById('passkey-error');
  const registerLink = document.getElementById('passkey-register-link');
  const phoneInput = document.getElementById('phone');
  const passwordInput = document.getElementById('password');
  const divider = document.querySelector('.passkey-divider');

  const params = new URLSearchParams(window.location.search);

  // ── Base64URL 编解码工具 ──
  // base64url 字符串 → ArrayBuffer（用于 challenge / credential id）
  function base64UrlToBuffer(base64url) {
    let str = String(base64url).replace(/-/g, '+').replace(/_/g, '/');
    while (str.length % 4) str += '=';
    const binary = atob(str);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    return bytes; // Uint8Array 是 ArrayBuffer 视图，navigator.credentials 直接接受
  }

  // ArrayBuffer → base64url 字符串（用于响应序列化）
  function bufferToBase64Url(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  // base64url → 标准 base64（后端个别字段需要标准 base64）
  function base64UrlToBase64(b64u) {
    let str = String(b64u).replace(/-/g, '+').replace(/_/g, '/');
    while (str.length % 4) str += '=';
    return str;
  }

  // 检测浏览器是否支持 WebAuthn
  const hasWebAuthn = typeof PublicKeyCredential !== 'undefined';

  if (!hasWebAuthn) {
    passkeyBtn.style.display = 'none';
    registerLink.style.display = 'none';
    if (divider) divider.style.display = 'none';
    return;
  }

  // WebAuthn 要求 Secure Context（HTTPS 或 localhost）
  // HTTP 模式下 Passkey 不可用，隐藏按钮并提示
  if (!window.isSecureContext) {
    passkeyBtn.style.display = 'none';
    registerLink.style.display = 'none';
    if (divider) divider.style.display = 'none';
    return;
  }

  // 检测平台认证器（Touch ID / Face ID / Windows Hello）
  // 不可用时提示但仍允许走 security key / 跨设备 hybrid
  if (typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function') {
    PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then((available) => {
      if (!available) {
        passkeyError.textContent = '未检测到生物识别器，可使用安全密钥或跨设备 Passkey';
        passkeyError.hidden = false;
        setTimeout(() => { passkeyError.hidden = true; }, 4000);
      }
    });
  }

  // Apple 设备图标（Touch ID / Face ID）
  const isMac = /Macintosh/.test(navigator.userAgent);
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  if (isMac || isIOS) {
    passkeyIcon.textContent = isMac ? '🍏' : '📱';
  }

  function showPasskeyError(msg) {
    passkeyError.textContent = msg;
    passkeyError.hidden = false;
    setTimeout(() => { passkeyError.hidden = true; }, 5000);
  }

  function setBtnLoading(text) {
    passkeyBtn.disabled = true;
    passkeyBtn.setAttribute('aria-busy', 'true');
    passkeyBtn.textContent = text;
  }

  function resetBtn(text) {
    passkeyBtn.disabled = false;
    passkeyBtn.removeAttribute('aria-busy');
    passkeyBtn.textContent = text || '🔑 使用 Passkey 登录';
  }

  // ── Passkey 登录（discoverable credentials，不传 phone） ──
  passkeyBtn.addEventListener('click', async () => {
    setBtnLoading('认证中…');
    try {
      // 1. 请求登录挑战（不带 phone，由浏览器弹出账号选择器）
      const options = await ApiClient.webauthnLoginBegin(null);

      // 2. 转换 allowCredentials 为 WebAuthn 原生格式
      const allowCredentials = (options.allowCredentials || []).map(cred => ({
        id: base64UrlToBuffer(cred.id),
        type: cred.type || 'public-key',
        transports: cred.transports || ['internal', 'hybrid'],
      }));

      setBtnLoading('请验证身份…');

      // 3. 触发浏览器 Passkey 弹窗
      const assertion = await navigator.credentials.get({
        publicKey: {
          challenge: base64UrlToBuffer(options.challenge),
          timeout: options.timeout || 60000,
          rpId: options.rpId,
          allowCredentials: allowCredentials,
          userVerification: options.userVerification || 'preferred',
        },
      });

      if (!assertion) {
        throw new Error('用户取消验证');
      }

      // 4. 序列化 assertion 为 JSON 提交至后端
      const response = assertion.response;
      const credJSON = {
        id: assertion.id,
        rawId: assertion.id,
        type: assertion.type,
        response: {
          clientDataJSON: bufferToBase64Url(response.clientDataJSON),
          authenticatorData: bufferToBase64Url(response.authenticatorData),
          signature: bufferToBase64Url(response.signature),
          userHandle: assertion.userHandle ? bufferToBase64Url(assertion.userHandle) : null,
        },
      };

      // 5. 提交验证，ApiClient 内部会保存 PASETO token
      await ApiClient.webauthnLoginComplete(credJSON);

      // 6. 登录成功，跳转工作台
      const role = params.get('role') || 'owner';
      window.location.href = `workbench.html?role=${encodeURIComponent(role)}`;
    } catch (err) {
      resetBtn();
      const msg = (err && err.name === 'NotAllowedError')
        ? '验证已取消或超时'
        : (err.message || 'Passkey 登录失败，请使用密码登录');
      showPasskeyError(msg);
    }
  });

  // ── Passkey 注册（需登录态） ──
  registerLink.addEventListener('click', async (e) => {
    e.preventDefault();

    // 若已有 token 直接注册；否则需先密码登录
    let token = ApiClient.getToken();
    let didLoginHere = false;
    if (!token) {
      const phone = phoneInput.value.trim();
      const password = passwordInput.value;
      if (!phone || !password) {
        showPasskeyError('请先密码登录后再注册 Passkey');
        return;
      }
      setBtnLoading('正在登录…');
      try {
        await ApiClient.login(phone, password);
        token = ApiClient.getToken();
        if (!token) throw new Error('登录失败');
        didLoginHere = true;
      } catch (err) {
        resetBtn();
        const msg = (err.body && err.body.detail) || '登录失败，无法注册 Passkey';
        showPasskeyError(typeof msg === 'string' ? msg : JSON.stringify(msg));
        return;
      }
    }

    setBtnLoading('发起挑战中…');
    try {
      // 1. 请求注册挑战
      const options = await ApiClient.webauthnRegisterBegin('Web 浏览器');

      setBtnLoading('请验证生物识别…');

      // 2. 触发浏览器创建凭证
      const credential = await navigator.credentials.create({
        publicKey: {
          challenge: base64UrlToBuffer(options.challenge),
          rp: options.rp,
          user: {
            id: base64UrlToBuffer(options.user.id),
            name: options.user.name,
            displayName: options.user.displayName,
          },
          pubKeyCredParams: options.pubKeyCredParams,
          timeout: options.timeout || 60000,
          attestation: options.attestation || 'none',
          authenticatorSelection: options.authenticatorSelection || {
            authenticatorAttachment: 'platform',
            residentKey: 'required',
            requireResidentKey: true,
            userVerification: 'preferred',
          },
          excludeCredentials: (options.excludeCredentials || []).map(cred => ({
            id: base64UrlToBuffer(cred.id),
            type: cred.type || 'public-key',
          })),
          hints: options.hints || [],
        },
      });

      if (!credential) {
        throw new Error('用户取消注册');
      }

      // 3. 序列化注册结果并提交
      const response = credential.response;
      const credJSON = {
        id: credential.id,
        rawId: credential.id,
        type: credential.type,
        response: {
          clientDataJSON: bufferToBase64Url(response.clientDataJSON),
          attestationObject: bufferToBase64Url(response.attestationObject),
        },
      };

      await ApiClient.webauthnRegisterComplete({
        credential: credJSON,
        device_name: 'Web 浏览器 (' + (navigator.platform || '未知') + ')',
        transports: response.getTransports ? response.getTransports() : ['internal'],
      });

      setBtnLoading('✓ Passkey 已注册');
      showPasskeyError('✓ Passkey 注册成功！下次可直接使用指纹/面容登录');
      setTimeout(() => { resetBtn(); }, 2000);
    } catch (err) {
      // 注册失败：仅清理本次流程新登录产生的 token，不破坏既有会话
      if (didLoginHere) {
        try { localStorage.removeItem('paseto_token'); } catch (_) {}
      }
      resetBtn();
      const msg = (err && err.name === 'NotAllowedError')
        ? '验证已取消'
        : (err.message || 'Passkey 注册失败');
      showPasskeyError(msg);
    }
  });
})();
</script>
