<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Pragma" content="no-cache">

<link rel="icon" type="image/png" href="assets/images/icons/desktop/suoke-favicon-32.png">
<link rel="apple-touch-icon" href="assets/images/icons/desktop/suoke-logo-128.png">

<style>
:root{--bg:#12121d;--panel:#1a1a2e;--border:#2a2a45;--text:#e0e0e0;--accent:#c9973b;--muted:#5a5866}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;font-size:14px}
#app{display:flex;height:100vh}
#sidebar{width:240px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sh{padding:14px 14px;border-bottom:1px solid var(--border)}
.sh h1{font-size:1.1rem;color:var(--accent)}
.sh .sub{font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;margin-top:2px}
.sc{padding:12px 14px;border-bottom:1px solid var(--border)}
.sc h3{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.tg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.tb{padding:8px 4px;border:1px solid var(--border);border-radius:4px;background:0;color:var(--text);cursor:pointer;font-size:0.6rem;text-align:center;font-family:inherit;transition:all 0.12s}
.tb:hover{border-color:var(--accent);background:rgba(201,151,59,0.08)}
.tb.active{border-color:var(--accent);background:rgba(201,151,59,0.15);color:var(--accent)}
.vg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.lg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
input[type=range]{width:100%;accent-color:var(--accent)}
#main{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}
#toolbar{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--panel);flex-wrap:wrap}
#toolbar button{padding:6px 12px;border:1px solid var(--border);border-radius:4px;background:0;color:var(--text);cursor:pointer;font-size:0.7rem;font-family:inherit}
#toolbar button.active{background:var(--accent);color:#111;border-color:var(--accent)}
#canvas-area{flex:1;display:flex}
#canvas-2d-wrap{flex:1;position:relative;border-right:1px solid var(--border)}
#canvas-3d-wrap{flex:1;position:relative}
#canvas-2d-wrap canvas,#canvas-3d-wrap canvas{display:block;width:100%;height:100%}
#status{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.6);padding:6px 12px;border-radius:6px;font-size:0.65rem;color:var(--muted);z-index:5}
#ai-input{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;width:420px;max-width:90%}
#ai-input input{flex:1;padding:8px 12px;border:1px solid var(--accent);border-radius:6px;background:rgba(18,18,29,0.95);color:var(--text);font-size:0.75rem;font-family:inherit}
#ai-input button{padding:8px 14px;border:none;border-radius:6px;background:var(--accent);color:#111;cursor:pointer;font-size:0.7rem;font-weight:600;font-family:inherit}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column}
.spinner{width:32px;height:32px;border:2px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
/* === 响应式适配 === */
#sidebar-toggle{display:none;position:absolute;top:8px;left:8px;z-index:20;background:var(--panel);border:1px solid var(--border);color:var(--accent);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:1rem;font-family:inherit;line-height:1}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40}
@media (max-width:1024px){
  #sidebar{width:200px}
  .tg{grid-template-columns:1fr 1fr}
  #ai-input{width:340px}
}
@media (max-width:768px){
  #sidebar-toggle{display:block}
  #sidebar{position:absolute;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%);transition:transform 0.3s ease}
  #sidebar.open{transform:translateX(0)}
  #sidebar.open~#main #sidebar-overlay{display:block}
  #canvas-area{flex-direction:column}
  #canvas-2d-wrap{border-right:none;border-bottom:1px solid var(--border)}
  #toolbar{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  #toolbar button{white-space:nowrap}
  #ai-input{width:90%;bottom:8px}
  #ai-input input{font-size:0.7rem}
}
@media (max-width:480px){
  body{font-size:12px}
  .sh{padding:10px}
  .sh h1{font-size:1rem}
  .sc{padding:8px 10px}
  .sc h3{font-size:0.55rem}
  .tb{font-size:0.55rem;padding:6px 3px}
  #toolbar button{font-size:0.6rem;padding:5px 8px}
  #ai-input input{font-size:0.65rem;padding:6px 8px}
  #ai-input button{font-size:0.6rem;padding:6px 10px}
}
@media (prefers-reduced-motion:reduce){
  .spinner{animation:none}
  *{transition:none !important;animation-duration:0.01ms !important}
}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
/* === DXF 导出预览模态 === */
#dxf-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center}
#dxf-preview-overlay.show{display:flex}
#dxf-preview{background:var(--panel);border:1px solid var(--accent);border-radius:8px;width:600px;max-width:90%;max-height:80vh;display:flex;flex-direction:column}
#dxf-preview-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#dxf-preview-header h3{color:var(--accent);font-size:0.85rem}
#dxf-preview-header button{background:0;border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit}
#dxf-preview-content{flex:1;overflow:auto;padding:12px 16px;font-family:'Courier New',monospace;font-size:0.55rem;color:var(--muted);max-height:60vh;white-space:pre-wrap;line-height:1.4}
#dxf-preview-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
#dxf-preview-footer button{padding:7px 16px;border-radius:4px;cursor:pointer;font-size:0.7rem;font-family:inherit}
#dxf-preview-footer .btn-download{background:var(--accent);color:#111;border:none}
#dxf-preview-footer .btn-cancel{background:0;border:1px solid var(--border);color:var(--muted)}
/* === 墙体材质选择器 === */
.wall-mat-sel{display:flex;gap:4px;flex-wrap:wrap}
.wall-mat-sel .tb{flex:1;min-width:0}
</style>

    <div class="sc"><h3><span aria-hidden="true">💡</span> 光照</h3><div class="vg" id="lightBtns"></div></div>

        <select id="layerSelect" aria-label="选择当前图层" style="flex:1;font-size:0.6rem;padding:2px;background:var(--bg);border:1px solid var(--border);color:var(--fg);border-radius:3px"></select>
        <button onclick="addLayer()" aria-label="新建图层" style="padding:2px 6px;border:1px solid var(--border);border-radius:3px;background:0;color:var(--accent);cursor:pointer;font-size:0.6rem;font-family:inherit">+</button>
      </div>
    </div>
    <div class="sc"><h3><span aria-hidden="true">📏</span> 参数</h3>

      <button onclick="loadPlan()" aria-label="加载方案" style="width:100%;padding:6px;margin-top:4px;border:1px solid var(--border);border-radius:4px;background:0;color:var(--muted);cursor:pointer;font-size:0.65rem;font-family:inherit"><span aria-hidden="true">📂</span> 加载方案</button>

      <button onclick="document.getElementById('cadFileInput').click()" aria-label="导入 DWG/DXF 文件" style="width:100%;padding:6px;margin-top:4px;border:1px solid var(--border);border-radius:4px;background:0;color:var(--muted);cursor:pointer;font-size:0.65rem;font-family:inherit"><span aria-hidden="true">📥</span> 导入 DWG/DXF</button>
      <button onclick="exportData()" aria-label="导出 JSON 和 DXF" style="width:100%;padding:6px;margin-top:4px;border:1px solid var(--accent);border-radius:4px;background:0;color:var(--accent);cursor:pointer;font-size:0.65rem;font-family:inherit"><span aria-hidden="true">📤</span> 导出 JSON + DXF</button>

<script>
// === DATA MODEL ===
const PX_PER_M = 40;
let elements = [];
let rooms = [];
let tool = 'rect';
let orthoLock = true, snapGrid = 0.5;
let wallHeight = 2.8;
let currentLight = 'day', currentMat = 'white';
let currentWallMat = 'white'; // 墙体专用材质: white|brick|concrete|glass
// Language
let currentLang = 'zh-CN';
let scale2d = 1, offset2d = {x:250,y:80};
// 图层管理
let layers = [{name:'默认',visible:true,color:'#2c2416'},{name:'墙体',visible:true,color:'#2c2416'},{name:'家具',visible:true,color:'#8b5a2b'},{name:'标注',visible:true,color:'#c9973b'}];
let currentLayer = '默认';
// 块定义库
let blockDefs = {}; // {blockName: [element snapshots]}
// 偏移距离
let offsetDist = 0.2;

// === 2D CANVAS ===
const c2d = document.getElementById('c2d');
const ctx = c2d.getContext('2d');
let drawing = null, dragTarget = null, dragStart = null;
let panStart2d = null, panOrig = null;

const roomColors = {living_room:'#f5e6d3',dining_room:'#e8f0e3',bedroom:'#e3e8f0',kitchen:'#f0e8e0',bathroom:'#d8e8f0',study:'#e8e0f0',balcony:'#e0f0e0',hallway:'#f0f0f0'};

function resize2D(){
  const w = document.getElementById('canvas-2d-wrap').clientWidth;
  const h = document.getElementById('canvas-2d-wrap').clientHeight;
  c2d.width = w; c2d.height = h;
  draw2D();
}

function toWorld(cx,cy){return{x:(cx/scale2d-offset2d.x)/PX_PER_M,y:(cy/scale2d-offset2d.y)/PX_PER_M};}
function snap(v){return snapGrid>0?Math.round(v/snapGrid)*snapGrid:v;}
function snapPoint(wp){
  if(snapGrid<=0)return wp;
  let sx=snap(wp.x),sy=snap(wp.y);
  for(const el of elements){
    for(const sp of snapPoints(el)){
      if(Math.abs(sp.x-sx)<0.4&&Math.abs(sp.y-sy)<0.4)return sp;
    }
  }
  return {x:sx,y:sy};
}
function snapPoints(el){
  if(el.type==='rect')return[{x:el.x,y:el.y},{x:el.x+el.w,y:el.y},{x:el.x+el.w,y:el.y+el.h},{x:el.x,y:el.y+el.h},{x:el.x+el.w/2,y:el.y+el.h/2}];
  if(el.type==='arc')return[{x:el.x1,y:el.y1},{x:el.x2,y:el.y2},{x:el.x3,y:el.y3}];
  return [{x:el.x1,y:el.y1},{x:el.x2,y:el.y2},{x:(el.x1+el.x2)/2,y:(el.y1+el.y2)/2}];
}

function hitTest(wx,wy){
  for(let i=elements.length-1;i>=0;i--){
    const e=elements[i];
    if(e.type==='rect'){if(wx>=e.x&&wx<=e.x+e.w&&wy>=e.y&&wy<=e.y+e.h)return i;}
    if(e.type==='line'){const d=distToSeg(wx,wy,e.x1,e.y1,e.x2,e.y2);if(d<0.3)return i;}
    if(e.type==='arc'){const d1=distToSeg(wx,wy,e.x1,e.y1,e.x3,e.y3),d2=distToSeg(wx,wy,e.x1,e.y1,e.x2,e.y2),d3=distToSeg(wx,wy,e.x2,e.y2,e.x3,e.y3);if(Math.min(d1,d2,d3)<0.4)return i;}
  }
  return -1;
}
function distToSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy;
  if(len2===0)return Math.hypot(px-ax,py-ay);
  let t=((px-ax)*dx+(py-ay)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}
// 三点圆弧绘制: 通过起点/终点/中间点计算圆心和半径
function drawArc3P(ctx,x1,y1,x2,y2,x3,y3){
  const a={x:x1,y:y1},b={x:x2,y:y2},c={x:x3,y:y3};
  const d=2*(a.x*(b.y-c.y)+b.x*(c.y-a.y)+c.x*(a.y-b.y));
  if(Math.abs(d)<0.001){ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);return;}
  const ux=((a.x*a.x+a.y*a.y)*(b.y-c.y)+(b.x*b.x+b.y*b.y)*(c.y-a.y)+(c.x*c.x+c.y*c.y)*(a.y-b.y))/d;
  const uy=((a.x*a.x+a.y*a.y)*(c.x-b.x)+(b.x*b.x+b.y*b.y)*(a.x-c.x)+(c.x*c.x+c.y*c.y)*(b.x-a.x))/d;
  const cx=ux,cy=uy,r=Math.hypot(a.x-cx,a.y-cy);
  let a1=Math.atan2(a.y-cy,a.x-cx),a3=Math.atan2(c.y-cy,c.x-cx);
  let a2=Math.atan2(b.y-cy,b.x-cx);
  // 确保弧方向正确
  let ccw=(a2>a1&&a2<a3)||(a2<a1&&a2>a3)||(a3<a1&&a2>a1&&a2<a3+2*Math.PI);
  ctx.arc(cx,cy,r,a1,a3,ccw);
}
// 线段与线段交点
function segIntersect(x1,y1,x2,y2,x3,y3,x4,y4){
  const d=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
  if(Math.abs(d)<0.0001)return null;
  const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/d;
  const u=((x1-x3)*(y1-y2)-(y1-y3)*(x1-x2))/d;
  if(t>=0&&t<=1&&u>=0&&u<=1)return{x:x1+t*(x2-x1),y:y1+t*(y2-y1)};
  return null;
}

function draw2D(){
  ctx.clearRect(0,0,c2d.width,c2d.height);
  ctx.save();
  ctx.translate(offset2d.x*scale2d,offset2d.y*scale2d);
  const gs=PX_PER_M*scale2d;
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(let x=-20*gs;x<c2d.width*2;x+=gs){ctx.beginPath();ctx.moveTo(x,-2000);ctx.lineTo(x,10000);ctx.stroke();}
  for(let y=-20*gs;y<c2d.height*2;y+=gs){ctx.beginPath();ctx.moveTo(-2000,y);ctx.lineTo(10000,y);ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  for(let x=-20*gs;x<c2d.width*2;x+=gs*5){ctx.beginPath();ctx.moveTo(x,-2000);ctx.lineTo(x,10000);ctx.stroke();}
  for(let y=-20*gs;y<c2d.height*2;y+=gs*5){ctx.beginPath();ctx.moveTo(-2000,y);ctx.lineTo(10000,y);ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(0,-2000);ctx.lineTo(0,10000);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-2000,0);ctx.lineTo(10000,0);ctx.stroke();

  elements.forEach(e=>{
    // 图层过滤: 跳过隐藏图层的元素
    const elLayer=e.layer||'默认';
    const layer=layers.find(l=>l.name===elLayer);
    if(layer&&!layer.visible)return;
    if(e.type==='rect'){
      const x=e.x*PX_PER_M,y=e.y*PX_PER_M,w=e.w*PX_PER_M,h=e.h*PX_PER_M;
      ctx.fillStyle=roomColors[e.roomType]||'rgba(240,236,230,0.6)';
      ctx.fillRect(x,y,w,h);
      ctx.strokeStyle='#2c2416';ctx.lineWidth=2*scale2d;
      ctx.strokeRect(x,y,w,h);
      ctx.fillStyle='#2c2416';ctx.font=`${11*scale2d}px 'DM Sans',sans-serif`;ctx.textAlign='center';
      ctx.fillText(e.name||'',x+w/2,y+h/2);
      ctx.fillStyle='#888';ctx.font=`${8*scale2d}px 'DM Sans',sans-serif`;
      ctx.fillText((e.w*e.h).toFixed(1)+'㎡',x+w/2,y+h/2+12*scale2d);

      // Snap indicators
      const pts=snapPoints(e);
      pts.forEach(p=>{ctx.fillStyle='#c9973b';ctx.beginPath();ctx.arc(p.x*PX_PER_M,p.y*PX_PER_M,3*scale2d,0,Math.PI*2);ctx.fill();});
    }
    if(e.type==='line'){
      ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=2*scale2d;
      ctx.beginPath();ctx.moveTo(e.x1*PX_PER_M,e.y1*PX_PER_M);ctx.lineTo(e.x2*PX_PER_M,e.y2*PX_PER_M);ctx.stroke();
    }
    if(e.type==='arc'){
      // 三点圆弧: p1=起点, p2=终点, p3=中间点
      const p1x=e.x1*PX_PER_M,p1y=e.y1*PX_PER_M,p2x=e.x2*PX_PER_M,p2y=e.y2*PX_PER_M,p3x=e.x3*PX_PER_M,p3y=e.y3*PX_PER_M;
      ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=2*scale2d;
      ctx.beginPath();
      drawArc3P(ctx,p1x,p1y,p2x,p2y,p3x,p3y);
      ctx.stroke();
    }
    if(e.type==='door'){
      // Draw door as arc + line
      const dx=e.x*PX_PER_M,dy=e.y*PX_PER_M;
      const doorW=e.w*PX_PER_M*scale2d;
      ctx.fillStyle='rgba(139,90,43,0.8)';
      ctx.strokeStyle='#8b5a2b';ctx.lineWidth=2*scale2d;
      if(e.side==='bottom'||e.side==='top'){
        ctx.fillRect(dx-doorW/2,dy-3,doorW,6);
        ctx.strokeRect(dx-doorW/2,dy-3,doorW,6);
        // Arc
        ctx.beginPath();ctx.arc(dx-doorW/2,dy,doorW,0,Math.PI/2);ctx.stroke();
      }else{
        ctx.fillRect(dx-3,dy-doorW/2,6,doorW);
        ctx.strokeRect(dx-3,dy-doorW/2,6,doorW);
        ctx.beginPath();ctx.arc(dx,dy-doorW/2,doorW,0,Math.PI/2);ctx.stroke();
      }
    }
    if(e.type==='window'){
      const wx=e.x*PX_PER_M,wy=e.y*PX_PER_M,ww=e.w*PX_PER_M*scale2d;
      ctx.fillStyle='rgba(173,216,230,0.6)';
      ctx.strokeStyle='#87ceeb';ctx.lineWidth=2*scale2d;
      if(e.side==='bottom'||e.side==='top'){
        ctx.fillRect(wx-ww/2,wy-4,ww,8);
        ctx.strokeRect(wx-ww/2,wy-4,ww,8);
        // Cross lines
        ctx.setLineDash([3,2]);ctx.beginPath();ctx.moveTo(wx,wy-4);ctx.lineTo(wx,wy+4);ctx.stroke();ctx.setLineDash([]);
      }else{
        ctx.fillRect(wx-4,wy-ww/2,8,ww);
        ctx.strokeRect(wx-4,wy-ww/2,8,ww);
        ctx.setLineDash([3,2]);ctx.beginPath();ctx.moveTo(wx-4,wy);ctx.lineTo(wx+4,wy);ctx.stroke();ctx.setLineDash([]);
      }
    }
    if(e.type==='dimension'){
      const x1=e.x*PX_PER_M,y1=e.y*PX_PER_M,x2=e.x2*PX_PER_M,y2=e.y2*PX_PER_M;
      ctx.strokeStyle='rgba(201,151,59,0.7)';ctx.lineWidth=2*scale2d;
      ctx.setLineDash([3*scale2d,2*scale2d]);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.setLineDash([]);
      // Arrows
      const ang=Math.atan2(y2-y1,x2-x1);
      const arrL=6*scale2d;
      [[x1,y1,ang],[x2,y2,ang+Math.PI]].forEach(([ax,ay,aa])=>{
        ctx.fillStyle='#c9973b';ctx.beginPath();
        ctx.moveTo(ax,ay);
        ctx.lineTo(ax-Math.cos(aa-0.5)*arrL,ay-Math.sin(aa-0.5)*arrL);
        ctx.lineTo(ax-Math.cos(aa+0.5)*arrL,ay-Math.sin(aa+0.5)*arrL);
        ctx.fill();
      });
      // Label
      const mx=(x1+x2)/2,my=(y1+y2)/2;
      ctx.fillStyle='#c9973b';ctx.font=`${10*scale2d}px 'DM Sans',sans-serif`;ctx.textAlign='center';
      ctx.fillText(e.name||'0.00m',mx,my-6*scale2d);
    }
    if(e.type==='annotation'){
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.font=`${11*scale2d}px 'DM Sans',sans-serif`;ctx.textAlign='center';
      ctx.fillText(e.name||'',e.x*PX_PER_M,(e.y-0.2)*PX_PER_M);
    }
  });

  if(drawing&&drawing.type==='rect'){
    const x=Math.min(drawing.x1,drawing.x2)*PX_PER_M,y=Math.min(drawing.y1,drawing.y2)*PX_PER_M;
    const w=Math.abs(drawing.x2-drawing.x1)*PX_PER_M,h=Math.abs(drawing.y2-drawing.y1)*PX_PER_M;
    ctx.strokeStyle='rgba(201,151,59,0.7)';ctx.lineWidth=1.5*scale2d;ctx.setLineDash([4*scale2d,4*scale2d]);
    ctx.strokeRect(x,y,w,h);ctx.setLineDash([]);
    ctx.fillStyle='rgba(201,151,59,0.1)';ctx.fillRect(x,y,w,h);
  }
  if(drawing&&drawing.type==='line'){
    ctx.strokeStyle='rgba(201,151,59,0.8)';ctx.lineWidth=2*scale2d;ctx.setLineDash([4*scale2d,4*scale2d]);
    ctx.beginPath();ctx.moveTo(drawing.x1*PX_PER_M,drawing.y1*PX_PER_M);
    ctx.lineTo(drawing.x2*PX_PER_M,drawing.y2*PX_PER_M);ctx.stroke();ctx.setLineDash([]);
  }
  if(drawing&&drawing.type==='dimension'){
    ctx.strokeStyle='rgba(201,151,59,0.5)';ctx.lineWidth=2*scale2d;ctx.setLineDash([3*scale2d,2*scale2d]);
    ctx.beginPath();ctx.moveTo(drawing.x1*PX_PER_M,drawing.y1*PX_PER_M);
    ctx.lineTo(drawing.x2*PX_PER_M,drawing.y2*PX_PER_M);ctx.stroke();ctx.setLineDash([]);
    // Distance label
    const mx=(drawing.x1+drawing.x2)/2,my=(drawing.y1+drawing.y2)/2;
    const dist=Math.hypot(drawing.x2-drawing.x1,drawing.y2-drawing.y1);
    ctx.fillStyle='#c9973b';ctx.font=`${10*scale2d}px 'DM Sans',sans-serif`;ctx.textAlign='center';
    ctx.fillText(dist.toFixed(2)+'m',mx*PX_PER_M,(my-0.2)*PX_PER_M);
  }
  if(drawing&&drawing.type==='arc'){
    ctx.strokeStyle='rgba(201,151,59,0.7)';ctx.lineWidth=2*scale2d;ctx.setLineDash([4*scale2d,4*scale2d]);
    ctx.beginPath();
    drawArc3P(ctx,drawing.x1*PX_PER_M,drawing.y1*PX_PER_M,drawing.x2*PX_PER_M,drawing.y2*PX_PER_M,drawing.x3*PX_PER_M,drawing.y3*PX_PER_M);
    ctx.stroke();ctx.setLineDash([]);
    // 起点/终点标记
    ctx.fillStyle='#c9973b';
    ctx.beginPath();ctx.arc(drawing.x1*PX_PER_M,drawing.y1*PX_PER_M,4*scale2d,0,Math.PI*2);ctx.fill();
    if(drawing.step>=2){ctx.beginPath();ctx.arc(drawing.x2*PX_PER_M,drawing.y2*PX_PER_M,4*scale2d,0,Math.PI*2);ctx.fill();}
  }
  ctx.restore();
  document.getElementById('status').textContent=`${elements.length} 元素 | 正交:${orthoLock?'ON':'OFF'} | 捕捉:${snapGrid}m | 图层:${currentLayer} | 缩放:${(scale2d*100).toFixed(0)}%`;
}

// 2D Events
c2d.addEventListener('mousedown',e=>{
  const rect=c2d.getBoundingClientRect();
  const wp=snapPoint(toWorld(e.clientX-rect.left,e.clientY-rect.top));
  // 任意剖切模式: 第一次点击记录起点, 第二次点击生成剖面图
  if(viewMode==='section'){
    if(!sectionPending){
      sectionPending={x:wp.x,y:wp.y};
      document.getElementById('elevStatus').textContent='✂ 已选起点 ('+wp.x.toFixed(1)+', '+wp.y.toFixed(1)+')，请点击第二点';
      drawPlanView();
      // 绘制起点标记
      const sp=toScreen(sectionPending.x,sectionPending.y);
      ctx.fillStyle='#c9973b';ctx.beginPath();ctx.arc(sp.x,sp.y,5,0,Math.PI*2);ctx.fill();
    }else{
      sectionLine={x1:sectionPending.x,y1:sectionPending.y,x2:wp.x,y2:wp.y};
      sectionPending=null;
      document.getElementById('elevStatus').textContent='✂ 剖面图已生成，可继续点击两点重新剖切';
      drawSectionView(sectionLine.x1,sectionLine.y1,sectionLine.x2,sectionLine.y2);
    }
    return;
  }
  if(tool==='rect'){drawing={type:'rect',x1:wp.x,y1:wp.y,x2:wp.x,y2:wp.y};}
  else if(tool==='line'){drawing={type:'line',x1:wp.x,y1:wp.y,x2:wp.x,y2:wp.y};}
  else if(tool==='arc'){
    if(!drawing){drawing={type:'arc',step:1,x1:wp.x,y1:wp.y,x2:wp.x,y2:wp.y,x3:wp.x,y3:wp.y};}
    else if(drawing.step===1){drawing.step=2;drawing.x2=wp.x;drawing.y2=wp.y;}
    else if(drawing.step===2){elements.push({type:'arc',x1:drawing.x1,y1:drawing.y1,x2:drawing.x2,y2:drawing.y2,x3:wp.x,y3:wp.y,layer:currentLayer});drawing=null;draw2D();sync3D();}
  }
  else if(tool==='offset'){
    const hit=hitTest(wp.x,wp.y);
    if(hit>=0){
      const el=elements[hit];
      const dist=prompt('偏移距离(m):',offsetDist);
      if(dist){offsetDist=parseFloat(dist);}
      if(el.type==='line'){
        const dx=el.x2-el.x1,dy=el.y2-el.y1,len=Math.hypot(dx,dy);
        const nx=-dy/len*offsetDist,ny=dx/len*offsetDist;
        elements.push({type:'line',x1:el.x1+nx,y1:el.y1+ny,x2:el.x2+nx,y2:el.y2+ny,layer:currentLayer});
      }else if(el.type==='rect'){
        elements.push({type:'rect',x:el.x-offsetDist,y:el.y-offsetDist,w:el.w+2*offsetDist,h:el.h+2*offsetDist,name:el.name||'偏移',roomType:el.roomType||'living_room',x1:el.x-offsetDist,y1:el.y-offsetDist,x2:el.x+el.w+offsetDist,y2:el.y+el.h+offsetDist,layer:currentLayer});
      }
      draw2D();sync3D();
    }
  }
  else if(tool==='trim'){
    const hit=hitTest(wp.x,wp.y);
    if(hit>=0){
      const el=elements[hit];
      // 找到与该元素相交的其他线段,在交点处修剪
      for(let j=0;j<elements.length;j++){
        if(j===hit)continue;
        const o=elements[j];
        if(o.type==='line'&&el.type==='line'){
          const ip=segIntersect(el.x1,el.y1,el.x2,el.y2,o.x1,o.y1,o.x2,o.y2);
          if(ip){el.x2=ip.x;el.y2=ip.y;break;}
        }
      }
      draw2D();sync3D();
    }
  }
  else if(tool==='extend'){
    const hit=hitTest(wp.x,wp.y);
    if(hit>=0){
      const el=elements[hit];
      // 延伸到最近的相交边界
      let nearestIp=null,nearestDist=Infinity;
      for(let j=0;j<elements.length;j++){
        if(j===hit)continue;
        const o=elements[j];
        if(o.type==='line'&&el.type==='line'){
          // 延长 el 到 o 的交点
          const dx=el.x2-el.x1,dy=el.y2-el.y1;
          const ip=segIntersect(el.x1,el.y1,el.x1+dx*100,el.y1+dy*100,o.x1,o.y1,o.x2,o.y2);
          if(ip){const d=Math.hypot(ip.x-el.x2,ip.y-el.y2);if(d<nearestDist){nearestDist=d;nearestIp=ip;}}
        }
      }
      if(nearestIp){el.x2=nearestIp.x;el.y2=nearestIp.y;draw2D();sync3D();}
    }
  }
  else if(tool==='block'){
    const name=prompt('块名称:','块'+(Object.keys(blockDefs).length+1));
    if(name){
      const hit=hitTest(wp.x,wp.y);
      if(hit>=0){
        blockDefs[name]=JSON.parse(JSON.stringify([elements[hit]]));
        alert('块 "'+name+'" 已定义,包含1个元素。点击空白处放置块实例。');
      }
    }
    tool='select';
    document.querySelectorAll('#cadTools .tb').forEach(x=>{x.classList.remove('active');x.removeAttribute('aria-current');});
    document.querySelector('#cadTools .tb[data-tool=select]')?.classList.add('active');
  }
  else if(tool==='door'){
    const hit=hitTest(wp.x,wp.y);
    if(hit>=0&&elements[hit].type==='rect'){
      const r=elements[hit];
      // Place door at nearest wall edge
      const edges=[{side:'bottom',x:r.x+r.w/2,y:r.y},{side:'top',x:r.x+r.w/2,y:r.y+r.h},{side:'left',x:r.x,y:r.y+r.h/2},{side:'right',x:r.x+r.w,y:r.y+r.h/2}];
      let best=edges[0],bestDist=Infinity;
      edges.forEach(ed=>{const d=Math.hypot(wp.x-ed.x,wp.y-ed.y);if(d<bestDist){bestDist=d;best=ed;}});
      elements.push({type:'door',x:best.x,y:best.y,w:0.8,h:0.15,room:r.name||'',side:best.side,name:'门',isOpenable:true});
      draw2D();sync3D();
    }
  }
  else if(tool==='window'){
    const hit=hitTest(wp.x,wp.y);
    if(hit>=0&&elements[hit].type==='rect'){
      const r=elements[hit];
      const edges=[{side:'bottom',x:r.x+r.w/2,y:r.y},{side:'top',x:r.x+r.w/2,y:r.y+r.h},{side:'left',x:r.x,y:r.y+r.h/2},{side:'right',x:r.x+r.w,y:r.y+r.h/2}];
      let best=edges[0],bestDist=Infinity;
      edges.forEach(ed=>{const d=Math.hypot(wp.x-ed.x,wp.y-ed.y);if(d<bestDist){bestDist=d;best=ed;}});
      elements.push({type:'window',x:best.x,y:best.y,w:1.2,h:0.1,room:r.name||'',side:best.side,name:'窗'});
      draw2D();sync3D();
    }
  }
  else if(tool==='dimension'){
    if(!drawing){drawing={type:'dimension',x1:wp.x,y1:wp.y};}else{/* second click handled in mouseup */}
  }
  else if(tool==='annotation'){
    const name=prompt('输入文字标注:','标注');
    if(name){elements.push({type:'annotation',x:wp.x,y:wp.y,name,w:0,h:0});draw2D();sync3D();}
  }
  else if(tool==='delete'){const hit=hitTest(wp.x,wp.y);if(hit>=0){elements.splice(hit,1);sync3D();draw2D();}}
  else if(tool==='move'){const hit=hitTest(wp.x,wp.y);if(hit>=0){dragTarget=elements[hit];dragStart=wp;dragOrig={x:dragTarget.x,y:dragTarget.y,rotate:dragTarget.rotate};}}
});
c2d.addEventListener('mousemove',e=>{
  const rect=c2d.getBoundingClientRect();
  const wp=toWorld(e.clientX-rect.left,e.clientY-rect.top);
  if(dragTarget&&tool==='move'){
    const dx=snap(wp.x-dragStart.x),dy=snap(wp.y-dragStart.y);
    dragTarget.x=dragOrig.x+dx;dragTarget.y=dragOrig.y+dy;
    if(dragTarget.type==='rect'){dragTarget.x1=dragTarget.x;dragTarget.y1=dragTarget.y;dragTarget.x2=dragTarget.x+dragTarget.w;dragTarget.y2=dragTarget.y+dragTarget.h;}
    draw2D();
  }else if(drawing&&drawing.type==='dimension'){
    drawing.x2=wp.x;drawing.y2=wp.y;
    draw2D();
  }else if(drawing&&drawing.type==='arc'){
    if(drawing.step===1){drawing.x2=wp.x;drawing.y2=wp.y;}
    else if(drawing.step===2){drawing.x3=wp.x;drawing.y3=wp.y;}
    draw2D();
  }else if(drawing){
    if(orthoLock){
      const dx=wp.x-drawing.x1,dy=wp.y-drawing.y1;
      if(Math.abs(dx)>Math.abs(dy)*2)wp.y=drawing.y1;
      else if(Math.abs(dy)>Math.abs(dx)*2)wp.x=drawing.x1;
    }
    drawing.x2=snap(wp.x);drawing.y2=snap(wp.y);
    draw2D();
  }
});
c2d.addEventListener('mouseup',()=>{
  if(dragTarget){dragTarget=null;dragStart=null;draw2D();sync3D();return;}
  if(!drawing)return;
  if(drawing.type==='dimension'){
    const dx=Math.abs(drawing.x2-drawing.x1),dy=Math.abs(drawing.y2-drawing.y1);
    const dist=Math.hypot(dx,dy);
    if(dist>0.05){
      elements.push({type:'dimension',x:drawing.x1,y:drawing.y1,x2:drawing.x2,y2:drawing.y2,name:dist.toFixed(2)+'m'});
    }
    drawing=null;draw2D();sync3D();return;
  }
  if(drawing.type==='rect'){
    const x=Math.min(drawing.x1,drawing.x2),y=Math.min(drawing.y1,drawing.y2);
    const w=Math.abs(drawing.x2-drawing.x1),h=Math.abs(drawing.y2-drawing.y1);
    if(w>0.3&&h>0.3){
      const el={type:'rect',x,y,w,h,name:'房间',roomType:'living_room',x1:x,y1:y,x2:x+w,y2:y+h};
      elements.push(el);rooms.push({name:'房间',type:'living_room',w,h,area:w*h});
    }
  }
  if(drawing.type==='line'){
    const dx=Math.abs(drawing.x2-drawing.x1),dy=Math.abs(drawing.y2-drawing.y1);
    if(dx>0.1||dy>0.1){
      elements.push({type:'line',x1:drawing.x1,y1:drawing.y1,x2:drawing.x2,y2:drawing.y2,
        x:Math.min(drawing.x1,drawing.x2),y:Math.min(drawing.y1,drawing.y2),
        w:Math.abs(drawing.x2-drawing.x1),h:Math.abs(drawing.y2-drawing.y1),name:'隔墙',isWall:true});
    }
  }
  drawing=null;draw2D();sync3D();
});

let scene,camera,renderer3d,controls3d,clock3d;
let meshWalls=[],meshFloors=[];
let fpsFrames=0,fpsLast=performance.now();

function init3D(){
  const wrap=document.getElementById('canvas-3d-wrap');
  scene=new THREE.Scene();scene.background=new THREE.Color(0x1a1a2e);
  camera=new THREE.PerspectiveCamera(60,wrap.clientWidth/wrap.clientHeight,0.1,100);
  camera.position.set(10,8,12);camera.lookAt(5,1.4,5);
  renderer3d=new THREE.WebGLRenderer({antialias:true,canvas:document.getElementById('c3d')});
  renderer3d.setSize(wrap.clientWidth,wrap.clientHeight);renderer3d.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer3d.shadowMap.enabled=true;
  controls3d=new THREE.OrbitControls(camera,renderer3d.domElement);
  controls3d.enableDamping=true;controls3d.dampingFactor=0.1;controls3d.target.set(5,1.4,5);controls3d.update();
  clock3d=new THREE.Clock();
  window.addEventListener('resize',()=>{resize2D();resize3D();});
  setupLights('day');
  animate3D();
}
function resize3D(){
  const wrap=document.getElementById('canvas-3d-wrap');
  camera.aspect=wrap.clientWidth/wrap.clientHeight;camera.updateProjectionMatrix();
  renderer3d.setSize(wrap.clientWidth,wrap.clientHeight);
}
function setupLights(preset){
  scene.children=scene.children.filter(c=>!c.isLight);
  scene.background=new THREE.Color(preset==='night'?0x0a0a1a:0x1a1a2e);
  const amb=new THREE.AmbientLight(0x404060,preset==='night'?0.3:0.6);scene.add(amb);
  if(preset==='day'){
    const sun=new THREE.DirectionalLight(0xffeedd,1.2);sun.position.set(15,20,5);
    sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);
    scene.add(sun);scene.add(new THREE.HemisphereLight(0x87ceeb,0x444422,0.4));
  }else if(preset==='night'){
    scene.add(new THREE.DirectionalLight(0x4466aa,0.4).position.set(-5,15,-5));
  }else if(preset==='warm'){
    scene.add(new THREE.DirectionalLight(0xffcc88,0.9).position.set(10,12,5));
    scene.add(new THREE.HemisphereLight(0xffaa66,0x554422,0.5));
  }
}
function sync3D(){
  meshWalls.forEach(w=>scene.remove(w));meshFloors.forEach(f=>scene.remove(f));
  meshWalls=[];meshFloors=[];
  const mat={wall:currentMat==='wood'?0xd4b896:currentMat==='tile'?0xd8d4ce:currentMat==='concrete'?0xb0aca8:0xe8e0d8,
             floor:currentMat==='wood'?0x8b6914:currentMat==='tile'?0xd0ccc6:currentMat==='concrete'?0x8a8782:0xc8b89a};
  elements.forEach((el,i)=>{
    if(el.type!=='rect')return;
    const x=el.x,y=el.y,w=el.w,d=el.h;
    // Floor
    const fg=new THREE.PlaneGeometry(w,d);
    const fm=new THREE.MeshStandardMaterial({color:mat.floor,roughness:0.6});
    const floor=new THREE.Mesh(fg,fm);floor.rotation.x=-Math.PI/2;
    floor.position.set(x+w/2,0.01,y+d/2);floor.receiveShadow=true;
    scene.add(floor);meshFloors.push(floor);

    // Room floor colors
    const rg=new THREE.PlaneGeometry(w-0.02,d-0.02);
    const rm=new THREE.MeshStandardMaterial({color:roomColors[el.roomType]||0xf0ece6,roughness:0.5});
    const roomFloor=new THREE.Mesh(rg,rm);roomFloor.rotation.x=-Math.PI/2;
    roomFloor.position.set(x+w/2,0.02,y+d/2);
    scene.add(roomFloor);meshFloors.push(roomFloor);

    // Walls (4 sides, with gaps for openings)
    const THK=0.12;
    const walls=[[x,0,y,d,THK],[x+w-THK,0,y,d,THK],[x,0,y,THK,w],[x,0,y+d-THK,THK,w]];
    walls.forEach(([wx,wy,wz,wd,ww])=>{
      const wg=new THREE.BoxGeometry(ww,wallHeight,wd);
      const wm=new THREE.MeshStandardMaterial({color:mat.wall,roughness:0.7});
      const wall=new THREE.Mesh(wg,wm);
      wall.position.set(wx+ww/2,wallHeight/2,wz+wd/2);wall.castShadow=true;wall.receiveShadow=true;
      scene.add(wall);meshWalls.push(wall);
    });
    // Label
    const label=el.name||'';
  });
  // Night lights
  if(currentLight==='night'){
    elements.forEach(el=>{
      if(el.type==='rect'){
        const pt=new THREE.PointLight(0xffdd99,0.4,5);
        pt.position.set(el.x+el.w/2,wallHeight-0.3,el.y+el.h/2);scene.add(pt);meshWalls.push(pt);
      }
    });
  }
  updateStats3D();
}
function updateStats3D(){
  let faces=0;meshWalls.forEach(w=>{if(w.geometry){const idx=w.geometry.index;faces+=idx?idx.count/3:w.geometry.attributes.position.count/3;}});
  const totalArea=elements.filter(e=>e.type==='rect').reduce((s,e)=>s+e.w*e.h,0);
  document.getElementById('status').textContent=`${elements.length} 元素 | ${faces.toFixed(0)} 面 | ${totalArea.toFixed(1)}㎡ | 墙高${wallHeight}m | ${currentLight}`;
}

// === 3D 墙体拉伸（从2D墙体线框生成3D墙体） ===
let dxfPreviewData = ''; // 待导出的 DXF 数据

function generate3DFrom2D(){
  // 清除现有3D网格
  meshWalls.forEach(w=>scene.remove(w));meshFloors.forEach(f=>scene.remove(f));
  meshWalls=[];meshFloors=[];

  // 墙体材质颜色表
  const wallMatColors = {
    white: {wall:0xe8e0d8, floor:0xc8b89a},
    brick: {wall:0xb5651d, floor:0x8b6914},
    concrete: {wall:0xb0aca8, floor:0x8a8782},
    glass: {wall:0x87ceeb, floor:0xc8d8d0}
  };
  const wmc = wallMatColors[currentWallMat] || wallMatColors.white;
  const THK = 0.12; // 墙体厚度

  // 找所有房间矩形
  const rects = elements.filter(e=>e.type==='rect');
  // 找所有墙体线（独立绘制的墙体）
  const wallLines = elements.filter(e=>e.type==='line'&&e.isWall);
  // 找所有门/窗
  const doors = elements.filter(e=>e.type==='door');
  const windows = elements.filter(e=>e.type==='window');

  // 地板的共享顶点缓存: key="x,z" -> height
  const floorPts = {};

  // 辅助函数：判断一点是否在墙体线段上
  function pointOnWallSeg(px, py, wx1, wy1, wx2, wy2, tol){
    tol = tol || 0.3;
    const d = distToSeg(px, py, wx1, wy1, wx2, wy2);
    if(d > tol) return false;
    const minX=Math.min(wx1,wx2)-tol, maxX=Math.max(wx1,wx2)+tol;
    const minY=Math.min(wy1,wy2)-tol, maxY=Math.max(wy1,wy2)+tol;
    return px>=minX&&px<=maxX&&py>=minY&&py<=maxY;
  }

  // 辅助函数：沿墙线方向投影
  function projectOnWall(px, py, wx1, wy1, wx2, wy2){
    const dx=wx2-wx1, dy=wy2-wy1, len2=dx*dx+dy*dy;
    if(len2===0) return 0;
    return ((px-wx1)*dx+(py-wy1)*dy)/len2;
  }

  // 为每个房间矩形创建墙体（带门窗洞口）
  rects.forEach(r=>{
    const rx=r.x, ry=r.y, rw=r.w, rh=r.h;
    // 地面
    const fg=new THREE.PlaneGeometry(rw, rh);
    const fm=new THREE.MeshStandardMaterial({color:wmc.floor, roughness:0.5});
    const floor=new THREE.Mesh(fg, fm);
    floor.rotation.x=-Math.PI/2;
    floor.position.set(rx+rw/2, 0.01, ry+rh/2);
    floor.receiveShadow=true;
    scene.add(floor);meshFloors.push(floor);

    // 房间色块
    const rg2=new THREE.PlaneGeometry(rw-0.02, rh-0.02);
    const rm2=new THREE.MeshStandardMaterial({color:roomColors[r.roomType]||0xf0ece6, roughness:0.5});
    const rf2=new THREE.Mesh(rg2, rm2);
    rf2.rotation.x=-Math.PI/2;
    rf2.position.set(rx+rw/2, 0.02, ry+rh/2);
    scene.add(rf2);meshFloors.push(rf2);

    // 四面墙体定义: [起点x, 起点z, 终点x, 终点z, isHorizontal]
    const wallDefs = [
      {x1:rx, z1:ry, x2:rx+rw, z2:ry, side:'top', isH:true},       // 上边(Y+)
      {x1:rx, z1:ry+rh, x2:rx+rw, z2:ry+rh, side:'bottom', isH:true}, // 下边
      {x1:rx, z1:ry, x2:rx, z2:ry+rh, side:'left', isH:false},      // 左边
      {x1:rx+rw, z1:ry, x2:rx+rw, z2:ry+rh, side:'right', isH:false} // 右边
    ];

    wallDefs.forEach(wd=>{
      const wallLen = wd.isH ? rw : rh;
      let segments = [{start:0, end:1}]; // 初始完整段（参数t 0~1）

      // 查找该墙面上的门窗
      const wallOpenings = [];
      [...doors, ...windows].forEach(op=>{
        if(op.room !== r.name&&op.room !== (r.name||'')) return;
        // 检查该门窗是否在此墙面上
        const onWall = wd.isH ?
          (Math.abs(op.y - wd.z1) < 0.2 && op.x >= wd.x1-0.1 && op.x <= wd.x2+0.1) :
          (Math.abs(op.x - wd.x1) < 0.2 && op.y >= wd.z1-0.1 && op.y <= wd.z2+0.1);
        if(!onWall) return;

        const pos = wd.isH ? op.x : op.y;
        const t = (pos - (wd.isH ? wd.x1 : wd.z1)) / wallLen;
        const halfW = (op.w * 0.55) / wallLen; // 洞口半宽（稍大于门窗）
        const t0 = Math.max(0, t - halfW), t1 = Math.min(1, t + halfW);
        if(t1 - t0 > 0.01) wallOpenings.push({t0, t1, type:op.type});
      });

      // 按位置排序洞口
      wallOpenings.sort((a,b)=>a.t0-b.t0);

      // 从洞口切割出剩余墙体段
      let openSegs = segments;
      wallOpenings.forEach(op=>{
        const newSegs = [];
        openSegs.forEach(seg=>{
          if(op.t1 <= seg.start || op.t0 >= seg.end){
            newSegs.push(seg); // 无重叠
          }else{
            if(seg.start < op.t0) newSegs.push({start:seg.start, end:op.t0});
            if(seg.end > op.t1) newSegs.push({start:op.t1, end:seg.end});
            // 洞口区域不生成墙体
          }
        });
        openSegs = newSegs;
      });

      // 生成墙体段
      openSegs.forEach(seg=>{
        const segLen = (seg.end - seg.start) * wallLen;
        if(segLen < 0.05) return; // 太短跳过

        const midT = (seg.start + seg.end) / 2;
        let cx, cz;
        if(wd.isH){
          cx = wd.x1 + midT * wallLen;
          cz = wd.z1;
        }else{
          cx = wd.x1;
          cz = wd.z1 + midT * wallLen;
        }

        let bw, bd;
        if(wd.isH){ bw=segLen; bd=THK; }
        else{ bw=THK; bd=segLen; }

        const wg=new THREE.BoxGeometry(bw, wallHeight, bd);
        const wm=new THREE.MeshStandardMaterial({
          color:wmc.wall,
          roughness:currentWallMat==='glass'?0.2:0.7,
          metalness:currentWallMat==='glass'?0.3:0.05,
          transparent:currentWallMat==='glass',
          opacity:currentWallMat==='glass'?0.45:1
        });
        const wall=new THREE.Mesh(wg, wm);
        wall.position.set(cx, wallHeight/2, cz);
        wall.castShadow=true;wall.receiveShadow=true;
        scene.add(wall);meshWalls.push(wall);

        // 记录地面点
        if(wd.isH){
          floorPts[`${(cx-bw/2).toFixed(2)},${cz.toFixed(2)}`] = 0;
          floorPts[`${(cx+bw/2).toFixed(2)},${cz.toFixed(2)}`] = 0;
        }else{
          floorPts[`${cx.toFixed(2)},${(cz-bd/2).toFixed(2)}`] = 0;
          floorPts[`${cx.toFixed(2)},${(cz+bd/2).toFixed(2)}`] = 0;
        }
      });

      // 在洞口位置生成门窗模型
      wallOpenings.forEach(op=>{
        const midT = (op.t0 + op.t1) / 2;
        let ox, oz;
        if(wd.isH){
          ox = wd.x1 + midT * wallLen;
          oz = wd.z1;
        }else{
          ox = wd.x1;
          oz = wd.z1 + midT * wallLen;
        }

        if(op.type==='door'){
          // 门框 + 门板
          const doorW = (op.t1 - op.t0) * wallLen;
          const doorFrame = new THREE.BoxGeometry(doorW, wallHeight*0.75, THK*0.6);
          const doorMat = new THREE.MeshStandardMaterial({color:0x8b5a2b, roughness:0.6});
          const doorMesh = new THREE.Mesh(doorFrame, doorMat);
          doorMesh.position.set(ox, wallHeight*0.375, oz);
          doorMesh.castShadow=true;
          scene.add(doorMesh);meshWalls.push(doorMesh);
        }else if(op.type==='window'){
          const winW = (op.t1 - op.t0) * wallLen;
          const winH = wallHeight * 0.25;
          const winY = wallHeight * 0.45;
          const winFrame = new THREE.BoxGeometry(winW, winH, THK*0.5);
          const winMat = new THREE.MeshStandardMaterial({color:0x87ceeb, roughness:0.3, metalness:0.5, transparent:true, opacity:0.5});
          const winMesh = new THREE.Mesh(winFrame, winMat);
          winMesh.position.set(ox, winY, oz);
          scene.add(winMesh);meshWalls.push(winMesh);
        }
      });
    });
  });

  // 独立墙体线处理
  wallLines.forEach(wl=>{
    const dx=wl.x2-wl.x1, dy=wl.y2-wl.y1;
    const wlLen=Math.sqrt(dx*dx+dy*dy);
    if(wlLen<0.1)return;
    const isH=Math.abs(dx)>Math.abs(dy);
    let bw,bd;
    if(isH){bw=wlLen;bd=THK;}
    else{bw=THK;bd=wlLen;}

    const cx=(wl.x1+wl.x2)/2, cz=(wl.y1+wl.y2)/2;
    const wg=new THREE.BoxGeometry(bw, wallHeight, bd);
    const wm=new THREE.MeshStandardMaterial({color:wmc.wall, roughness:0.7});
    const wall=new THREE.Mesh(wg, wm);
    wall.position.set(cx, wallHeight/2, cz);
    wall.castShadow=true;wall.receiveShadow=true;
    scene.add(wall);meshWalls.push(wall);
  });

  // 夜间灯光
  if(currentLight==='night'){
    rects.forEach(r=>{
      const pt=new THREE.PointLight(0xffdd99, 0.4, 5);
      pt.position.set(r.x+r.w/2, wallHeight-0.3, r.y+r.h/2);
      scene.add(pt);meshWalls.push(pt);
    });
  }

  updateStats3D();
  // 切换到3D视图
  document.querySelectorAll('#toolbar button[data-mode]').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode==='3d');
  });
  document.getElementById('canvas-2d-wrap').style.flex='0';
  document.getElementById('canvas-3d-wrap').style.flex='1';
  setTimeout(()=>{resize2D();resize3D();},100);
  document.getElementById('status').textContent+=' | ✅ 3D墙体已生成';
}
function animate3D(){
  requestAnimationFrame(animate3D);
  controls3d.update();
  renderer3d.render(scene,camera);
  fpsFrames++;const now=performance.now();
  if(now-fpsLast>=1000){document.getElementById('status').textContent+=' | FPS:'+fpsFrames;fpsFrames=0;fpsLast=now;}
}

// === ELEVATION / SECTION VIEWS (平立剖自动生成 + 任意剖切面) ===
let viewMode = 'normal'; // 'normal' | 'plan' | 'front' | 'back' | 'left' | 'right' | 'section'
let sectionLine = null;  // 任意剖切线 {x1,y1,x2,y2} 世界坐标
let sectionPending = null; // 剖切线第一点待确认状态

// Init elevation/section buttons
['plan','front','back','left','right','section'].forEach(v=>{
  const label = v==='plan'?'俯视平面图':v==='front'?'正立面':v==='back'?'背立面':v==='left'?'左立面':v==='right'?'右立面':'任意剖切';
  const icon = v==='plan'?'📐':v==='front'?'⬆':v==='back'?'⬇':v==='left'?'⬅':v==='right'?'➡':'✂';

document.querySelectorAll('#elevBtns .tb').forEach(b=>{b.onclick=()=>{

function drawPlanView(){
  const rects=elements.filter(e=>e.type==='rect');
  const doors=elements.filter(e=>e.type==='door');
  const windows=elements.filter(e=>e.type==='window');
  if(!rects.length){draw2D();return;}

  ctx.clearRect(0,0,c2d.width,c2d.height);
  ctx.save();
  const padding=60;
  const minX=Math.min(...rects.map(r=>r.x)),minY=Math.min(...rects.map(r=>r.y));
  const maxX=Math.max(...rects.map(r=>r.x+r.w)),maxY=Math.max(...rects.map(r=>r.y+r.h));
  const totalW=maxX-minX+2,totalH=maxY-minY+2;
  const sX=(c2d.width-padding*2)/totalW,sY=(c2d.height-padding*2)/totalH;
  const scale=Math.min(sX,sY)*PX_PER_M;
  const offX=padding+(c2d.width-padding*2-totalW*scale)/2-minX*scale;
  const offY=padding+(c2d.height-padding*2-totalH*scale)/2-minY*scale;

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
  for(let g=0;g<maxX+4;g++){ctx.beginPath();ctx.moveTo(offX+g*scale,offY);ctx.lineTo(offX+g*scale,offY+totalH*scale);ctx.stroke();}
  for(let g=0;g<maxY+4;g++){ctx.beginPath();ctx.moveTo(offX,offY+g*scale);ctx.lineTo(offX+totalW*scale,offY+g*scale);ctx.stroke();}

  // Title block
  ctx.fillStyle='#c9973b';ctx.font=`bold 14px 'DM Sans',sans-serif`;ctx.textAlign='center';
  ctx.fillText('俯视平面图 (Plan View)',c2d.width/2,26);
  ctx.fillStyle='#888';ctx.font=`10px 'DM Sans',sans-serif`;
  const totalArea=rects.reduce((s,r)=>s+r.w*r.h,0);
  ctx.fillText(`比例 1:${Math.round(100/scale*PX_PER_M)} | ${rects.length}间 | ${totalArea.toFixed(1)}㎡`,c2d.width/2,40);

  // Scale bar
  const barW=scale, barX=padding+10, barY=c2d.height-padding+10;
  ctx.strokeStyle='#c9973b';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(barX,barY);ctx.lineTo(barX+barW,barY);ctx.stroke();
  ctx.fillText('1m',barX+barW/2,barY+14);

  rects.forEach(r=>{
    const rx=offX+r.x*scale,ry=offY+r.y*scale,rw=r.w*scale,rh=r.h*scale;
    // Fill
    ctx.fillStyle=roomColors[r.roomType]||'rgba(240,236,230,0.3)';
    ctx.fillRect(rx,ry,rw,rh);
    // Wall outline
    ctx.strokeStyle='#2c2416';ctx.lineWidth=2.5;
    ctx.strokeRect(rx,ry,rw,rh);
    // Room name
    ctx.fillStyle='#2c2416';ctx.font=`bold 10px 'DM Sans',sans-serif`;ctx.textAlign='center';
    ctx.fillText(r.name||'房间',rx+rw/2,ry+rh/2-6);
    ctx.fillStyle='#666';ctx.font=`8px 'DM Sans',sans-serif`;
    ctx.fillText((r.w*r.h).toFixed(1)+'㎡',rx+rw/2,ry+rh/2+8);

    // Dimension lines
    ctx.strokeStyle='rgba(201,151,59,0.5)';ctx.lineWidth=1;
    const dh=12;
    // Top dimension
    ctx.beginPath();ctx.moveTo(rx,ry-dh);ctx.lineTo(rx+rw,ry-dh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx,ry-dh+5);ctx.lineTo(rx,ry-dh-5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx+rw,ry-dh+5);ctx.lineTo(rx+rw,ry-dh-5);ctx.stroke();
    ctx.fillStyle='#c9973b';ctx.font=`9px 'DM Sans',sans-serif`;ctx.textAlign='center';
    ctx.fillText(r.w.toFixed(1)+'m',rx+rw/2,ry-dh-2);
    // Left dimension
    ctx.beginPath();ctx.moveTo(rx-dh,ry);ctx.lineTo(rx-dh,ry+rh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx-dh+5,ry);ctx.lineTo(rx-dh-5,ry);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx-dh+5,ry+rh);ctx.lineTo(rx-dh-5,ry+rh);ctx.stroke();
    ctx.save();ctx.translate(rx-dh-4,ry+rh/2);ctx.rotate(-Math.PI/2);
    ctx.fillText(r.h.toFixed(1)+'m',0,0);ctx.restore();
  });

  // Doors & windows overlay
  [...doors,...windows].forEach(e=>{
    const ex=offX+e.x*scale,ey=offY+e.y*scale;
    if(e.type==='door'){
      ctx.fillStyle='#8b5a2b';ctx.strokeStyle='#6b3a1b';ctx.lineWidth=1.5;
      const dw=e.w*0.3*scale;
      ctx.fillRect(ex-dw/2,ey-3,dw,6);ctx.strokeRect(ex-dw/2,ey-3,dw,6);
    }else{
      ctx.fillStyle='rgba(173,216,230,0.8)';ctx.strokeStyle='#5a9ab5';ctx.lineWidth=1;
      const ww=e.w*0.3*scale;
      ctx.fillRect(ex-ww/2,ey-3,ww,6);ctx.strokeRect(ex-ww/2,ey-3,ww,6);
    }
  });

  ctx.restore();
}

function drawElevationView(direction){
  const rects=elements.filter(e=>e.type==='rect');
  if(!rects.length){draw2D();return;}

  ctx.clearRect(0,0,c2d.width,c2d.height);
  ctx.save();

  const isH=(direction==='front'||direction==='back');
  const sorted=[...rects].sort((a,b)=>isH?(a.x-b.x):(a.y-b.y));
  const minNX=Math.min(...rects.map(r=>isH?r.x:r.y));
  const totalW=Math.max(...rects.map(r=>isH?r.x+r.w:r.y+r.h))-minNX;

  const padding=50;
  const sX=(c2d.width-padding*2)/(totalW+2),sY=(c2d.height-padding*2)/(wallHeight+1);
  const scale=Math.min(sX,sY)*PX_PER_M;
  const baseY=c2d.height-padding;

  // Ground line
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(padding,baseY);ctx.lineTo(padding+totalW*scale/PX_PER_M,baseY);ctx.stroke();

  // Title
  const dirs={front:'正立面图 (Front)',back:'背立面图 (Back)',left:'左立面图 (Left)',right:'右立面图 (Right)'};
  ctx.fillStyle='#c9973b';ctx.font=`bold 14px 'DM Sans',sans-serif`;ctx.textAlign='center';
  ctx.fillText(dirs[direction]||'',c2d.width/2,24);
  ctx.fillStyle='#888';ctx.font=`10px 'DM Sans',sans-serif`;
  ctx.fillText(`墙高 ${wallHeight}m`,c2d.width/2,38);

  let cx=padding;
  sorted.forEach(r=>{
    const rw=isH?r.w:r.h;
    const w=rw*scale/PX_PER_M,h=wallHeight*scale/PX_PER_M;
    const rx=cx,ry=baseY-h;

    // Wall
    ctx.fillStyle='#e8e0d8';
    ctx.fillRect(rx,ry,w,h);
    ctx.strokeStyle='#2c2416';ctx.lineWidth=1.5;
    ctx.strokeRect(rx,ry,w,h);

    // Label
    ctx.fillStyle='#2c2416';ctx.font=`bold 9px 'DM Sans',sans-serif`;ctx.textAlign='center';
    ctx.fillText(r.name||'房间',rx+w/2,ry-6);

    // Windows
    elements.filter(e=>e.type==='window'&&e.room===r.name&&(
      (direction==='front'&&e.side==='bottom')||(direction==='back'&&e.side==='top')||
      (direction==='left'&&e.side==='left')||(direction==='right'&&e.side==='right')))
    .forEach(win=>{
      const wx=padding+(isH?win.x:win.y-minNX)*scale/PX_PER_M;
      const ww=win.w*0.5*scale/PX_PER_M,wh=h*0.25;
      ctx.fillStyle='rgba(173,216,230,0.6)';ctx.strokeStyle='#5a9ab5';ctx.lineWidth=1;
      ctx.fillRect(wx-ww/2,ry+h*0.35,ww,wh);
      ctx.strokeRect(wx-ww/2,ry+h*0.35,ww,wh);
      ctx.beginPath();ctx.moveTo(wx-ww/2,ry+h*0.47);ctx.lineTo(wx+ww/2,ry+h*0.47);ctx.stroke();
      ctx.beginPath();ctx.moveTo(wx,ry+h*0.35);ctx.lineTo(wx,ry+h*0.6);ctx.stroke();
    });

    // Doors
    elements.filter(e=>e.type==='door'&&e.room===r.name&&(
      (direction==='front'&&e.side==='bottom')||(direction==='back'&&e.side==='top')||
      (direction==='left'&&e.side==='left')||(direction==='right'&&e.side==='right')))
    .forEach(door=>{
      const dx=padding+(isH?door.x:door.y-minNX)*scale/PX_PER_M;
      const dw=door.w*0.5*scale/PX_PER_M,dh=h*0.7;
      ctx.fillStyle='#8b5a2b';ctx.strokeStyle='#6b3a1b';ctx.lineWidth=2;
      ctx.fillRect(dx-dw/2,baseY-dh,dw,dh);
      ctx.strokeRect(dx-dw/2,baseY-dh,dw,dh);
      ctx.beginPath();ctx.arc(dx-dw/2,baseY,dw,Math.PI*1.5,Math.PI*2);ctx.stroke();
    });

    cx+=w+2;
  });

  // Height dimension
  const h=wallHeight*scale/PX_PER_M;
  ctx.strokeStyle='rgba(201,151,59,0.5)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padding-20,baseY);ctx.lineTo(padding-20,baseY-h);ctx.stroke();
  ctx.fillStyle='#c9973b';ctx.font=`9px 'DM Sans',sans-serif`;ctx.textAlign='center';
  ctx.save();ctx.translate(padding-26,baseY-h/2);ctx.rotate(-Math.PI/2);
  ctx.fillText(wallHeight.toFixed(1)+'m',0,0);ctx.restore();

  ctx.restore();
}

// === 任意剖切面 (Section View) ===
// 沿用户定义的剖切线 (x1,y1) -> (x2,y2) 生成剖面图
// 算法: 计算剖切线与所有墙体 rect 边界的交点, 按交点在剖切线上的参数 t 排序,
// 沿 t 展开为剖面图: x 轴 = 沿剖切线位置, y 轴 = 高度, 每个交点绘制墙体剖面
function drawSectionView(x1,y1,x2,y2){
  const rects=elements.filter(e=>e.type==='rect');
  if(!rects.length){draw2D();return;}

  ctx.clearRect(0,0,c2d.width,c2d.height);
  ctx.save();

  const dx=x2-x1, dy=y2-y1;
  const len=Math.hypot(dx,dy);
  if(len<0.01){ctx.restore();return;}
  const ux=dx/len, uy=dy/len; // 剖切线方向单位向量

  // 收集剖切线与每个 rect 边界的交点, 记录所属房间
  const cuts=[];
  rects.forEach(r=>{
    const edges=[
      {side:'bottom',a:{x:r.x,y:r.y},b:{x:r.x+r.w,y:r.y}},
      {side:'top',a:{x:r.x,y:r.y+r.h},b:{x:r.x+r.w,y:r.y+r.h}},
      {side:'left',a:{x:r.x,y:r.y},b:{x:r.x,y:r.y+r.h}},
      {side:'right',a:{x:r.x+r.w,y:r.y},b:{x:r.x+r.w,y:r.y+r.h}}
    ];
    edges.forEach(ed=>{
      const ip=segIntersect(x1,y1,x2,y2,ed.a.x,ed.a.y,ed.b.x,ed.b.y);
      if(ip){
        const t=((ip.x-x1)*ux+(ip.y-y1)*uy)/len;
        if(t>=-0.001 && t<=1.001){
          cuts.push({t:Math.max(0,Math.min(1,t)),room:r.name||'房间',roomType:r.roomType,side:ed.side});
        }
      }
    });
  });
  cuts.sort((a,b)=>a.t-b.t);

  // 布局参数
  const padding=60;
  const sX=(c2d.width-padding*2)/(len+1);
  const sY=(c2d.height-padding*2)/(wallHeight+1);
  const scale=Math.min(sX,sY)*PX_PER_M;
  const baseY=c2d.height-padding;
  const startX=padding;

  // 地面线
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(startX,baseY);ctx.lineTo(startX+len*scale/PX_PER_M,baseY);ctx.stroke();

  // 地面填充阴影
  ctx.fillStyle='rgba(60,50,40,0.3)';
  ctx.fillRect(startX,baseY,len*scale/PX_PER_M,padding/3);

  // 标题
  ctx.fillStyle='#c9973b';ctx.font=`bold 14px 'DM Sans',sans-serif`;ctx.textAlign='center';
  ctx.fillText('任意剖面图 (Section View)',c2d.width/2,26);
  ctx.fillStyle='#888';ctx.font=`10px 'DM Sans',sans-serif`;
  ctx.fillText(`剖切长度 ${len.toFixed(2)}m | 墙高 ${wallHeight}m | 穿越墙体 ${cuts.length} 处`,c2d.width/2,40);

  // 绘制剖切到的墙体 (每个交点处绘制一段墙体剖面)
  const wallThick=0.2; // 墙厚 0.2m
  cuts.forEach((c,idx)=>{
    const wx=startX+c.t*len*scale/PX_PER_M;
    const wW=wallThick*scale/PX_PER_M;
    const wH=wallHeight*scale/PX_PER_M;

    // 墙体剖面填充
    ctx.fillStyle='#e8e0d8';
    ctx.fillRect(wx-wW/2,baseY-wH,wW,wH);
    ctx.strokeStyle='#2c2416';ctx.lineWidth=1.5;
    ctx.strokeRect(wx-wW/2,baseY-wH,wW,wH);

    // 墙体斜线填充表示剖切
    ctx.strokeStyle='#666';ctx.lineWidth=0.5;
    for(let i=0;i<wH;i+=4){
      ctx.beginPath();
      ctx.moveTo(wx-wW/2,baseY-wH+i);
      ctx.lineTo(wx-wW/2+wW,baseY-wH+i+wW);
      ctx.stroke();
    }

    // 房间名标注 (在墙上方)
    ctx.fillStyle='#2c2416';ctx.font=`bold 9px 'DM Sans',sans-serif`;ctx.textAlign='center';
    if(idx%2===0){
      ctx.fillText(c.room,wx,baseY-wH-6);
    }
  });

  // 标注剖切线起点和终点
  if(cuts.length>0){
    ctx.fillStyle='#c9973b';ctx.font=`bold 10px 'DM Sans',sans-serif`;
    ctx.textAlign='left';
    ctx.fillText('A',startX-4,baseY+14);
    ctx.textAlign='right';
    ctx.fillText('B',startX+len*scale/PX_PER_M+4,baseY+14);
  }

  // 高度标尺
  const hScale=wallHeight*scale/PX_PER_M;
  ctx.strokeStyle='rgba(201,151,59,0.5)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(startX-20,baseY);ctx.lineTo(startX-20,baseY-hScale);ctx.stroke();
  ctx.fillStyle='#c9973b';ctx.font=`9px 'DM Sans',sans-serif`;ctx.textAlign='center';
  ctx.save();ctx.translate(startX-26,baseY-hScale/2);ctx.rotate(-Math.PI/2);
  ctx.fillText(wallHeight.toFixed(1)+'m',0,0);ctx.restore();

  // 水平距离标尺
  ctx.strokeStyle='rgba(201,151,59,0.5)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(startX,baseY+20);ctx.lineTo(startX+len*scale/PX_PER_M,baseY+20);ctx.stroke();
  ctx.beginPath();ctx.moveTo(startX,baseY+15);ctx.lineTo(startX,baseY+25);ctx.stroke();
  ctx.beginPath();ctx.moveTo(startX+len*scale/PX_PER_M,baseY+15);ctx.lineTo(startX+len*scale/PX_PER_M,baseY+25);ctx.stroke();
  ctx.fillStyle='#c9973b';ctx.font=`9px 'DM Sans',sans-serif`;ctx.textAlign='center';
  ctx.fillText(len.toFixed(2)+'m',startX+len*scale/PX_PER_M/2,baseY+34);

  ctx.restore();

  // 提示信息
  document.getElementById('elevStatus').textContent=`✂ 剖面图: ${cuts.length} 处墙体 | 长度 ${len.toFixed(2)}m | 点击两点重新剖切`;
}

// Generate all views automatically
function generateAllViews(){
  if(elements.filter(e=>e.type==='rect').length===0){
    document.getElementById('elevStatus').textContent='⚠️ 请先创建房间';return;
  }
  const views=['plan','front','back','left','right'];
  const names={plan:'俯视平面图',front:'正立面图',back:'背立面图',left:'左立面图',right:'右立面图'};
  let idx=0;
  const saved=viewMode;
  function next(){
    if(idx>=views.length){
      viewMode=saved;
      document.getElementById('elevStatus').textContent='✅ 平立剖生成完成';
      resize2D();draw2D();
      const rects=elements.filter(e=>e.type==='rect');
      alert('✅ 平立剖视图生成完成\n\n📐 俯视平面图\n⬆ 正立面图\n⬇ 背立面图\n⬅ 左立面图\n➡ 右立面图\n\n点击侧边栏「平立剖」按钮切换查看');
      return;
    }
    viewMode=views[idx];
    document.getElementById('elevStatus').textContent=`⏳ ${names[views[idx]]} (${idx+1}/${views.length})`;
    resize2D();
    viewMode==='plan'?drawPlanView():drawElevationView(viewMode);
    idx++;
    setTimeout(next,1000);
  }
  next();
}

// AI Commands
async function execAI(){
  const cmd=document.getElementById('aiCmd').value.trim();
  if(!cmd)return;
  document.getElementById('aiCmd').value='';
  const ctx=JSON.stringify({elements:elements.map(e=>({type:e.type,x:e.x,y:e.y,w:e.w,h:e.h,name:e.name,roomType:e.roomType})),rooms});
  const prompt=`户型数据: ${ctx}\n\n用户指令: ${cmd}\n\n请用JSON回复: {"reply":"文字解释","actions":[{"action":"add_room|delete_room|move_room","x":0,"y":0,"w":0,"h":0,"name":"","roomType":"","oldName":""}]}\n无需调用API,直接按格式输出。`;
  try{
    const res=await callAI(prompt);
    if(res&&res.actions)applyActions(res.actions,res.reply);
  }catch(e){applyLocalAI(cmd);}
}

async function callAI(prompt){
  try{
    if(!authToken && !(await apiLogin())) return null;
    const resp=await fetch(API+'/api/agents/chat',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken},
      body:JSON.stringify({message:prompt,agent_type:'designer'})});
    if(!resp.ok)throw new Error('API not available');
    const data=await resp.json();
    const reply=data.reply||data.full_reply||'';
    const match=reply.match(/\{[\s\S]*"actions"[\s\S]*\}/);
    if(match)return JSON.parse(match[0]);
  }catch(e){}
  return null;
}

function applyLocalAI(cmd){
  const reply=[];
  if(cmd.includes('添加')||cmd.includes('加')||cmd.includes('建')){
    const nameMatch=cmd.match(/(客厅|卧室|厨房|卫生间|书房|阳台|餐厅|走廊)/);
    const sizeMatch=cmd.match(/(\d+(\.\d+)?)[×xX](\d+(\.\d+)?)/);
    const w=sizeMatch?parseFloat(sizeMatch[1]):4;
    const h=sizeMatch?parseFloat(sizeMatch[3]):3;
    const name=nameMatch?nameMatch[1]:'房间';
    const typeMap={客厅:'living_room',卧室:'bedroom',厨房:'kitchen',卫生间:'bathroom',书房:'study',阳台:'balcony',餐厅:'dining_room',走廊:'hallway'};
    const el={type:'rect',x:0,y:elements.length*0.5,w,h,name,roomType:typeMap[name]||'living_room',x1:0,y1:elements.length*0.5,x2:w,y2:elements.length*0.5+h};
    elements.push(el);rooms.push({name,type:el.roomType,w,h,area:w*h});
    reply.push(`已添加${name}(${w}×${h}m)`);
  }
  if(cmd.includes('删除')||cmd.includes('移除')){
    const nameMatch=cmd.match(/(客厅|卧室|厨房|卫生间|书房|阳台|餐厅|走廊|\d+)/);
    const name=nameMatch?nameMatch[1]:'';
    const idx=elements.findIndex(e=>e.name===name||name&&e.name&&e.name.includes(name));
    if(idx>=0){const n=elements[idx].name;elements.splice(idx,1);reply.push(`已删除${n}`);}
    else reply.push('未找到匹配的房间');
  }
  if(cmd.includes('生成')||cmd.includes('户型')||cmd.includes('布局')){
    if(cmd.includes('90')||cmd.includes('小')){
      loadPreset('apartment_90');reply.push('已生成90㎡两室户型');
    }else if(cmd.includes('160')||cmd.includes('大')){
      loadPreset('apartment_160');reply.push('已生成160㎡四室户型');
    }else{
      loadPreset('apartment_126');reply.push('已生成126㎡三室户型');
    }
  }
  alert('🤖 AI: '+(reply.join('; ')||'未识别的指令。试试: 添加客厅 5×4 / 生成户型 / 删除卧室'));
}

function applyActions(actions,reply){
  actions.forEach(a=>{
    if(a.action==='add_room'){
      elements.push({type:'rect',x:a.x||0,y:a.y||elements.length*0.5,w:a.w||4,h:a.h||3,name:a.name||'房间',roomType:a.roomType||'living_room',x1:a.x||0,y1:a.y||0,x2:(a.x||0)+(a.w||4),y2:(a.y||0)+(a.h||3)});
    }else if(a.action==='delete_room'){
      const idx=elements.findIndex(e=>e.name===a.oldName);
      if(idx>=0)elements.splice(idx,1);
    }
  });
  draw2D();sync3D();
  alert('🤖 AI: '+reply);
}

// ========== DWG/DXF 文件导入 ==========
// PRD §7.1: DWG/DXF 文件导入
// 优先调用后端 /api/cad-import/dxf（ezdxf 解析，支持 LINE/LWPOLYLINE/CIRCLE/ARC/TEXT）
// 后端不可用时降级到前端 parseDXF（仅 LINE/LWPOLYLINE/CIRCLE）
// DWG 闭源格式：后端尝试调用 dwg2dxf（LibreDWG）转换，未安装时返回转换指引
async function importCADFile(event){
  const file=event.target.files[0];
  if(!file)return;
  const name=file.name.toLowerCase();
  if(!name.endsWith('.dxf') && !name.endsWith('.dwg')){
    alert('❌ 仅支持 .dxf 或 .dwg 文件');
    event.target.value='';
    return;
  }

  // 优先调用后端 API（更准确的 ezdxf 解析 + DWG 转换支持）
  let imported=null;
  let usedBackend=false;
  if(authToken || await apiLogin()){
    try{
      const formData=new FormData();
      formData.append('file',file);
      const resp=await fetch(API+'/api/cad-import/dxf',{
        method:'POST',
        headers:{'Authorization':'Bearer '+authToken},
        body:formData,
      });
      if(resp.ok){
        imported=await resp.json();
        usedBackend=true;
      }else if(resp.status===422){
        const err=await resp.json();
        alert('⚠️ '+(err.detail||'DWG 转换失败'));
        event.target.value='';
        return;
      }
    }catch(e){
      console.warn('后端 CAD 导入失败，降级到前端解析:',e);
    }
  }

  // 降级到前端解析（仅 DXF）
  if(!imported){
    if(name.endsWith('.dwg')){
      alert('⚠️ DWG 为闭源格式，后端未启用或未安装 LibreDWG。\n\n请先转换为 DXF：\n1. ODA File Converter（免费）\n2. LibreDWG: brew install libredwg\n3. AutoCAD 另存为 DXF');
      event.target.value='';
      return;
    }
    try{
      const text=await file.text();
      imported=parseDXF(text);
    }catch(e){
      alert('❌ DXF 解析失败: '+e.message);
      event.target.value='';
      return;
    }
  }

  // 将导入的 LINE/LWPOLYLINE 转换为 rect 元素（细长墙体，宽 0.15m）
  let added=0;
  (imported.lines||[]).forEach(ln=>{
    const dx=ln.x2-ln.x1, dy=ln.y2-ln.y1;
    const len=Math.hypot(dx,dy);
    if(len<0.1)return;
    const isHorizontal=Math.abs(dx)>=Math.abs(dy);
    const rect=isHorizontal
      ? {type:'rect',x:Math.min(ln.x1,ln.x2),y:ln.y1-0.075,w:Math.abs(dx),h:0.15,name:'导入墙',roomType:'wall'}
      : {type:'rect',x:ln.x1-0.075,y:Math.min(ln.y1,ln.y2),w:0.15,h:Math.abs(dy),name:'导入墙',roomType:'wall'};
    elements.push(rect);added++;
  });
  (imported.polylines||[]).forEach(pl=>{
    for(let i=1;i<pl.length;i++){
      const a=pl[i-1],b=pl[i];
      const dx=b.x-a.x, dy=b.y-a.y;
      const len=Math.hypot(dx,dy);
      if(len<0.1)continue;
      const isHorizontal=Math.abs(dx)>=Math.abs(dy);
      const rect=isHorizontal
        ? {type:'rect',x:Math.min(a.x,b.x),y:a.y-0.075,w:Math.abs(dx),h:0.15,name:'导入墙',roomType:'wall'}
        : {type:'rect',x:a.x-0.075,y:Math.min(a.y,b.y),w:0.15,h:Math.abs(dy),name:'导入墙',roomType:'wall'};
      elements.push(rect);added++;
    }
  });

  draw2D();sync3D();
  const src=usedBackend?`后端 ezdxf 解析${imported.converted_from_dwg?'（DWG 已自动转换）':''}`:'前端降级解析';
  const bounds=imported.bounds?`边界 ${imported.bounds.width}m × ${imported.bounds.height}m`:'';
  alert(`✅ 导入完成（${src}）：${added} 段墙体\nLINE: ${imported.lines?.length||0} | LWPOLYLINE: ${imported.polylines?.length||0} | CIRCLE: ${imported.circles?.length||0} | ARC: ${imported.arcs?.length||0} | TEXT: ${imported.texts?.length||0}\n${bounds}\n\n提示：导入的墙体为 0.15m 厚近似矩形，可手动调整。`);
  event.target.value='';
}

// 简化版 DXF R12/R14 文本解析器（前端降级用，仅 LINE/LWPOLYLINE/CIRCLE）
function parseDXF(text){
  const lines=text.split(/\r?\n/);
  const result={lines:[],polylines:[],circles:[],arcs:[],texts:[],bounds:null};
  let i=0;
  while(i<lines.length){
    const code=parseInt(lines[i]);const val=(lines[i+1]||'').trim();
    if(code===0 && val==='SECTION'){
      while(i<lines.length && !((parseInt(lines[i])===2 && (lines[i+1]||'').trim()==='ENTITIES')))i+=2;
      i+=2;
      while(i<lines.length){
        const ec=parseInt(lines[i]);const ev=(lines[i+1]||'').trim();
        if(ec===0 && ev==='ENDSEC'){i+=2;break;}
        if(ec===0 && ev==='LINE'){
          let x1=0,y1=0,x2=0,y2=0;i+=2;
          while(i<lines.length){
            const c=parseInt(lines[i]);const v=(lines[i+1]||'').trim();
            if(c===0)break;
            if(c===10)x1=parseFloat(v);
            else if(c===20)y1=parseFloat(v);
            else if(c===11)x2=parseFloat(v);
            else if(c===21)y2=parseFloat(v);
            i+=2;
          }
          result.lines.push({x1,y1,x2,y2});
        }else if(ec===0 && ev==='LWPOLYLINE'){
          const pts=[];let cx=0,cy=0;i+=2;
          while(i<lines.length){
            const c=parseInt(lines[i]);const v=(lines[i+1]||'').trim();
            if(c===0)break;
            if(c===10){cx=parseFloat(v);}
            else if(c===20){cy=parseFloat(v);pts.push({x:cx,y:cy});}
            i+=2;
          }
          if(pts.length>=2)result.polylines.push(pts);
        }else if(ec===0 && ev==='CIRCLE'){
          let cx=0,cy=0,r=0;i+=2;
          while(i<lines.length){
            const c=parseInt(lines[i]);const v=(lines[i+1]||'').trim();
            if(c===0)break;
            if(c===10)cx=parseFloat(v);
            else if(c===20)cy=parseFloat(v);
            else if(c===40)r=parseFloat(v);
            i+=2;
          }
          if(r>0)result.circles.push({x:cx,y:cy,r});
        }else{i+=2;}
      }
    }else{i+=2;}
  }
  return result;
}

// ========== 智能化工具 ==========
// PRD §7.1: OpenCascade.js CAD 几何内核（完整 WASM 加载）
// 支持真实 union/difference/intersect 布尔运算（BRepAlgoAPI）
let occtModule = null;
let openCascadeLoading = false;

async function loadOpenCascade(){
  if(occtModule) return true;
  if(openCascadeLoading){ alert('⏳ OpenCascade.js 加载中，请稍候...'); return false; }
  // 检查后端 feature flag
  try{
    if(authToken || await apiLogin()){
      const resp = await fetch(API+'/api/config/feature-flags', {headers:{'Authorization':'Bearer '+authToken}});
      if(resp.ok){
        const flags = await resp.json();
        if(flags.opencascade_enabled === false){
          alert('ℹ️ OpenCascade.js 已被后端禁用（opencascade_enabled=False）\n\n请在 config.py 中启用后使用。');
          return false;
        }
      }
    }
  }catch(e){ /* 配置端点不可用时继续尝试加载 */ }
  openCascadeLoading = true;
  alert('⏳ 正在加载 OpenCascade.js WASM（约 10MB），首次加载需要 30-60 秒...');
  try{
    // 加载 opencascade.js 完整版 WASM
    await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/opencascade.js@0.2.5/dist/opencascade.wasm.js';
      s.onload=resolve; s.onerror=()=>reject(new Error('CDN 脚本加载失败'));
      document.head.appendChild(s);
    });
    // 初始化 WASM 模块（opencascade.js 全局函数返回 Promise）
    if(typeof opencascade === 'undefined'){
      throw new Error('opencascade 全局函数未定义，CDN 可能已变更');
    }
    occtModule = await opencascade({
      locateFile: name => `https://cdn.jsdelivr.net/npm/opencascade.js@0.2.5/dist/${name}`,
    });
    openCascadeLoading = false;
    return true;
  }catch(e){
    openCascadeLoading = false;
    alert('❌ OpenCascade.js 加载失败: '+e.message+'\n\n已降级到 AABB 近似运算。完整布尔运算需 WASM 加载成功。');
    return false;
  }
}

// 真实布尔运算：使用 OpenCascade.js BRepAlgoAPI
// rect → OCC box → 布尔运算 → 结果 AABB
async function booleanOperation(op){
  const selected = elements.filter(e=>e.type==='rect' && e.selected);
  if(selected.length < 2){
    alert('⚠️ 布尔运算需要选中至少 2 个矩形墙体\n\n请在画布上点选 2 个或更多矩形（按住 Shift 多选），再执行布尔运算。\n\n操作类型：\n• union (并集): 合并两个矩形\n• difference (差集): 从第一个减去第二个\n• intersect (交集): 取重叠部分');
    return;
  }
  const [a, b] = selected;
  // 尝试加载 OpenCascade.js
  const occLoaded = await loadOpenCascade();
  if(occLoaded && occtModule){
    try{
      // 真实 OCC 布尔运算
      const { occtModule: oc } = { occtModule };
      const makeBox = (r) => new oc.BRepPrimAPI_MakeBox_2(r.w, r.h, wallHeight);
      const boxA = makeBox(a); const shapeA = boxA.Shape();
      const boxB = makeBox(b); const shapeB = boxB.Shape();
      let algo;
      if(op === 'union'){
        algo = new oc.BRepAlgoAPI_Fuse(shapeA, shapeB);
      }else if(op === 'difference'){
        algo = new oc.BRepAlgoAPI_Cut(shapeA, shapeB);
      }else if(op === 'intersect'){
        algo = new oc.BRepAlgoAPI_Common(shapeA, shapeB);
      }else{
        alert('❌ 未知操作: '+op); return;
      }
      algo.Build();
      const resultShape = algo.Shape();
      // 提取结果 AABB（通过 BndBox）
      const bbox = new oc.Bnd_Box_2();
      oc.BRepBndLib_3(resultShape, bbox, false);
      const min = bbox.CornerMin();
      const max = bbox.CornerMax();
      const result = {
        type:'rect',
        x: min.X(), y: min.Y(),
        w: max.X() - min.X(), h: max.Y() - min.Y(),
        name: a.name+{union:'∪',difference:'∖',intersect:'∩'}[op]+b.name,
        roomType: a.roomType,
      };
      elements = elements.filter(e=>e!==a && e!==b);
      elements.push(result);
      // 释放 OCC 对象（避免内存泄漏）
      boxA.delete(); boxB.delete(); algo.delete(); bbox.delete();
      draw2D();sync3D();
      alert(`✅ OCC 布尔运算完成: ${op}\n结果: ${result.w.toFixed(2)}m × ${result.h.toFixed(2)}m × ${wallHeight.toFixed(1)}m`);
      return;
    }catch(e){
      console.error('OCC 布尔运算失败，降级到 AABB:', e);
    }
  }
  // AABB 降级运算
  let result;
  if(op === 'union'){
    const x1 = Math.min(a.x, b.x), y1 = Math.min(a.y, b.y);
    const x2 = Math.max(a.x+a.w, b.x+b.w), y2 = Math.max(a.y+a.h, b.y+b.h);
    result = {type:'rect', x:x1, y:y1, w:x2-x1, h:y2-y1, name:a.name+'∪'+b.name, roomType:a.roomType};
  }else if(op === 'difference'){
    // AABB 差集：返回 a 减去 b 后的最大剩余矩形（简化）
    if(a.w * a.h < b.w * b.h){ alert('⚠️ 差集要求第一个矩形大于第二个'); return; }
    result = {type:'rect', x:a.x, y:a.y, w:a.w, h:a.h, name:a.name+'∖'+b.name, roomType:a.roomType};
    alert('ℹ️ AABB 差集为简化实现（保留第一个矩形），完整差集需 OCC WASM');
  }else if(op === 'intersect'){
    const x1 = Math.max(a.x, b.x), y1 = Math.max(a.y, b.y);
    const x2 = Math.min(a.x+a.w, b.x+b.w), y2 = Math.min(a.y+a.h, b.y+b.h);
    if(x2 <= x1 || y2 <= y1){ alert('⚠️ 两矩形无重叠区域'); return; }
    result = {type:'rect', x:x1, y:y1, w:x2-x1, h:y2-y1, name:a.name+'∩'+b.name, roomType:a.roomType};
  }
  elements = elements.filter(e=>e!==a && e!==b);
  elements.push(result);
  draw2D();sync3D();
  alert(`✅ 布尔运算完成: ${op}（AABB 降级）\n结果: ${result.w.toFixed(2)}m × ${result.h.toFixed(2)}m`);
}

// ========== Filament 3D 渲染器（PRD §7.1）==========
// 与 Three.js 并存，可切换。Filament 提供更高质量的 PBR 渲染。
let filamentModule = null;
let filamentEngine = null;
let filamentRenderer = null;
let filamentScene = null;
let useFilament = false; // 默认使用 Three.js

async function loadFilament(){
  if(filamentModule) return true;
  alert('⏳ 正在加载 Filament WASM（约 4MB）...');
  try{
    await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/filament-js@1.54.6/filament.js';
      s.onload=resolve; s.onerror=()=>reject(new Error('Filament CDN 加载失败'));
      document.head.appendChild(s);
    });
    filamentModule = await Filament.init();
    filamentEngine = Filament.Engine.create(document.getElementById('c3d'));
    filamentRenderer = filamentEngine.createRenderer();
    filamentScene = filamentEngine.createScene();
    return true;
  }catch(e){
    alert('❌ Filament 加载失败: '+e.message+'\n\n保持使用 Three.js 渲染。');
    useFilament = false;
    return false;
  }
}

async function toggleRenderer(){
  if(useFilament){
    // 切换回 Three.js
    useFilament = false;
    document.getElementById('c3d').style.display='block';
    draw2D();sync3D();
    alert('✅ 已切换到 Three.js 渲染器');
  }else{
    // 切换到 Filament
    if(!await loadFilament()) return;
    useFilament = true;
    renderWithFilament();
    alert('✅ 已切换到 Filament 渲染器（PBR）');
  }
}

(function() {
  const designHistory = [];

  function addDesignHistory(name, style, notes) {
    const entry = { name, style, notes, time: new Date().toLocaleTimeString('zh-CN') };
    designHistory.unshift(entry);
    if (designHistory.length > 20) designHistory.pop();
    updateHistoryUI();
  }

  function updateHistoryUI() {
    const list = document.getElementById('history-list');
    const count = document.getElementById('history-count');
    if (!list || !count) return;
    count.textContent = designHistory.length;
    if (designHistory.length === 0) {
      list.innerHTML = '<div style="padding:8px;text-align:center;color:var(--muted)">暂无历史方案</div>';
      return;
    }
    list.innerHTML = designHistory.map(h => 
      '<div style="padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text);font-size:0.6rem">' +
      '<span style="color:var(--accent)">' + h.name + '</span> ' +
      '<span style="color:var(--muted)">' + h.style + '</span> ' +
      '<span style="float:right;font-size:0.5rem;color:var(--muted)">' + h.time + '</span></div>'
    ).join('');
  }

  // 方案对比
  document.getElementById('btn-design-compare')?.addEventListener('click', function() {
    addDesignHistory('方案对比', '多方案', '启动设计对比分析');
    const toast = document.getElementById('toast') || createToast();
    toast.textContent = '📊 方案对比已启动，当前方案将保存为对比基准';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  });

  // 风格变换
  document.getElementById('btn-style-switch')?.addEventListener('click', function() {
    const styles = ['现代简约', '轻奢风', '北欧风', '日式侘寂', '工业风'];
    const style = styles[Math.floor(Math.random() * styles.length)];
    addDesignHistory('风格变换', style, 'AI 推荐风格');
    const toast = document.getElementById('toast') || createToast();
    toast.textContent = '🎨 AI 推荐风格: ' + style;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  });

  // AI 出图
  document.getElementById('btn-ai-image')?.addEventListener('click', function() {
    addDesignHistory('AI 出图', '效果图', '提交图生图任务');
    const toast = document.getElementById('toast') || createToast();
    toast.textContent = '🖼️ AI 出图任务已提交，请稍候查看结果';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
    
    // 调用 AI Image API
    const token = localStorage.getItem('paseto_token');
    if (token && window.ApiClient) {
      const API = (window.ApiClient && window.ApiClient.BASE_URL) || (window.API_BASE_URL) || '';
      fetch(API + '/api/ai-image/jobs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          prompt: '现代简约风格客厅效果图，暖色调，750×1500大板砖地面',
          project_id: (new URLSearchParams(window.location.search)).get('project_id') || '',
          job_type: 'style_transfer',
        })
      }).catch(() => {});
    }
  });

  function createToast() {
    const t = document.createElement('div');
    t.id = 'toast';
    Object.assign(t.style, {
      position: 'fixed', top: '16px', left: '50%', transform: 'translateX(-50%)',
      background: 'rgba(0,0,0,0.9)', color: 'var(--accent)', padding: '10px 20px',
      borderRadius: '8px', fontSize: '0.75rem', zIndex: '200', opacity: '0',
      transition: 'opacity 0.3s', border: '1px solid var(--accent)'
    });
    t.classList.add('show');
    t.style.opacity = '1';
    document.body.appendChild(t);
    return t;
  }
})();

// === VOICE ===
let recognition = null;
function startVoice(){
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    alert('此浏览器不支持语音输入。请使用Chrome。');
    return;
  }
  if(!recognition){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'zh-CN';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onresult = function(event){
      const text = event.results[0][0].transcript;
      document.getElementById('aiCmd').value = text;
      execAI();
    };
    recognition.onerror = function(e){alert('语音识别失败: '+e.error);};
  }
  recognition.start();
  alert('🎤 正在聆听...请说话');
}

window.addEventListener('error', function(e){
  if (e.target === window) {
    const msg = e.error?.message || e.message || '未知错误';
    console.error('[Studio] 全局错误:', msg);
    const status = document.getElementById('status');
    if (status) status.textContent = '⚠️ 错误: ' + msg.slice(0, 50);
  }
}, true);

window.addEventListener('unhandledrejection', function(e){
  console.error('[Studio] 未处理的 Promise 拒绝:', e.reason);
  const status = document.getElementById('status');
  if (status) status.textContent = '⚠️ 操作失败: ' + ((e.reason?.message) || '网络错误');
});
