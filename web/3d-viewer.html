<style>
:root{--bg:#1a1a2e;--panel:#16213e;--accent:#c9973b;--text:#e0e0e0;--muted:#888;--border:#2a2a4a}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
#app{display:flex;height:100vh}
#sidebar{width:260px;background:var(--panel);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;border-right:1px solid #2a2a4a}
.sidebar-header{padding:18px;border-bottom:1px solid #2a2a4a}
.sidebar-header h1{font-size:1.2rem;color:var(--accent)}
.sidebar-header .sub{font-size:0.65rem;color:#888;letter-spacing:0.1em}
.control-section{padding:14px 16px;border-bottom:1px solid #2a2a4a}
.control-section h3{font-size:0.65rem;color:#888;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.control-section label{display:block;font-size:0.7rem;color:#aaa;margin-bottom:4px}
.control-section input[type=range]{width:100%;margin-bottom:8px;accent-color:var(--accent)}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.preset-btn{padding:10px 6px;border:1px solid #2a2a4a;border-radius:6px;background:transparent;color:#ccc;cursor:pointer;font-size:0.65rem;text-align:center;font-family:inherit;transition:all 0.15s}
.preset-btn:hover{border-color:var(--accent);background:rgba(201,151,59,0.1)}
.preset-btn.active{border-color:var(--accent);background:rgba(201,151,59,0.2);color:var(--accent)}
#renderCanvas{flex:1}
#toolbar{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10}
.tb-btn{padding:8px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(0,0,0,0.5);color:#ccc;cursor:pointer;font-size:0.7rem;font-family:inherit;transition:all 0.15s;backdrop-filter:blur(8px)}
.tb-btn:hover{background:rgba(201,151,59,0.2);border-color:var(--accent)}
.tb-btn.active{background:var(--accent);color:#111;border-color:var(--accent)}
#stats{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 16px;font-size:0.7rem;color:#888;display:flex;gap:16px;backdrop-filter:blur(8px)}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column}
#loading .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* === 响应式适配 === */
#sidebar-toggle{display:none;position:absolute;top:12px;left:12px;z-index:20;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);color:#ccc;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:1rem;font-family:inherit;backdrop-filter:blur(8px)}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40}
@media (max-width:1024px){
  #sidebar{width:210px}
  .preset-grid{grid-template-columns:1fr 1fr}
  .sidebar-header h1{font-size:1.05rem}
}
@media (max-width:768px){
  #sidebar-toggle{display:block}
  #sidebar{position:absolute;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%);transition:transform 0.3s ease}
  #sidebar.open{transform:translateX(0)}
  #toolbar{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;top:54px}
  .tb-btn{white-space:nowrap;padding:6px 10px;font-size:0.65rem}
  #stats{font-size:0.6rem;padding:6px 10px;gap:10px;flex-wrap:wrap;justify-content:center;max-width:90%}
}
@media (max-width:480px){
  body{font-size:12px}
  .sidebar-header{padding:14px}
  .sidebar-header h1{font-size:1rem}
  .control-section{padding:10px 12px}
  .control-section h3{font-size:0.6rem}
  .preset-btn{font-size:0.6rem;padding:8px 4px}
  .tb-btn{font-size:0.6rem;padding:5px 8px}
  #stats{font-size:0.55rem;gap:8px;padding:5px 8px}
}
@media (prefers-reduced-motion:reduce){
  #loading .spinner{animation:none}
  *{transition:none !important;animation-duration:0.01ms !important}
}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

let scene, camera, renderer, controls, clock;
let walls = [], floors = [], ceilingPlanes = [];
let wallHeight = 2.8, currentPreset = 'apartment_126';
let currentLight = 'day', currentMaterial = 'white';
let viewMode = '3d';
let isPlanMode = false;
let fpsFrames = 0, fpsLastTime = performance.now();

// Material presets

// Room presets (wall definitions as segments)

      { x: 6.5, y: 0.5, w: 3.5, h: 3, name: '餐厅', color: 0xe0dcc0 },

function initScene() {
  const container = document.getElementById('renderCanvas');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.Fog(0x1a1a2e, 15, 50);

  camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 100);
  camera.position.set(8, 6, 10);
  camera.lookAt(5, 1.4, 5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.target.set(5, 1.4, 5);
  controls.update();

  clock = new THREE.Clock();
  window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });
}

function setupLights(preset) {
  scene.children = scene.children.filter(c => !c.isLight && !c.isHelper && !(c.isMesh));

  const amb = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(amb);

  if (preset === 'day') {
    const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
    sun.position.set(15, 20, 5);
    sun.castShadow = true;
    sun.shadow.mapSize.set(512, 512);
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 50;
    sun.shadow.camera.left = -20;
    sun.shadow.camera.right = 20;
    sun.shadow.camera.top = 20;
    sun.shadow.camera.bottom = -20;
    scene.add(sun);
    const hem = new THREE.HemisphereLight(0x87ceeb, 0x444422, 0.4);
    scene.add(hem);
  } else if (preset === 'night') {
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.Fog(0x0a0a1a, 10, 40);
    const moon = new THREE.DirectionalLight(0x4466aa, 0.5);
    moon.position.set(-5, 15, -5);
    scene.add(moon);
    addRoomLights(); // interior lights at night
  } else if (preset === 'warm') {
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 15, 50);
    const warm = new THREE.DirectionalLight(0xffcc88, 0.9);
    warm.position.set(10, 12, 5);
    warm.castShadow = true;
    warm.shadow.mapSize.set(512, 512);
    scene.add(warm);
    const warmHem = new THREE.HemisphereLight(0xffaa66, 0x554422, 0.5);
    scene.add(warmHem);
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

function addRoomLights() {
  const mat = mats[currentMaterial];
  presets[currentPreset].rooms.forEach(r => {
    const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
    const pt = new THREE.PointLight(0xffdd99, 0.5, 6);
    pt.position.set(cx, wallHeight - 0.3, cy);
    scene.add(pt);
  });
}

function createWall(x, z, w, d, h, color, isExterior = true) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.05 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x + w / 2, h / 2, z + d / 2);
  mesh.castShadow = isExterior;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

function createFloor(x, z, w, d, color) {
  const geo = new THREE.PlaneGeometry(w, d);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x + w / 2, 0.01, z + d / 2);
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

function buildWalls(presetData) {
  walls.forEach(w => scene.remove(w));
  floors.forEach(f => scene.remove(f));
  walls = []; floors = [];

  const mat = mats[currentMaterial];
  const ow = presetData.outerWalls;
  const THK = 0.15;

  // Floor
  floors.push(createFloor(ow.x, ow.y, ow.w, ow.h, mat.floor));

  // Outer walls
  walls.push(createWall(ow.x - THK, ow.y, THK, ow.h, wallHeight, 0xcccccc)); // West
  walls.push(createWall(ow.x + ow.w, ow.y, THK, ow.h, wallHeight, 0xcccccc)); // East
  walls.push(createWall(ow.x, ow.y - THK, ow.w + THK, THK, wallHeight, 0xcccccc)); // North
  walls.push(createWall(ow.x, ow.y + ow.h, ow.w + THK, THK, wallHeight, 0xcccccc)); // South

  // Interior walls (thin)
  presetData.interiorWalls.forEach(iw => {
    const dx = Math.abs(iw.x2 - iw.x1);
    const dy = Math.abs(iw.y2 - iw.y1);
    const iwThk = 0.1;
    if (dx > 0.01) {
      walls.push(createWall(iw.x1, iw.y1 - iwThk / 2, dx, iwThk, wallHeight, 0xe0dcd0, false));
    } else {
      walls.push(createWall(iw.x1 - iwThk / 2, iw.y1, iwThk, dy, wallHeight, 0xe0dcd0, false));
    }
  });

  // Room floors (slightly raised for color)
  presetData.rooms.forEach(r => {
    floors.push(createFloor(r.x, r.y, r.w, r.h, r.color));
  });

  // Night lights
  if (currentLight === 'night') addRoomLights();

  updateStats();
}

function updateStats() {
  let faces = 0;
  walls.forEach(w => faces += w.geometry.index ? w.geometry.index.count / 3 : w.geometry.attributes.position.count / 3);
  floors.forEach(f => faces += f.geometry.index ? f.geometry.index.count / 3 : f.geometry.attributes.position.count / 3);
  document.getElementById('statFaces').textContent = '面数: ' + Math.round(faces);
  const data = presets[currentPreset];
  const area = data.outerWalls.w * data.outerWalls.h;
  document.getElementById('statArea').textContent = `面积: ${area.toFixed(0)}㎡`;
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);

  fpsFrames++;
  const now = performance.now();
  if (now - fpsLastTime >= 1000) {
    document.getElementById('statFPS').textContent = 'FPS: ' + fpsFrames;
    fpsFrames = 0;
    fpsLastTime = now;
  }

  // 只在平面图模式下做平滑过渡
  if (isPlanMode) {
    const ow = presets[currentPreset].outerWalls;
    camera.position.lerp(new THREE.Vector3(ow.w / 2, wallHeight + 8, ow.h / 2), 0.1);
    controls.target.lerp(new THREE.Vector3(ow.w / 2, 0, ow.h / 2), 0.1);
  }
}

function loadPreset(name) {
  currentPreset = name;
  document.querySelectorAll('[data-preset]').forEach(b => {
    b.classList.toggle('active', b.dataset.preset === name);
  });
  buildWalls(presets[name]);
}

function setViewMode(mode) {
  viewMode = mode;
  isPlanMode = (mode === 'plan');
  document.querySelectorAll('.tb-btn[data-mode]').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });

  const ow = presets[currentPreset].outerWalls;
  const cx = ow.w / 2, cz = ow.h / 2;

  if (mode === '3d') {
    camera.position.set(cx + 8, wallHeight + 4, cz + 8);
    controls.target.set(cx, wallHeight / 2, cz);
  } else if (mode === 'plan') {
    controls.target.set(cx, 0, cz);
  } else if (mode === 'elevation_n') {
    camera.position.set(cx, wallHeight / 2, cz - ow.h / 2 - 5);
    controls.target.set(cx, wallHeight / 2, cz);
  } else if (mode === 'elevation_s') {
    camera.position.set(cx, wallHeight / 2, cz + ow.h / 2 + 5);
    controls.target.set(cx, wallHeight / 2, cz);
  } else if (mode === 'elevation_e') {
    camera.position.set(cx + ow.w / 2 + 5, wallHeight / 2, cz);
    controls.target.set(cx, wallHeight / 2, cz);
  } else if (mode === 'elevation_w') {
    camera.position.set(cx - ow.w / 2 - 5, wallHeight / 2, cz);
    controls.target.set(cx, wallHeight / 2, cz);
  }
  controls.update();
}

function exportScreenshot() {
  renderer.render(scene, camera);
  const link = document.createElement('a');
  link.download = 'rendering.png';
  link.href = renderer.domElement.toDataURL();
  link.click();
}

initScene();

buildWalls(presets[currentPreset]);
animate();

// 加载项目数据到仪表盘
function loadProjectDataToDashboard() {
  const params = new URLSearchParams(window.location.search);
  const projectId = params.get('id') || params.get('project_id');
  
  // 从 localStorage 缓存读取
  const cached = localStorage.getItem('project_' + projectId);
  if (cached) {
    try {
      const p = JSON.parse(cached);
      document.getElementById('dash-area').textContent = (p.total_area || '--') + ' ㎡';
      document.getElementById('dash-rooms').textContent = p.room_count || '--';
    } catch(e) {}
  }
  
  // 从 API 获取
  if (projectId && window.ApiClient) {
    const API = (window.ApiClient && window.ApiClient.BASE_URL) || (window.API_BASE_URL) || '';
    const token = window.ApiClient.getToken ? window.ApiClient.getToken() : localStorage.getItem('paseto_token');
    fetch(API + '/api/projects/' + projectId, {
      headers: token ? { 'Authorization': 'Bearer ' + token } : {}
    }).then(r => r.json()).then(p => {
      document.getElementById('dash-area').textContent = (p.total_area || '--') + ' ㎡';
      document.getElementById('dash-rooms').textContent = p.room_count || p.floors?.reduce((s,f) => s + (f.rooms?.length || 0), 0) || '--';
      localStorage.setItem('project_' + projectId, JSON.stringify(p));
    }).catch(() => {});
  }
  
  // 更新面数（从 scene 获取）
  if (window.scene && window.scene.children) {
    let faces = 0;
    window.scene.traverse(function(obj) {
      if (obj.isMesh && obj.geometry && obj.geometry.index) {
        faces += obj.geometry.index.count / 3;
      }
    });
    document.getElementById('dash-faces').textContent = faces.toLocaleString();
  }
}

function toggleDashboard() {
  const dash = document.getElementById('data-dashboard');
  const content = dash.querySelectorAll('div:not(:last-child)');
  const btn = dash.querySelector('button');
  if (dash.dataset.collapsed === 'true') {
    content.forEach(d => d.style.display = '');
    btn.textContent = '▼ 收起';
    dash.dataset.collapsed = 'false';
  } else {
    content.forEach(d => d.style.display = 'none');
    btn.textContent = '▶ 展开';
    dash.dataset.collapsed = 'true';
  }
}
