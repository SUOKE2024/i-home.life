[pytest]
# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步支持
asyncio_mode = auto

# 输出格式
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    -n auto

# 标记注册
markers =
    slow: 标记慢测试（>5s）
    integration: 集成测试（需要数据库）
    websocket: WebSocket 测试
    e2e: 端到端测试

# 日志
log_cli = false
log_cli_level = INFO
log_file_level = WARNING

# 超时（秒）
timeout = 60
