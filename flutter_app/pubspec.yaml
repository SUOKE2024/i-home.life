name: ihome_app
description: "索克家居 · i-home.life"
publish_to: 'none'
version: 1.1.21+11

# 鸿蒙适配版本: Flutter-OH 3.35.7-ohos-0.0.3
# 对应上游 Flutter 3.35.7 / Dart 3.9.2
# 仓库: https://atomgit.com/openharmony-tpc/flutter_flutter (分支 oh-3.35.7-dev)
# 配套: DevEco Studio 6.0.2 Release / Java 17 / OpenHarmony API 23+
environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # 网络 & 持久化
  http: ^1.2.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  connectivity_plus: ^7.2.0
  # 文件选择 & 图片
  file_picker: ^11.0.2
  image_picker: ^1.1.0
  # 状态管理
  provider: ^6.1.2
  # 生物识别认证（指纹/面容）
  # 注意: 仅 Android/iOS 完整支持；鸿蒙平台会自动降级为关闭
  local_auth: ^3.0.2
  # 本地通知
  # 注意: 仅 Android/iOS 完整支持；鸿蒙平台通过 try-catch 优雅降级
  flutter_local_notifications: ^22.0.1
  # 平台权限请求（通知/相机等）
  permission_handler: ^12.0.3
  # 工具
  intl: ^0.20.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # 使用系统默认字体，DM Sans 通过 CSS font-family 在 Web 端加载
