# ============================================
# 8081 端口 — stream ssl_preread 协议分流
# HTTP → 127.0.0.1:8084   HTTPS → 127.0.0.1:8085
# 放置路径: /etc/nginx/stream.d/ihome-8081.conf
# ============================================

map $ssl_preread_protocol $ihome_backend {
    ""       127.0.0.1:8084;   # 非 TLS → 内部 HTTP server
    default  127.0.0.1:8085;   # TLS    → 内部 HTTPS server
}

server {
    listen 8081;
    ssl_preread on;
    proxy_pass $ihome_backend;
    proxy_protocol off;
}
