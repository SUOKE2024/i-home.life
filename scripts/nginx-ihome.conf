# i-home.life nginx 配置
# 放置路径: /etc/nginx/sites-available/ihome
# 启用: ln -s /etc/nginx/sites-available/ihome /etc/nginx/sites-enabled/
# 重启: nginx -t && nginx -s reload

server {
    listen 8081;
    server_name i-home.life www.i-home.life;

    # Web 静态文件
    root /opt/ihome/web;
    index index.html;

    # 默认首页
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WebSocket (OrbitControls 等不需要，预留给未来)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
