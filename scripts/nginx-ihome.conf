# i-home.life nginx 配置 v2.0.0 — stream ssl_preread 分流
# 放置路径: /etc/nginx/conf.d/ihome.conf
# 重启: nginx -t && nginx -s reload
#
# v2.0.0 修复：使用 stream ssl_preread 实现 8081 端口同时支持 HTTP 和 HTTPS。
# 外部 8081 → stream ssl_preread 协议检测 → 内部 8084(HTTP) / 8085(HTTPS)
#
# 前置条件：
#   1. Nginx >= 1.20.1 + stream 模块（ngx_stream_module.so）
#   2. nginx.conf 中需加载 stream 模块并包含 stream { include /etc/nginx/stream.d/*.conf; }
#   3. 证书路径：/etc/nginx/ssl/ihome-cert.pem + /etc/nginx/ssl/ihome-key.pem
#
# 配套文件：
#   - /etc/nginx/stream.d/ihome-8081.conf（stream ssl_preread 分流规则）
#   - 执行 sudo bash scripts/fix-8081-https.sh 一键修复

# ── 内部 HTTP server（接收 stream 转发的纯 HTTP 流量） ──
server {
    listen 127.0.0.1:8084;
    server_name i-home.life www.i-home.life 118.31.223.213;

    server_tokens off;
    client_max_body_size 20m;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; media-src 'self' blob:;" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self), gyroscope=(self), accelerometer=(self), magnetometer=(self), xr-spatial-tracking=(self)" always;

    root /opt/ihome/web;
    index index.html;

    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location = /docs { return 301 /api/docs; }
    location = /redoc { return 301 /api/redoc; }
    location = /openapi.json { return 301 /api/openapi.json; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 1000;
}

# ── 内部 HTTPS server（接收 stream 转发的 TLS 流量） ──
server {
    listen 127.0.0.1:8085 ssl;
    server_name i-home.life www.i-home.life 118.31.223.213;

    # SSL 自签名证书（兼容 https:// 访问，浏览器会有证书警告）
    ssl_certificate     /etc/nginx/ssl/ihome-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/ihome-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    server_tokens off;
    client_max_body_size 20m;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; media-src 'self' blob:;" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self), gyroscope=(self), accelerometer=(self), magnetometer=(self), xr-spatial-tracking=(self)" always;

    root /opt/ihome/web;
    index index.html;

    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        access_log off;
    }

    location = /docs { return 301 /api/docs; }
    location = /redoc { return 301 /api/redoc; }
    location = /openapi.json { return 301 /api/openapi.json; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 1000;
}
