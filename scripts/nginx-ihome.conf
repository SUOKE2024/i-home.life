# i-home.life nginx 配置 v1.4.0 — HTTP+HTTPS on 8081 (同端口兼容)
# 放置路径: /etc/nginx/conf.d/ihome.conf
# 重启: nginx -t && nginx -s reload
#
# v1.4.0 修复：8081 端口同时监听 HTTP 和 HTTPS，避免用户用 https:// 访问时
# 报 ERR_SSL_PROTOCOL_ERROR。HTTPS 使用自签名证书（IP 无法签发 Let's Encrypt），
# 浏览器会有证书警告，点击「高级 → 继续访问」即可正常使用。
#
# 前置条件：
#   1. Nginx >= 1.25.1（支持同端口 HTTP+HTTPS）
#   2. 执行 sudo bash scripts/fix-8081-https.sh 一键修复（含证书生成）
#      证书路径：/etc/nginx/ssl/ihome-self-signed.crt
#      私钥路径：/etc/nginx/ssl/ihome-self-signed.key
#
# 若 Nginx 版本 < 1.25.1，请升级 nginx 或要求用户用 http:// 访问。

# ── HTTP 8080（仅 HTTP）──
server {
    listen 8080;
    server_name 118.31.223.213;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # 文件上传大小限制
    client_max_body_size 20m;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; media-src 'self' blob:;" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self), gyroscope=(self), accelerometer=(self), magnetometer=(self), xr-spatial-tracking=(self)" always;

    # Web 静态文件
    root /opt/ihome/web;
    index index.html;

    # 在 HTTP 上直接提供完整服务（API 同样代理）
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # API 文档重定向
    location = /docs { return 301 /api/docs; }
    location = /redoc { return 301 /api/redoc; }
    location = /openapi.json { return 301 /api/openapi.json; }

    # 默认首页
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 1000;
}

# ── 8081 HTTP + HTTPS 同端口（IP 直接访问，兼容 http:// 和 https://） ──
# Nginx 1.25.1+ 支持「同端口 HTTP+HTTPS」，根据请求首字节自动识别协议。
# 浏览器用 https:// 访问时会建立 TLS 连接（自签名证书会有警告，点击继续即可）。
server {
    # 同时监听 HTTP 和 HTTPS（核心修复：解决 https://118.31.223.213:8081 ERR_SSL_PROTOCOL_ERROR）
    listen 8081;
    listen 8081 ssl;

    server_name i-home.life www.i-home.life 118.31.223.213;

    # ── SSL 配置（自签名证书，IP 无法用 Let's Encrypt） ──
    ssl_certificate     /etc/nginx/ssl/ihome-self-signed.crt;
    ssl_certificate_key /etc/nginx/ssl/ihome-self-signed.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    # HSTS 仅在正式 HTTPS 域名启用，IP 自签名证书场景不强制 HSTS 避免锁死
    # add_header Strict-Transport-Security "max-age=31536000" always;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # 文件上传大小限制
    client_max_body_size 20m;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; media-src 'self' blob:;" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self), gyroscope=(self), accelerometer=(self), magnetometer=(self), xr-spatial-tracking=(self)" always;

    # Web 静态文件
    root /opt/ihome/web;
    index index.html;

    # 健康检查
    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # API 文档重定向
    location = /docs { return 301 /api/docs; }
    location = /redoc { return 301 /api/redoc; }
    location = /openapi.json { return 301 /api/openapi.json; }

    # 默认首页
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket (ws:// 或 wss://)
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 1000;
}
