# i-home.life nginx 配置 v1.3.0 — HTTP on 8080 + 8081
# 放置路径: /etc/nginx/conf.d/ihome.conf
# 重启: nginx -t && nginx -s reload

# ── HTTP 重定向到 HTTPS ──
server {
    listen 8080;
    server_name 118.31.223.213;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # 文件上传大小限制
    client_max_body_size 20m;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; media-src 'self' blob:;" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self), gyroscope=(self), accelerometer=(self), magnetometer=(self), xr-spatial-tracking=(self)" always;

    # Web 静态文件
    root /opt/ihome/web;
    index index.html;

    # 在 HTTP 上直接提供完整服务（API 同样代理）
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # API 文档重定向
    location = /docs { return 301 /api/docs; }
    location = /redoc { return 301 /api/redoc; }
    location = /openapi.json { return 301 /api/openapi.json; }

    # 默认首页
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 1000;
}

# ── 8081 HTTP 服务（与文档 http://118.31.223.213:8081 对齐） ──
server {
    listen 8081;
    server_name i-home.life www.i-home.life 118.31.223.213;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # 文件上传大小限制
    client_max_body_size 20m;

