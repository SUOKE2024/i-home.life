# Alembic 配置 — i-home.life
# 用法:
#   生成迁移: alembic revision --autogenerate -m "init schema"
#   升级:     alembic upgrade head
#   回滚:     alembic downgrade -1
#
# 注意:
#   - 项目约定使用 PASETO 而非 JWT
#   - 不使用 Docker,直接二进制部署
#   - Phase 1 使用 SQLite,Phase 2 切换 PostgreSQL 时仅需修改 DATABASE_URL

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = sqlite:///./data/ihome.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
