name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with pytest-xdist
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./data/test_${{ github.run_id }}.db"
          SECRET_KEY: "ci-test-secret-key-64-chars-random-string-xxxxxxxxxxxxxxxx"
          APP_NAME: "i-home.life"
          APP_VERSION: "1.0.0"
        run: |
          mkdir -p data
          python -m pytest tests/ -v --tb=short -n auto

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            data/
            *.log

  frontend-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Start web server
        run: |
          cd web
          python3 -m http.server 8766 &

      - name: Wait for server
        run: |
          for i in {1..10}; do
            curl -s http://localhost:8766/index.html > /dev/null && break
            sleep 1
          done

      - name: Smoke test pages
        run: bash scripts/e2e-pages.sh http://localhost:8766

      - name: Stop server
        if: always()
        run: pkill -f "http.server 8766" || true

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python code
        run: |
          flake8 app/ --max-line-length=120 --extend-ignore=E203,W503 --max-complexity=15
          flake8 tests/ --max-line-length=120 --extend-ignore=E203,W503
