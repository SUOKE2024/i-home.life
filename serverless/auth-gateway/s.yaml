edition: 3.0.0
name: ihome-auth-gateway
access: default

vars:
  region: cn-hangzhou
  service:
    name: ihome-auth-gateway
    description: "i-home.life 认证网关微服务 — PASETO 令牌签发/验证、用户注册登录、WebAuthn/Passkey、身份认证"
    logConfig: auto
    role: acs:ram::{account-id}:role/aliyunfcdefaultrole
    vpcConfig:
      vpcId: ""
      securityGroupId: ""
      vswitchIds: []

functions:
  api:
    handler: handler.app
    runtime: custom-container
    timeout: 120
    memorySize: 512
    instanceConcurrency: 10
    customContainerConfig:
      image: registry.cn-hangzhou.aliyuncs.com/ihome/auth-gateway:latest
      command:
        - "python"
        - "-m"
        - "uvicorn"
        - "handler:app"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "9000"
    environmentVariables:
      DATABASE_URL: ${env.DATABASE_URL}
      REDIS_URL: ${env.REDIS_URL}
      PASETO_SECRET_KEY: ${env.PASETO_SECRET_KEY}
    asyncConfiguration:
      maxAsyncRetryAttempts: 3
    instanceLifecycleConfig:
      preStop:
        handler: common.warmup.pre_stop

triggers:
  - name: httpTrigger
    type: http
    config:
      authType: anonymous
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
      disableURLInternet: false

custom:
  coldStart:
    warmup: true
    warmupScript: common/warmup.py
    ossMount:
      bucketName: ihome-serverless
      mountPath: /mnt/oss
      readOnly: false
